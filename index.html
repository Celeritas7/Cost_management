                <button onClick={handleDelete} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.danger,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Delete</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  OVERVIEW VIEW
    // ═══════════════════════════════════════════
    function OverviewView({ filtered, totalSpend, monthlyAvg, dailyAvg, monthlyData, catData, topShops, allExpenses }) {
      const { theme, getCatIcon, getCatColor, categories, shops, tags } = useTheme();
      const [timeRange, setTimeRange] = useState("monthly"); // monthly, weekly, daily
      const [filters, setFilters] = useState(getStoredGraphFilters);
      const [filterOpen, setFilterOpen] = useState(true);
      const [filterToast, setFilterToast] = useState(null);

      useEffect(() => { setStoredGraphFilters(filters); }, [filters]);
      useEffect(() => {
        if (!filterToast) return;
        const t = setTimeout(() => setFilterToast(null), 2000);
        return () => clearTimeout(t);
      }, [filterToast]);

      const hasActiveFilters = filters.excludeOutliers || filters.excludeFixed ||
        filters.categories.length > 0 || filters.shops.length > 0 || filters.tags.length > 0 ||
        !!filters.dateFrom || !!filters.dateTo;

      const toggleField = (field) => { vibrate(10); setFilters(f => ({ ...f, [field]: !f[field] })); };
      const toggleInArray = (field, val) => { vibrate(10); setFilters(f => ({
        ...f, [field]: f[field].includes(val) ? f[field].filter(x => x !== val) : [...f[field], val],
      })); };
      const setDate = (field, val) => setFilters(f => ({ ...f, [field]: val }));
      const resetFilters = () => { vibrate(10); setFilters({ ...DEFAULT_GRAPH_FILTERS, categories: [], shops: [], tags: [] }); setFilterToast("Filters reset"); };

      const chipStyle = (active, color) => ({
        padding: "5px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11,
        display: "flex", alignItems: "center", gap: 4,
        background: active ? `${color}30` : theme.cardBg,
        color: active ? color : theme.textMuted,
        outline: active ? `2px solid ${color}` : `1px solid ${theme.cardBorder}`,
      });
      const filterLabelStyle = { fontSize: 10, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6, display: "block" };
      const dateInputStyle = { background: theme.inputBg, border: `1px solid ${theme.inputBorder}`, color: theme.text, padding: "6px 10px", borderRadius: 8, fontSize: 12, fontFamily: "inherit" };

      // Calculate data for different time ranges
      // Graph-filtered dataset (filters applied on top of the raw expenses).
      const graphFiltered = useMemo(() => applyGraphFilters(allExpenses, filters), [allExpenses, filters]);

      const chartData = useMemo(() => {
        const fd = graphFiltered;
        const now = new Date();
        const custom = filters.dateFrom || filters.dateTo;
        const parse = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
        const sortedDates = fd.map(e => e.date).sort();
        // When a custom range is partially set, fall back to the data extent for the open side.
        const fromD = filters.dateFrom ? parse(filters.dateFrom) : (sortedDates.length ? parse(sortedDates[0]) : now);
        const toD = filters.dateTo ? parse(filters.dateTo) : (sortedDates.length ? parse(sortedDates[sortedDates.length - 1]) : now);
        const dayKey = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
        const mondayOf = (dt) => { const x = new Date(dt); const day = x.getDay(); x.setDate(x.getDate() - (day === 0 ? 6 : day - 1)); x.setHours(0, 0, 0, 0); return x; };

        if (timeRange === "monthly") {
          const months = [];
          const startM = custom ? new Date(fromD.getFullYear(), fromD.getMonth(), 1) : new Date(now.getFullYear(), now.getMonth() - 11, 1);
          const endM = custom ? new Date(toD.getFullYear(), toD.getMonth(), 1) : new Date(now.getFullYear(), now.getMonth(), 1);
          let d = new Date(startM);
          while (d <= endM) {
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
            months.push({ key, label: `${MONTHS_SHORT[d.getMonth() + 1]} ${String(d.getFullYear()).slice(2)}`, total: 0 });
            d = new Date(d.getFullYear(), d.getMonth() + 1, 1);
          }
          fd.forEach(e => {
            const d2 = new Date(e.date);
            const key = `${d2.getFullYear()}-${String(d2.getMonth() + 1).padStart(2, "0")}`;
            const month = months.find(m => m.key === key);
            if (month) month.total += e.amount;
          });
          return months;
        }

        if (timeRange === "weekly") {
          const weeks = [];
          const lastStart = custom ? mondayOf(toD) : mondayOf(now);
          let cursor = custom ? mondayOf(fromD) : (() => { const c = new Date(lastStart); c.setDate(c.getDate() - 11 * 7); return c; })();
          while (cursor <= lastStart) {
            const weekStart = new Date(cursor);
            const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6); weekEnd.setHours(23, 59, 59, 999);
            weeks.push({ key: dayKey(weekStart), start: weekStart, end: weekEnd, label: `${weekStart.getMonth() + 1}/${weekStart.getDate()}`, total: 0 });
            cursor = new Date(cursor); cursor.setDate(cursor.getDate() + 7);
          }
          fd.forEach(e => {
            const d2 = new Date(e.date);
            const week = weeks.find(w => d2 >= w.start && d2 <= w.end);
            if (week) week.total += e.amount;
          });
          return weeks.map(w => ({ key: w.key, label: w.label, total: w.total }));
        }

        if (timeRange === "daily") {
          const days = [];
          let cursor = custom ? new Date(fromD) : (() => { const c = new Date(now); c.setDate(c.getDate() - 59); return c; })();
          const endD = custom ? new Date(toD) : new Date(now);
          cursor.setHours(0, 0, 0, 0); endD.setHours(0, 0, 0, 0);
          while (cursor <= endD) {
            const key = dayKey(cursor);
            days.push({ key, label: `${cursor.getMonth() + 1}/${cursor.getDate()}`, total: 0 });
            cursor = new Date(cursor); cursor.setDate(cursor.getDate() + 1);
          }
          fd.forEach(e => {
            const day = days.find(d => d.key === e.date);
            if (day) day.total += e.amount;
          });
          return days;
        }

        return [];
      }, [graphFiltered, timeRange, filters.dateFrom, filters.dateTo]);

      // Date span the chart currently covers (for the exclusion summary).
      const windowRange = useMemo(() => {
        const now = new Date();
        const fmtLocal = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
        if (filters.dateFrom || filters.dateTo) {
          return { start: filters.dateFrom || "0000-01-01", end: filters.dateTo || "9999-12-31" };
        }
        let start;
        if (timeRange === "monthly") start = new Date(now.getFullYear(), now.getMonth() - 11, 1);
        else if (timeRange === "weekly") { start = new Date(now); const day = now.getDay(); start.setDate(now.getDate() - (day === 0 ? 6 : day - 1) - 11 * 7); }
        else { start = new Date(now); start.setDate(now.getDate() - 59); }
        return { start: fmtLocal(start), end: fmtLocal(now) };
      }, [filters.dateFrom, filters.dateTo, timeRange]);

      // Summary of what the active filters removed from the current window.
      const exclusionSummary = useMemo(() => {
        if (!hasActiveFilters) return null;
        const windowRaw = allExpenses.filter(e => e.date >= windowRange.start && e.date <= windowRange.end);
        const kept = new Set(applyGraphFilters(windowRaw, filters).map(e => e.id));
        const excluded = windowRaw.filter(e => !kept.has(e.id));
        if (!excluded.length) return null;
        const sumOf = (rows) => rows.reduce((s, r) => s + r.amount, 0);
        const segs = [];
        const counted = new Set();
        if (filters.excludeOutliers) {
          const o = excluded.filter(e => e.expense_type === "outlier");
          o.forEach(e => counted.add(e.id));
          if (o.length) segs.push(`${o.length} outlier${o.length > 1 ? "s" : ""} (${fmt(sumOf(o))})`);
        }
        if (filters.excludeFixed) {
          const fx = excluded.filter(e => e.expense_type === "fixed");
          fx.forEach(e => counted.add(e.id));
          if (fx.length) segs.push(`${fx.length} fixed (${fmt(sumOf(fx))})`);
        }
        const narrowed = excluded.filter(e => !counted.has(e.id));
        if (narrowed.length) segs.push(`${narrowed.length} filtered out (${fmt(sumOf(narrowed))})`);
        return segs.length ? "Excluded: " + segs.join(", ") : null;
      }, [allExpenses, filters, windowRange, hasActiveFilters]);

      // Calculate stats for the selected time range
      const rangeStats = useMemo(() => {
        const nonZeroPeriods = chartData.filter(d => d.total > 0);
        const total = chartData.reduce((s, d) => s + d.total, 0);
        const avg = nonZeroPeriods.length > 0 ? Math.round(total / nonZeroPeriods.length) : 0;
        const max = Math.max(...chartData.map(d => d.total), 0);
        const maxPeriod = chartData.find(d => d.total === max);
        return { total, avg, max, maxPeriod };
      }, [chartData]);

      const CustomTooltip = ({ active, payload, label }) => {
        if (!active || !payload?.length) return null;
        return (<div style={{background:"#1a1a2e",border:`1px solid ${theme.cardBorder}`,borderRadius:6,padding:"8px 12px",fontSize:11}}><div style={{fontWeight:600,color:"#fff"}}>{label}</div>{payload.map((p,i) => <div key={i} style={{color:theme.textMuted}}>{fmt(p.value)}</div>)}</div>);
      };

      const rangeLabels = {
        monthly: { title: "Monthly (Last 12 months)", avgLabel: "Avg/Month" },
        weekly: { title: "Weekly (Last 12 weeks)", avgLabel: "Avg/Week" },
        daily: { title: "Daily (Last 60 days)", avgLabel: "Avg/Day" },
      };

      return (
        <>
          {filterToast && (
            <div className="cm-toast" style={{position:"fixed",top:16,right:16,zIndex:999,padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:500,background:theme.primary,color:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
              ↺ {filterToast}
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))",gap:10,marginBottom:16}}>
            {[{l:"Total",v:fmt(totalSpend),c:theme.primary},{l:"Monthly",v:fmt(monthlyAvg),c:theme.success},{l:"Daily",v:fmt(dailyAvg),c:theme.warning},{l:"Count",v:filtered.length,c:"#ec4899"}].map((x,i) => (
              <div key={i} style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:10,padding:"14px 12px",borderLeft:`3px solid ${x.c}`}}>
                <div style={{fontSize:9,color:theme.textMuted,textTransform:"uppercase",marginBottom:4}}>{x.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{x.v}</div>
              </div>
            ))}
          </div>

          {/* Graph Filter Bar */}
          <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,marginBottom:14,overflow:"hidden"}}>
            <button onClick={() => setFilterOpen(o => !o)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"transparent",border:"none",cursor:"pointer"}}>
              <span style={{fontSize:12,fontWeight:600,color:theme.textMuted,display:"flex",alignItems:"center",gap:6}}>
                🔎 Graph Filters
                {hasActiveFilters && <span style={{fontSize:9,background:theme.primaryGlow,color:"#fff",padding:"2px 6px",borderRadius:6}}>active</span>}
              </span>
              <span style={{color:theme.textMuted,fontSize:11}}>{filterOpen ? "▲" : "▼"}</span>
            </button>
            {filterOpen && (
              <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:12}}>
                {/* Exclude toggles */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button className="cm-chip" onClick={() => toggleField("excludeOutliers")} style={chipStyle(filters.excludeOutliers, EXPENSE_TYPES.outlier.color)}>⚡ Exclude outliers</button>
                  <button className="cm-chip" onClick={() => toggleField("excludeFixed")} style={chipStyle(filters.excludeFixed, EXPENSE_TYPES.fixed.color)}>📌 Exclude fixed</button>
                </div>
                {/* Categories */}
                <div>
                  <label style={filterLabelStyle}>Categories</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {categories.map(c => (
                      <button key={c.name} className="cm-chip" onClick={() => toggleInArray("categories", c.name)} style={chipStyle(filters.categories.includes(c.name), c.color)}>
                        <span>{c.icon}</span>{c.name}
                      </button>
                    ))}
                  </div>
                </div>
                {/* Shops */}
                {shops.length > 0 && (
                  <div>
                    <label style={filterLabelStyle}>Shops</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {shops.map(s => (
                        <button key={s.id} className="cm-chip" onClick={() => toggleInArray("shops", s.name)} style={chipStyle(filters.shops.includes(s.name), theme.primary)}>
                          {s.is_favorite ? "⭐ " : ""}{s.name}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                {/* Tags */}
                {tags.length > 0 && (
                  <div>
                    <label style={filterLabelStyle}>Tags</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {tags.map(t => (
                        <button key={t.name} className="cm-chip" onClick={() => toggleInArray("tags", t.name)} style={chipStyle(filters.tags.includes(t.name), t.color)}>
                          <span>{t.icon}</span>{t.name}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                {/* Custom date range */}
                <div>
                  <label style={filterLabelStyle}>Custom date range</label>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    <input type="date" value={filters.dateFrom} onChange={e => setDate("dateFrom", e.target.value)} style={dateInputStyle}/>
                    <span style={{color:theme.textDim,fontSize:11}}>to</span>
                    <input type="date" value={filters.dateTo} onChange={e => setDate("dateTo", e.target.value)} style={dateInputStyle}/>
                    {(filters.dateFrom || filters.dateTo) && (
                      <button onClick={() => setFilters(f => ({...f, dateFrom:"", dateTo:""}))} style={{background:"none",border:"none",color:theme.textMuted,cursor:"pointer",fontSize:11}}>clear</button>
                    )}
                  </div>
                </div>
                {/* Reset */}
                <div>
                  <button onClick={resetFilters} disabled={!hasActiveFilters} style={{
                    padding:"7px 14px",borderRadius:8,border:`1px solid ${theme.cardBorder}`,fontSize:11,fontWeight:500,
                    cursor:hasActiveFilters?"pointer":"not-allowed",background:theme.inputBg,color:theme.textMuted,opacity:hasActiveFilters?1:0.5,
                  }}>↺ Reset filters</button>
                </div>
              </div>
            )}
          </div>

          {/* Time Range Chart */}
          <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,padding:"16px 14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <h3 style={{fontSize:12,fontWeight:600,color:theme.textMuted,margin:0}}>Spending Trend</h3>
              <div style={{display:"flex",gap:4}}>
                {["monthly", "weekly", "daily"].map(range => (
                  <button key={range} onClick={() => setTimeRange(range)} style={{
                    padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:timeRange===range?600:400,
                    background:timeRange===range?theme.primaryGlow:theme.inputBg,
                    color:timeRange===range?"#fff":theme.textMuted,
                  }}>
                    {range.charAt(0).toUpperCase() + range.slice(1)}
                  </button>
                ))}
              </div>
            </div>
            
            {/* Range Stats */}
            <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{fontSize:11,color:theme.textDim}}>
                <span style={{color:theme.textMuted}}>Period Total:</span> <span style={{color:"#fff",fontWeight:600}}>{fmt(rangeStats.total)}</span>
              </div>
              <div style={{fontSize:11,color:theme.textDim}}>
                <span style={{color:theme.textMuted}}>{rangeLabels[timeRange].avgLabel}:</span> <span style={{color:"#fff",fontWeight:600}}>{fmt(rangeStats.avg)}</span>
              </div>
              {rangeStats.maxPeriod && (
                <div style={{fontSize:11,color:theme.textDim}}>
                  <span style={{color:theme.textMuted}}>Peak:</span> <span style={{color:theme.warning,fontWeight:600}}>{rangeStats.maxPeriod.label} ({fmt(rangeStats.max)})</span>
                </div>
              )}
            </div>

            <ResponsiveContainer width="100%" height={220}>
              <AreaChart data={chartData}>
                <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={theme.primary} stopOpacity={0.3}/><stop offset="100%" stopColor={theme.primary} stopOpacity={0.02}/></linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke={theme.cardBorder}/>
                <XAxis 
                  dataKey="label" 
                  tick={{fontSize:timeRange==="daily"?7:9,fill:theme.textDim}} 
                  axisLine={false} 
                  tickLine={false}
                  interval={timeRange==="daily"?9:0}
                />
                <YAxis tick={{fontSize:9,fill:theme.textDim}} axisLine={false} tickLine={false} tickFormatter={v => `¥${(v/1000).toFixed(0)}k`}/>
                <Tooltip content={<CustomTooltip/>}/>
                <Area type="monotone" dataKey="total" stroke={theme.primary} fill="url(#grad)" strokeWidth={2} isAnimationActive={true} animationDuration={450}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>

          {/* Bar Chart for same data */}
          <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,padding:"16px 14px",marginBottom:14}}>
            <h3 style={{fontSize:12,fontWeight:600,color:theme.textMuted,marginBottom:12,marginTop:0}}>
              {rangeLabels[timeRange].title} - Comparison
            </h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke={theme.cardBorder}/>
                <XAxis 
                  dataKey="label" 
                  tick={{fontSize:timeRange==="daily"?6:8,fill:theme.textDim}} 
                  axisLine={false} 
                  tickLine={false}
                  interval={timeRange==="daily"?14:0}
                  angle={timeRange==="daily"?-45:0}
                  textAnchor={timeRange==="daily"?"end":"middle"}
                />
                <YAxis tick={{fontSize:8,fill:theme.textDim}} axisLine={false} tickLine={false} tickFormatter={v => `¥${(v/1000).toFixed(0)}k`}/>
                <Tooltip content={<CustomTooltip/>}/>
                <Bar dataKey="total" fill={theme.primary} radius={[2,2,0,0]} maxBarSize={timeRange==="daily"?8:24} isAnimationActive={true} animationDuration={450}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Exclusion summary */}
          {exclusionSummary && (
            <div className="cm-fade" style={{fontSize:11,color:theme.textDim,marginTop:-4,marginBottom:14}}>{exclusionSummary}</div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))",gap:14}}>
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,padding:"16px 14px"}}>
              <h3 style={{fontSize:12,fontWeight:600,color:theme.textMuted,marginBottom:10,marginTop:0}}>Categories</h3>
              <ResponsiveContainer width="100%" height={140}>
                <PieChart><Pie data={catData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={35} outerRadius={55} paddingAngle={2}>
                  {catData.map((e,i) => <Cell key={i} fill={getCatColor(e.name)} stroke="none"/>)}
                </Pie><Tooltip content={<CustomTooltip/>}/></PieChart>
              </ResponsiveContainer>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginTop:6}}>
                {catData.slice(0,5).map((c,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:theme.textMuted}}>
                    <div style={{width:6,height:6,borderRadius:2,background:getCatColor(c.name)}}/>{c.name}
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,padding:"16px 14px"}}>
              <h3 style={{fontSize:12,fontWeight:600,color:theme.textMuted,marginBottom:10,marginTop:0}}>Top Shops</h3>
              {topShops.map((s,i) => {
                const pct = topShops[0]?.value ? (s.value/topShops[0].value)*100 : 0;
                return (
                  <div key={i} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                      <span style={{fontSize:11,color:theme.textMuted}}>{s.name}</span>
                      <span style={{fontSize:11,color:"#fff",fontWeight:600}}>{fmt(s.value)}</span>
                    </div>
                    <div style={{height:4,background:theme.inputBg,borderRadius:2}}><div style={{height:"100%",width:`${pct}%`,background:theme.primary,borderRadius:2}}/></div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════
    //  RECURRING FORM (shared add / edit)
    // ═══════════════════════════════════════════
    function RecurringForm({ initial, saving, onSave, onCancel, onDelete }) {
      const { theme, inputStyle, categories, shops } = useTheme();
      const [form, setForm] = useState(initial);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const categoryShops = useMemo(() => {
        if (!form.category) return [];
        return shops.filter(s => s.category === form.category).sort(favSort);
      }, [shops, form.category]);

      const changeFreq = (freq) => setForm(f => ({
        ...f, frequency: freq,
        day_value: freq === "monthly"
          ? (f.day_value >= 1 && f.day_value <= 31 ? f.day_value : 1)
          : freq === "weekly"
          ? (f.day_value != null && f.day_value >= 0 && f.day_value <= 6 ? f.day_value : null)
          : null,
      }));

      const dayOk = form.frequency === "monthly"
        ? (Number(form.day_value) >= 1 && Number(form.day_value) <= 31)
        : form.frequency === "weekly"
        ? (form.day_value != null && form.day_value !== "")
        : true;
      const valid = form.name.trim() && Number(form.amount) > 0 && form.category && form.shop.trim() && dayOk;

      const labelS = { fontSize: 11, color: theme.textMuted, marginBottom: 6, display: "block" };
      const segBtn = (on, color) => ({
        flex: 1, padding: "8px 6px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11,
        background: on ? (color && color !== "transparent" ? `${color}30` : theme.primaryGlow) : theme.inputBg,
        color: on ? (color && color !== "transparent" ? color : "#fff") : theme.textMuted,
        outline: on ? `2px solid ${color && color !== "transparent" ? color : theme.primary}` : `1px solid ${theme.cardBorder}`,
      });

      return (
        <div style={{ maxHeight: "72vh", overflowY: "auto", paddingRight: 2 }}>
          {/* Name */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>NAME</label>
            <input type="text" value={form.name} onChange={e => set("name", e.target.value)} placeholder="e.g. Rent, Konbini" style={{ ...inputStyle, fontSize: 13 }} />
          </div>
          {/* Amount */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>AMOUNT</label>
            <input type="number" inputMode="numeric" value={form.amount} onChange={e => set("amount", e.target.value)} placeholder="¥" style={{ ...inputStyle, fontSize: 14, fontWeight: 600 }} />
          </div>
          {/* Category */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>CATEGORY</label>
            <select value={form.category} onChange={e => { set("category", e.target.value); set("shop", ""); }} style={{ ...inputStyle, fontSize: 13, cursor: "pointer" }}>
              <option value="">Select…</option>
              {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
            </select>
          </div>
          {/* Shop */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>SHOP</label>
            {form.category ? (
              <>
                {categoryShops.length > 0 && (
                  <select value={categoryShops.some(s => s.name === form.shop) ? form.shop : ""} onChange={e => e.target.value && set("shop", e.target.value)} style={{ ...inputStyle, fontSize: 13, cursor: "pointer", marginBottom: 6 }}>
                    <option value="">Pick a shop…</option>
                    {categoryShops.map(s => <option key={s.id} value={s.name}>{s.is_favorite ? "⭐ " : ""}{s.name}</option>)}
                  </select>
                )}
                <input type="text" value={form.shop} onChange={e => set("shop", e.target.value)} placeholder="Or type a shop name" style={{ ...inputStyle, fontSize: 13 }} />
              </>
            ) : (
              <div style={{ fontSize: 11, color: theme.textDim }}>Choose a category first.</div>
            )}
          </div>
          {/* Frequency */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>FREQUENCY</label>
            <div style={{ display: "flex", gap: 6 }}>
              {FREQ_ORDER.map(f => (
                <button key={f} onClick={() => changeFreq(f)} style={segBtn(form.frequency === f)}>{FREQ_LABELS[f]}</button>
              ))}
            </div>
          </div>
          {/* Day value (conditional) */}
          {form.frequency === "weekly" && (
            <div style={{ marginBottom: 12 }}>
              <label style={labelS}>DAY OF WEEK</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {DOW_SHORT.map((d, i) => (
                  <button key={d} onClick={() => set("day_value", i)} style={{
                    padding: "6px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11,
                    background: form.day_value === i ? theme.primaryGlow : theme.inputBg,
                    color: form.day_value === i ? "#fff" : theme.textMuted,
                    outline: form.day_value === i ? `2px solid ${theme.primary}` : `1px solid ${theme.cardBorder}`,
                  }}>{d}</button>
                ))}
              </div>
            </div>
          )}
          {form.frequency === "monthly" && (
            <div style={{ marginBottom: 12 }}>
              <label style={labelS}>DAY OF MONTH (1–31)</label>
              <input type="number" inputMode="numeric" min="1" max="31" value={form.day_value ?? ""} onChange={e => set("day_value", e.target.value === "" ? "" : Number(e.target.value))} style={{ ...inputStyle, fontSize: 13 }} />
            </div>
          )}
          {/* Expense type */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>TYPE</label>
            <div style={{ display: "flex", gap: 6 }}>
              {Object.entries(EXPENSE_TYPES).map(([key, cfg]) => (
                <button key={key} onClick={() => set("expense_type", key)} style={segBtn(form.expense_type === key, cfg.color)}>{cfg.icon} {cfg.label}</button>
              ))}
            </div>
          </div>
          {/* Tags */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>TAGS</label>
            <TagSelector selectedTags={form.tags} onChange={t => set("tags", t)} />
          </div>
          {/* Active */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, fontSize: 12, color: theme.textMuted, cursor: "pointer" }}>
            <input type="checkbox" checked={form.is_active} onChange={e => set("is_active", e.target.checked)} />
            Active
          </label>
          {/* Notes */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelS}>NOTES</label>
            <textarea value={form.notes} onChange={e => set("notes", e.target.value)} rows={2} placeholder="Optional" style={{ ...inputStyle, fontSize: 12, resize: "vertical", fontFamily: "inherit" }} />
          </div>

          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={onCancel} style={{ flex: 1, padding: "10px", borderRadius: 8, border: `1px solid ${theme.cardBorder}`, background: "transparent", color: theme.textMuted, cursor: "pointer", fontSize: 12 }}>Cancel</button>
            <button onClick={() => onSave(form)} disabled={!valid || saving} style={{
              flex: 2, padding: "10px", borderRadius: 8, border: "none", fontWeight: 600, fontSize: 12, color: "#fff",
              cursor: (!valid || saving) ? "not-allowed" : "pointer",
              background: (!valid || saving) ? theme.textDim : `linear-gradient(135deg,${theme.primary},${theme.accent})`,
              opacity: (!valid || saving) ? 0.5 : 1,
            }}>{saving ? "Saving…" : "Save"}</button>
          </div>
          {onDelete && (
            <button onClick={onDelete} style={{ width: "100%", marginTop: 10, padding: "9px", borderRadius: 8, border: `1px solid ${theme.danger}40`, background: "transparent", color: theme.danger, cursor: "pointer", fontSize: 12 }}>🗑️ Delete this recurring entry</button>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  RECURRING VIEW (templates — CRUD only)
    // ═══════════════════════════════════════════
    function RecurringView() {
      const { theme, supabase, getCatIcon, getCatColor } = useTheme();
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [editing, setEditing] = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [saving, setSaving] = useState(false);
      const [newId, setNewId] = useState(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

      const blankForm = { name: "", amount: "", category: "", shop: "", frequency: "monthly", day_value: 1, expense_type: "normal", tags: [], is_active: true, notes: "" };
      const buildRecord = (form) => ({
        name: form.name.trim(),
        category: form.category,
        shop: form.shop.trim(),
        amount: Number(form.amount),
        expense_type: form.expense_type,
        tags: (form.tags || []).join(","),
        frequency: form.frequency,
        day_value: (form.frequency === "weekly" || form.frequency === "monthly") ? Number(form.day_value) : null,
        notes: (form.notes || "").trim(),
        is_active: form.is_active,
      });

      const fetchList = useCallback(async () => {
        const { data, error } = await supabase.from("cost_management_recurring")
          .select("*").order("frequency").order("sort_order");
        if (!error && data) setItems(data);
        setLoading(false);
      }, []);
      useEffect(() => { fetchList(); }, [fetchList]);

      const grouped = useMemo(() => {
        const g = { daily: [], weekdays: [], weekly: [], monthly: [] };
        items.forEach(r => { if (g[r.frequency]) g[r.frequency].push(r); });
        FREQ_ORDER.forEach(f => g[f].sort((a, b) => a.sort_order - b.sort_order));
        return g;
      }, [items]);

      const handleToggle = async (item) => {
        vibrate(10);
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, is_active: !i.is_active } : i));
        const { error } = await supabase.from("cost_management_recurring")
          .update({ is_active: !item.is_active }).eq("id", item.id);
        if (error) { showToast("Update failed"); fetchList(); }
      };

      const handleAdd = async (form) => {
        setSaving(true);
        const maxSort = grouped[form.frequency].reduce((m, i) => Math.max(m, i.sort_order ?? 0), -1);
        const rec = { ...buildRecord(form), sort_order: maxSort + 1 };
        const { data, error } = await supabase.from("cost_management_recurring").insert(rec).select().single();
        setSaving(false);
        if (error) { showToast(error.message); return; }
        setShowAdd(false);
        setNewId(data?.id ?? null);
        showToast("Recurring entry added");
        vibrate(10);
        await fetchList();
        setTimeout(() => setNewId(null), 1000);
      };

      const openEdit = (item) => setEditing({
        id: item.id, name: item.name, amount: item.amount, category: item.category, shop: item.shop,
        frequency: item.frequency, day_value: item.day_value, expense_type: item.expense_type || "normal",
        tags: (item.tags || "").split(",").filter(Boolean), is_active: item.is_active, notes: item.notes || "",
        _origFreq: item.frequency,
      });

      const handleEdit = async (form) => {
        setSaving(true);
        const rec = buildRecord(form);
        // If the frequency group changed, re-append at the end of the new group.
        if (form.frequency !== form._origFreq) {
          const maxSort = grouped[form.frequency].reduce((m, i) => Math.max(m, i.sort_order ?? 0), -1);
          rec.sort_order = maxSort + 1;
        }
        const { error } = await supabase.from("cost_management_recurring").update(rec).eq("id", form.id);
        setSaving(false);
        if (error) { showToast(error.message); return; }
        setEditing(null);
        showToast("Updated");
        vibrate(10);
        await fetchList();
      };

      const handleDelete = async () => {
        const id = deleting.id;
        setDeleting(null);
        vibrate(10);
        const { error } = await supabase.from("cost_management_recurring").delete().eq("id", id);
        if (error) { showToast(error.message); return; }
        setItems(prev => prev.filter(i => i.id !== id));
        showToast("Deleted");
      };

      const togglePill = (on) => ({
        padding: "4px 10px", borderRadius: 14, border: "none", cursor: "pointer", fontSize: 10, fontWeight: 600,
        background: on ? `${theme.success}25` : theme.inputBg,
        color: on ? theme.success : theme.textDim,
        outline: on ? `1px solid ${theme.success}` : `1px solid ${theme.cardBorder}`,
      });

      const RecurringRow = ({ item }) => (
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "12px 14px",
          background: theme.inputBg, borderRadius: 10, marginBottom: 8,
          opacity: item.is_active ? 1 : 0.5,
        }}>
          <div onClick={() => openEdit(item)} style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0, cursor: "pointer" }}>
            <span style={{ fontSize: 20 }}>{getCatIcon(item.category)}</span>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {EXPENSE_TYPES[item.expense_type]?.icon && <span style={{ fontSize: 11 }}>{EXPENSE_TYPES[item.expense_type].icon}</span>}
                <span style={{ fontSize: 14, fontWeight: 600, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</span>
              </div>
              <div style={{ fontSize: 11, color: theme.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {item.shop} · {freqSummary(item)}
              </div>
            </div>
          </div>
          <span onClick={() => openEdit(item)} style={{ fontSize: 14, fontWeight: 700, color: "#fff", whiteSpace: "nowrap", cursor: "pointer" }}>{fmt(item.amount)}</span>
          <button onClick={(e) => { e.stopPropagation(); handleToggle(item); }} style={togglePill(item.is_active)}>{item.is_active ? "On" : "Off"}</button>
        </div>
      );

      return (
        <div style={{ maxWidth: 560, margin: "0 auto", paddingBottom: 80 }}>
          {toast && (
            <div className="cm-toast" style={{ position: "fixed", top: 16, right: 16, zIndex: 999, padding: "10px 16px", borderRadius: 10, fontSize: 13, fontWeight: 500, background: theme.primary, color: "#fff", boxShadow: "0 4px 16px rgba(0,0,0,0.3)" }}>
              {toast}
            </div>
          )}

          <div style={{ marginTop: 8, marginBottom: 12 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: "#fff", margin: 0 }}>🔁 Recurring</h3>
            <p style={{ fontSize: 11, color: theme.textDim, margin: "4px 0 0" }}>Templates for expenses you log regularly.</p>
          </div>

          {loading ? (
            <div style={{ textAlign: "center", padding: 40, color: theme.textMuted }}>⏳ Loading…</div>
          ) : (
            FREQ_ORDER.map(freq => (
              <div key={freq} style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
                  {FREQ_LABELS[freq]} <span style={{ color: theme.textDim }}>({grouped[freq].length})</span>
                </div>
                {grouped[freq].length === 0 ? (
                  <div style={{ fontSize: 12, color: theme.textDim, fontStyle: "italic", padding: "10px 14px", background: theme.cardBg, border: `1px dashed ${theme.cardBorder}`, borderRadius: 10 }}>
                    No {FREQ_LABELS[freq].toLowerCase()} recurring entries yet
                  </div>
                ) : (
                  grouped[freq].map(item => <RecurringRow key={item.id} item={item} />)
                )}
              </div>
            ))
          )}

          {/* Floating add button */}
          <button onClick={() => { vibrate(10); setShowAdd(true); }} title="Add recurring entry" style={{
            position: "fixed", right: 20, bottom: 20, zIndex: 80, width: 54, height: 54, borderRadius: "50%",
            border: "none", cursor: "pointer", fontSize: 26, color: "#fff", lineHeight: 1,
            background: `linear-gradient(135deg,${theme.primary},${theme.accent})`,
            boxShadow: `0 6px 20px ${theme.primaryGlow}`,
          }}>+</button>

          {/* Add modal */}
          {showAdd && (
            <Modal onClose={() => setShowAdd(false)}>
              <h4 style={{ color: "#fff", fontSize: 14, margin: "0 0 12px 0" }}>🔁 New Recurring Entry</h4>
              <RecurringForm initial={blankForm} saving={saving} onSave={handleAdd} onCancel={() => setShowAdd(false)} />
            </Modal>
          )}

          {/* Edit modal */}
          {editing && (
            <Modal onClose={() => setEditing(null)}>
              <h4 style={{ color: "#fff", fontSize: 14, margin: "0 0 12px 0" }}>✏️ Edit Recurring Entry</h4>
              <RecurringForm
                initial={editing}
                saving={saving}
                onSave={handleEdit}
                onCancel={() => setEditing(null)}
                onDelete={() => setDeleting(editing)}
              />
            </Modal>
          )}

          {/* Delete confirm */}
          {deleting && (
            <Modal onClose={() => setDeleting(null)}>
              <h4 style={{ color: theme.danger, fontSize: 14, margin: "0 0 8px 0" }}>Delete this recurring entry?</h4>
              <div style={{ background: theme.inputBg, borderRadius: 6, padding: 10, marginBottom: 10, display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: theme.text, fontSize: 12 }}>{getCatIcon(deleting.category)} {deleting.name}</span>
                <span style={{ color: "#fff", fontWeight: 600, fontSize: 12 }}>{fmt(deleting.amount)}</span>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setDeleting(null)} style={{ flex: 1, padding: "8px", borderRadius: 6, border: `1px solid ${theme.cardBorder}`, background: "transparent", color: theme.textMuted, cursor: "pointer", fontSize: 11 }}>Cancel</button>
                <button onClick={handleDelete} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "none", background: theme.danger, color: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 11 }}>Delete</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
