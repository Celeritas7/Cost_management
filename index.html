                <div key={cat.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:theme.inputBg,borderRadius:8,marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{cat.icon}</span>
                    <div>
                      <div style={{color:theme.text,fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:7}}>{cat.name}<span style={{width:9,height:9,borderRadius:3,background:cat.color,display:"inline-block",flexShrink:0}}/></div>
                      <div style={{color:theme.textDim,fontSize:10,whiteSpace:"nowrap"}}>{getCategoryUsage(cat.name)} expenses</div>
                    </div>
                    <div style={{width:0,height:0,display:"none"}}/>
                  </div>
                  <button onClick={() => setEditingCat({ ...cat, originalName: cat.name })} style={{background:"none",border:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                </div>
              ))}
              {!showAddCat ? (
                <button onClick={() => setShowAddCat(true)} style={{width:"100%",padding:"10px",borderRadius:8,border:`2px dashed ${theme.success}50`,background:"transparent",color:theme.success,cursor:"pointer",fontSize:12}}>+ Add Category</button>
              ) : (
                <ItemForm item={newCat} setItem={setNewCat} onSave={handleAddCategory} onCancel={() => setShowAddCat(false)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Add" />
              )}
            </div>
          )}

          {/* SHOPS TAB */}
          {activeTab === "shops" && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px"}}>
              <p style={{fontSize:11,color:theme.textDim,marginTop:0,marginBottom:12}}>Manage shops for each category. Favorite shops appear first when adding expenses.</p>
              
              {/* Category Filter */}
              <div style={{marginBottom:12}}>
                <select value={selectedShopCategory} onChange={e => setSelectedShopCategory(e.target.value)}
                  style={{...inputStyle,fontSize:12,cursor:"pointer"}}>
                  <option value="">All Categories</option>
                  {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                </select>
              </div>

              {/* Shop List */}
              {filteredShops.length > 0 ? (
                <div style={{maxHeight:300,overflowY:"auto",marginBottom:12}}>
                  {filteredShops.map(shop => (
                    <div key={shop.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:theme.inputBg,borderRadius:8,marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <button onClick={() => handleToggleFavorite(shop)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14}}>
                          {shop.is_favorite ? "⭐" : "☆"}
                        </button>
                        <div>
                          <div style={{color:theme.text,fontSize:13,fontWeight:500}}>{shop.name}</div>
                          <div style={{color:theme.textDim,fontSize:10,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{getCatIcon(shop.category)} {shop.category} • {getShopUsage(shop.name)} expenses</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={() => setEditingShop({ ...shop, originalName: shop.name })} style={{background:"none",border:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                        <button onClick={() => handleDeleteShop(shop.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:theme.danger}}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{color:theme.textDim,textAlign:"center",padding:20,fontSize:12}}>
                  {selectedShopCategory ? `No shops in ${selectedShopCategory}` : "No shops yet"}
                </div>
              )}

              {/* Add Shop */}
              {!showAddShop ? (
                <button onClick={() => { setShowAddShop(true); setNewShop({ name: "", category: selectedShopCategory || "", is_favorite: false }); }} 
                  style={{width:"100%",padding:"10px",borderRadius:8,border:`2px dashed ${theme.primary}50`,background:"transparent",color:theme.primary,cursor:"pointer",fontSize:12}}>
                  + Add Shop
                </button>
              ) : (
                <div style={{background:theme.inputBg,borderRadius:10,padding:12}}>
                  <input type="text" value={newShop.name} onChange={e => setNewShop({...newShop, name: e.target.value})} 
                    placeholder="Shop name" style={{...inputStyle,marginBottom:8,fontSize:12}}/>
                  <select value={newShop.category} onChange={e => setNewShop({...newShop, category: e.target.value})}
                    style={{...inputStyle,marginBottom:8,fontSize:12,cursor:"pointer"}}>
                    <option value="">Select category...</option>
                    {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                  </select>
                  <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontSize:12,color:theme.textMuted,cursor:"pointer"}}>
                    <input type="checkbox" checked={newShop.is_favorite} onChange={e => setNewShop({...newShop, is_favorite: e.target.checked})} />
                    ⭐ Mark as favorite
                  </label>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => setShowAddShop(false)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                    <button onClick={handleAddShop} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.primary,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Add</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* TAGS TAB */}
          {activeTab === "tags" && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px"}}>
              <p style={{fontSize:11,color:theme.textDim,marginTop:0,marginBottom:12}}>Tags help categorize what expenses are for (Food, Transport, Travel, etc.)</p>
              {tags.map(tag => (
                <div key={tag.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:theme.inputBg,borderRadius:8,marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:18}}>{tag.icon}</span>
                    <div>
                      <div style={{color:theme.text,fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:7}}>{tag.name}<span style={{width:9,height:9,borderRadius:3,background:tag.color,display:"inline-block",flexShrink:0}}/></div>
                      <div style={{color:theme.textDim,fontSize:10,whiteSpace:"nowrap"}}>{getTagUsage(tag.name)} expenses</div>
                    </div>
                    <div style={{width:0,height:0,display:"none"}}/>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => setEditingTag({ ...tag, originalName: tag.name })} style={{background:"none",border:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                    <button onClick={() => handleDeleteTag(tag.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:theme.danger}}>🗑️</button>
                  </div>
                </div>
              ))}
              {!showAddTag ? (
                <button onClick={() => setShowAddTag(true)} style={{width:"100%",padding:"10px",borderRadius:8,border:`2px dashed ${theme.warning}50`,background:"transparent",color:theme.warning,cursor:"pointer",fontSize:12}}>+ Add Tag</button>
              ) : (
                <ItemForm item={newTag} setItem={setNewTag} onSave={handleAddTag} onCancel={() => setShowAddTag(false)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Add" />
              )}
            </div>
          )}

          {/* Edit Category Modal */}
          {editingCat && (
            <Modal onClose={() => setEditingCat(null)}>
              <h5 style={{color:"#fff",margin:"0 0 12px 0",fontSize:14}}>Edit Category</h5>
              <ItemForm item={editingCat} setItem={setEditingCat} onSave={handleUpdateCategory} onCancel={() => setEditingCat(null)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Save" />
            </Modal>
          )}

          {/* Edit Tag Modal */}
          {editingTag && (
            <Modal onClose={() => setEditingTag(null)}>
              <h5 style={{color:"#fff",margin:"0 0 12px 0",fontSize:14}}>Edit Tag</h5>
              <ItemForm item={editingTag} setItem={setEditingTag} onSave={handleUpdateTag} onCancel={() => setEditingTag(null)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Save" />
            </Modal>
          )}

          {/* Edit Shop Modal */}
          {editingShop && (
            <Modal onClose={() => setEditingShop(null)}>
              <h5 style={{color:"#fff",margin:"0 0 12px 0",fontSize:14}}>Edit Shop</h5>
              <div style={{background:theme.inputBg,borderRadius:10,padding:12}}>
                <input type="text" value={editingShop.name} onChange={e => setEditingShop({...editingShop, name: e.target.value})} 
                  placeholder="Shop name" style={{...inputStyle,marginBottom:8,fontSize:12}}/>
                <select value={editingShop.category} onChange={e => setEditingShop({...editingShop, category: e.target.value})}
                  style={{...inputStyle,marginBottom:8,fontSize:12,cursor:"pointer"}}>
                  {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                </select>
                <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontSize:12,color:theme.textMuted,cursor:"pointer"}}>
                  <input type="checkbox" checked={editingShop.is_favorite} onChange={e => setEditingShop({...editingShop, is_favorite: e.target.checked})} />
                  ⭐ Favorite
                </label>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={() => setEditingShop(null)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                  <button onClick={handleUpdateShop} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.primary,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Save</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function Modal({ children, onClose, sheet }) {
      const { theme } = useTheme();
      return (
        <div onClick={sheet ? onClose : undefined} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:sheet?"flex-end":"center",justifyContent:"center",zIndex:sheet?300:100,padding:sheet?0:20}}>
          <div className={sheet ? "cm-sheet-in" : undefined} onClick={sheet ? (e) => e.stopPropagation() : undefined} style={{background:"#1a1a2e",borderRadius:sheet?"18px 18px 0 0":12,padding:16,width:"100%",maxWidth:sheet?460:360,maxHeight:sheet?"80vh":undefined,overflowY:sheet?"auto":undefined}}>
            {children}
          </div>
        </div>
      );
    }

    function ItemForm({ item, setItem, onSave, onCancel, emojis, colors, saveLabel }) {
      const { theme, inputStyle } = useTheme();
      return (
        <div style={{background:theme.inputBg,borderRadius:10,padding:12}}>
          <input type="text" value={item.name} onChange={e => setItem({...item, name: e.target.value})} placeholder="Name" style={{...inputStyle,marginBottom:8,fontSize:12}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
            {emojis.map(emoji => (
              <button key={emoji} onClick={() => setItem({...item, icon: emoji})} style={{width:28,height:28,borderRadius:6,border:item.icon===emoji?`2px solid ${theme.primary}`:`1px solid ${theme.cardBorder}`,background:item.icon===emoji?theme.primaryGlow:"transparent",cursor:"pointer",fontSize:14}}>{emoji}</button>
            ))}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:10}}>
            {colors.map(color => (
              <button key={color} onClick={() => setItem({...item, color})} style={{width:24,height:24,borderRadius:6,border:item.color===color?`2px solid #fff`:"none",background:color,cursor:"pointer"}}/>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={onCancel} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
            <button onClick={onSave} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.success,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>{saveLabel}</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  TRANSACTIONS VIEW
    // ═══════════════════════════════════════════
    function TransactionsView({ pageTx, txPage, setTxPage, txPages }) {
      const { theme, inputStyle, supabase, fetchData, categories, tags, getCatIcon, getCatColor, getTagIcon, getTagColor } = useTheme();
      const [editingTx, setEditingTx] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [deletingTx, setDeletingTx] = useState(null);
      const [toast, setToast] = useState(null);

      const openEdit = (tx) => { setEditForm({ ...tx, tagsArray: (tx.tags||"").split(",").filter(Boolean) }); setEditingTx(tx); };

      const handleUpdate = async () => {
        const { error } = await supabase.from("cost_management_expenses")
          .update({ amount: Number(editForm.amount), date: editForm.date, category: editForm.category, shop: editForm.shop, notes: editForm.notes, expense_type: editForm.expense_type, tags: (editForm.tagsArray||[]).join(",") })
          .eq("id", editForm.id);
        if (error) { setToast({ type: "error", msg: error.message }); }
        else { setToast({ type: "success", msg: "Updated" }); setEditingTx(null); fetchData(); }
        setTimeout(() => setToast(null), 3000);
      };

      const handleDelete = async () => {
        const { error } = await supabase.from("cost_management_expenses").delete().eq("id", deletingTx.id);
        if (error) { setToast({ type: "error", msg: error.message }); }
        else { setToast({ type: "success", msg: "Deleted" }); setDeletingTx(null); fetchData(); }
        setTimeout(() => setToast(null), 3000);
      };

      return (
        <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,overflow:"hidden"}}>
          {toast && (
            <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:500,background:toast.type==="success"?theme.success:theme.danger,color:"#fff"}}>
              {toast.type==="success"?"✅":"❌"} {toast.msg}
            </div>
          )}

          <div style={{overflowX:"auto",scrollbarWidth:"thin"}} className="tx-scroll">
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${theme.cardBorder}`}}>
                  {["","Date","Shop","Cat","Tags","Amount",""].map((h,i) => (
                    <th key={i} style={{padding:"10px 8px",textAlign:"left",color:theme.textMuted,fontWeight:600,fontSize:9,textTransform:"uppercase"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {pageTx.map(tx => (
                  <tr key={tx.id} style={{borderBottom:`1px solid ${theme.cardBorder}`}}>
                    <td style={{padding:"8px 6px",width:20}}>{EXPENSE_TYPES[tx.expense_type]?.icon}</td>
                    <td style={{padding:"8px 6px",color:theme.textMuted,whiteSpace:"nowrap"}}>{tx.date}</td>
                    <td style={{padding:"8px 6px",color:theme.text,fontWeight:500,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>{tx.shop}</td>
                    <td style={{padding:"8px 6px"}}><span style={{fontSize:14,cursor:"default"}} title={tx.category}>{getCatIcon(tx.category)}</span></td>
                    <td style={{padding:"8px 6px"}}>
                      {(tx.tags||"").split(",").filter(Boolean).slice(0,2).map(t => (
                        <span key={t} title={t} style={{fontSize:12,marginRight:3,cursor:"default"}}>{getTagIcon(t)}</span>
                      ))}
                    </td>

                      <button title="Delete" onClick={() => setDeletingTx(tx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,opacity:0.8,padding:"2px 4px"}}>🗑️</button>
                    </td>

            <span style={{fontSize:11,color:theme.textDim,alignSelf:"center"}}>Page {txPage+1} of {txPages||1}</span>
            <button onClick={() => setTxPage(p => Math.min(txPages-1,p+1))} disabled={txPage>=txPages-1} style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:txPage>=txPages-1?"default":"pointer",background:txPage>=txPages-1?theme.cardBg:theme.inputBg,color:theme.textMuted,fontSize:11}}>→</button>
          </div>

          {/* Edit Modal */}
          {editingTx && (
            <Modal onClose={() => setEditingTx(null)}>
              <h4 style={{color:"#fff",fontSize:14,margin:"0 0 12px 0"}}>Edit Entry</h4>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <input type="date" value={editForm.date} onChange={e => setEditForm({...editForm, date: e.target.value})} style={{...inputStyle,fontSize:11,colorScheme:"dark"}}/>
                <input type="number" value={editForm.amount} onChange={e => setEditForm({...editForm, amount: e.target.value})} style={{...inputStyle,fontSize:11}}/>
              </div>
              <select value={editForm.category} onChange={e => setEditForm({...editForm, category: e.target.value})} style={{...inputStyle,marginBottom:8,fontSize:11,cursor:"pointer"}}>
                {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
              </select>
              <input type="text" value={editForm.shop} onChange={e => setEditForm({...editForm, shop: e.target.value})} style={{...inputStyle,marginBottom:8,fontSize:11}}/>
              <select value={editForm.expense_type||"normal"} onChange={e => setEditForm({...editForm, expense_type: e.target.value})} style={{...inputStyle,marginBottom:8,fontSize:11,cursor:"pointer"}}>
                <option value="normal">Normal</option>
                <option value="fixed">📌 Fixed</option>
                <option value="outlier">⚡ Outlier</option>
              </select>
              <div style={{marginBottom:8}}>
                <label style={{fontSize:10,color:theme.textMuted,marginBottom:4,display:"block"}}>TAGS</label>
                <TagSelector selectedTags={editForm.tagsArray||[]} onChange={t => setEditForm({...editForm, tagsArray: t})} />
              </div>
              <input type="text" value={editForm.notes||""} onChange={e => setEditForm({...editForm, notes: e.target.value})} placeholder="Notes" style={{...inputStyle,marginBottom:10,fontSize:11}}/>
              <div style={{display:"flex",gap:6}}>
                <button onClick={() => setEditingTx(null)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                <button onClick={handleUpdate} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.primary,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Save</button>

          {/* Delete Modal */}
          {deletingTx && (
            <Modal onClose={() => setDeletingTx(null)}>

                  <span style={{color:theme.text,fontSize:12}}>{getCatIcon(deletingTx.category)} {deletingTx.shop}</span>
                  <span style={{color:"#fff",fontWeight:600,fontSize:12}}>{fmt(deletingTx.amount)}</span>
                </div>

              <div style={{display:"flex",gap:6}}>
                <button onClick={() => setDeletingTx(null)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                <button onClick={handleDelete} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.danger,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Delete</button>

    // ═══════════════════════════════════════════
    //  OVERVIEW VIEW
    // ═══════════════════════════════════════════
    // ═══════════════════════════════════════════
    //  SVG CHARTS (dependency-free — replaces Recharts, which fails to paint)
    // ═══════════════════════════════════════════
    function SvgAreaChart({ data, height = 220, color, gridColor, labelColor, labelStep = 1, peakColor }) {
      if (!data || data.length === 0) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: labelColor, fontSize: 12 }}>No data for this range</div>;
      const W = 540, H = height, padL = 42, padR = 10, padT = 14, padB = 22;
      const innerW = W - padL - padR, innerH = H - padT - padB;
      const max = Math.max(...data.map(d => d.total), 1) * 1.12;
      const n = data.length;
      const x = i => padL + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
      const y = v => padT + innerH * (1 - v / max);
      const pts = data.map((d, i) => [x(i), y(d.total)]);
      let line = `M ${pts[0][0]} ${pts[0][1]}`;
      for (let i = 1; i < n; i++) { const mx = (pts[i-1][0] + pts[i][0]) / 2; line += ` C ${mx} ${pts[i-1][1]}, ${mx} ${pts[i][1]}, ${pts[i][0]} ${pts[i][1]}`; }
      const area = `${line} L ${pts[n-1][0]} ${padT + innerH} L ${pts[0][0]} ${padT + innerH} Z`;
      const peakIdx = data.reduce((bi, d, i, a) => (d.total > a[bi].total ? i : bi), 0);
      const gridVals = [0, 0.5, 1].map(t => (max / 1.12) * t);
      const uid = useMemo(() => Math.random().toString(36).slice(2, 8), []);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", overflow: "visible" }}>
          <defs><linearGradient id={`ag-${uid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3" /><stop offset="100%" stopColor={color} stopOpacity="0.02" /></linearGradient></defs>
          {gridVals.map((gv, i) => (
            <g key={i}>
              <line x1={padL} y1={y(gv)} x2={W - padR} y2={y(gv)} stroke={gridColor} strokeDasharray="3 3" strokeWidth="1" />
              <text x={padL - 6} y={y(gv) + 3} textAnchor="end" fontSize="9" fill={labelColor} fontFamily="inherit">{`¥${Math.round(gv / 1000)}k`}</text>
            </g>
          ))}
          <path d={area} fill={`url(#ag-${uid})`} />
          <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
          {pts.map(([cx, cy], i) => (
            <circle key={i} cx={cx} cy={cy} r={i === peakIdx ? 4 : (n > 40 ? 0 : 2.2)} fill={i === peakIdx ? (peakColor || color) : color} stroke="rgba(0,0,0,0.4)" strokeWidth="1">
              <title>{data[i].label}: {fmt(data[i].total)}</title>
            </circle>
          ))}
          {data.map((d, i) => (i % labelStep === 0 ? <text key={`l${i}`} x={x(i)} y={H - 6} textAnchor="middle" fontSize={n > 20 ? 7.5 : 9} fill={i === peakIdx ? (peakColor || color) : labelColor} fontWeight={i === peakIdx ? 700 : 400} fontFamily="inherit">{d.label}</text> : null))}
        </svg>
      );
    }
    function SvgBarChart({ data, height = 180, color, gridColor, labelColor, labelStep = 1, peakColor }) {
      if (!data || data.length === 0) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: labelColor, fontSize: 12 }}>No data for this range</div>;
      const W = 540, H = height, padL = 42, padR = 10, padT = 12, padB = 22;
      const innerW = W - padL - padR, innerH = H - padT - padB;
      const max = Math.max(...data.map(d => d.total), 1) * 1.1;
      const n = data.length, slot = innerW / n, bw = Math.min(24, slot * 0.62);
      const y = v => padT + innerH * (1 - v / max);
      const peakIdx = data.reduce((bi, d, i, a) => (d.total > a[bi].total ? i : bi), 0);
      const gridVals = [0, 0.5, 1].map(t => (max / 1.1) * t);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", overflow: "visible" }}>
          {gridVals.map((gv, i) => (
            <g key={i}>
              <line x1={padL} y1={y(gv)} x2={W - padR} y2={y(gv)} stroke={gridColor} strokeDasharray="3 3" strokeWidth="1" />
              <text x={padL - 6} y={y(gv) + 3} textAnchor="end" fontSize="9" fill={labelColor} fontFamily="inherit">{`¥${Math.round(gv / 1000)}k`}</text>
            </g>
          ))}
          {data.map((d, i) => {
            const bx = padL + slot * i + (slot - bw) / 2;
            const by = y(d.total);
            return (
              <g key={i}>
                <rect x={bx} y={by} width={bw} height={Math.max(0, padT + innerH - by)} rx="2" fill={i === peakIdx ? (peakColor || color) : color} opacity={i === peakIdx ? 1 : 0.85}>
                  <title>{d.label}: {fmt(d.total)}</title>
                </rect>
                {i % labelStep === 0 && <text x={bx + bw / 2} y={H - 6} textAnchor="middle" fontSize={n > 20 ? 7 : 8.5} fill={labelColor} fontFamily="inherit">{d.label}</text>}
              </g>
            );
          })}
        </svg>
      );
    }
    function SvgDonut({ data, getColor, height = 140 }) {
      const total = (data || []).reduce((s, d) => s + d.value, 0);
      if (!data || data.length === 0 || total <= 0) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, opacity: 0.5 }}>No data</div>;
      const size = height, th = 20, r = (size - th) / 2 - 2, c = size / 2, circ = 2 * Math.PI * r;
      let acc = 0;
      return (
        <div style={{ display: "flex", justifyContent: "center" }}>
          <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{ display: "block" }}>
            {data.map((s, i) => {
              const frac = s.value / total, dash = Math.max(frac * circ - 1.5, 0.5);
              const el = (
                <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={getColor(s.name)} strokeWidth={th}
                  strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={-acc * circ} transform={`rotate(-90 ${c} ${c})`}>
                  <title>{s.name}: {fmt(s.value)} ({Math.round(frac * 100)}%)</title>
                </circle>
              );
              acc += frac;
              return el;
            })}
            <text x={c} y={c + 4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff" fontFamily="inherit">{`¥${Math.round(total / 1000)}k`}</text>
          </svg>
        </div>
      );
    }
    function OverviewView({ filtered, totalSpend, monthlyAvg, dailyAvg, monthlyData, catData, topShops, allExpenses }) {
      const { theme, getCatIcon, getCatColor, categories, shops, tags } = useTheme();
      const [timeRange, setTimeRange] = useState("monthly"); // monthly, weekly, daily
      const [filters, setFilters] = useState(getStoredGraphFilters);
      const [filterOpen, setFilterOpen] = useState(false); const [moreFiltersOpen, setMoreFiltersOpen] = useState(false);
      const [filterToast, setFilterToast] = useState(null);

      useEffect(() => { setStoredGraphFilters(filters); }, [filters]);
      useEffect(() => {
        if (!filterToast) return;
        const t = setTimeout(() => setFilterToast(null), 2000);
        return () => clearTimeout(t);
      }, [filterToast]);

      const hasActiveFilters = filters.excludeOutliers || filters.excludeFixed ||
        filters.categories.length > 0 || filters.shops.length > 0 || filters.tags.length > 0 ||
        !!filters.dateFrom || !!filters.dateTo;

      const toggleField = (field) => { vibrate(10); setFilters(f => ({ ...f, [field]: !f[field] })); };
      const toggleInArray = (field, val) => { vibrate(10); setFilters(f => ({
        ...f, [field]: f[field].includes(val) ? f[field].filter(x => x !== val) : [...f[field], val],
      })); };
      const setDate = (field, val) => setFilters(f => ({ ...f, [field]: val }));
      const resetFilters = () => { vibrate(10); setFilters({ ...DEFAULT_GRAPH_FILTERS, categories: [], shops: [], tags: [] }); setFilterToast("Filters reset"); };

      const chipStyle = (active, color) => ({
        padding: "5px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11,
        display: "flex", alignItems: "center", gap: 4,
        background: active ? `${color}30` : theme.cardBg,
        color: active ? color : theme.textMuted,
        outline: active ? `2px solid ${color}` : `1px solid ${theme.cardBorder}`,
      });
      const filterLabelStyle = { fontSize: 10, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6, display: "block" };
      const dateInputStyle = { background: theme.inputBg, border: `1px solid ${theme.inputBorder}`, color: theme.text, padding: "6px 10px", borderRadius: 8, fontSize: 12, fontFamily: "inherit" };

      // Calculate data for different time ranges
      // Graph-filtered dataset (filters applied on top of the raw expenses).
      const graphFiltered = useMemo(() => applyGraphFilters(allExpenses, filters), [allExpenses, filters]);

      const chartData = useMemo(() => {
        const fd = graphFiltered;
        const now = new Date();
        const custom = filters.dateFrom || filters.dateTo;
        const parse = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
        const sortedDates = fd.map(e => e.date).sort();
        // When a custom range is partially set, fall back to the data extent for the open side.
        const fromD = filters.dateFrom ? parse(filters.dateFrom) : (sortedDates.length ? parse(sortedDates[0]) : now);
        const toD = filters.dateTo ? parse(filters.dateTo) : (sortedDates.length ? parse(sortedDates[sortedDates.length - 1]) : now);
        const dayKey = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
        const mondayOf = (dt) => { const x = new Date(dt); const day = x.getDay(); x.setDate(x.getDate() - (day === 0 ? 6 : day - 1)); x.setHours(0, 0, 0, 0); return x; };

        if (timeRange === "monthly") {
          const months = [];
          const startM = custom ? new Date(fromD.getFullYear(), fromD.getMonth(), 1) : new Date(now.getFullYear(), now.getMonth() - 11, 1);
          const endM = custom ? new Date(toD.getFullYear(), toD.getMonth(), 1) : new Date(now.getFullYear(), now.getMonth(), 1);
          let d = new Date(startM);
          while (d <= endM) {
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
            months.push({ key, label: `${MONTHS_SHORT[d.getMonth() + 1]} ${String(d.getFullYear()).slice(2)}`, total: 0 });
            d = new Date(d.getFullYear(), d.getMonth() + 1, 1);
          }
          fd.forEach(e => {
            const d2 = new Date(e.date);
            const key = `${d2.getFullYear()}-${String(d2.getMonth() + 1).padStart(2, "0")}`;
            const month = months.find(m => m.key === key);
            if (month) month.total += e.amount;
          });
          return months;
        }

        if (timeRange === "weekly") {
          const weeks = [];
          const lastStart = custom ? mondayOf(toD) : mondayOf(now);
          let cursor = custom ? mondayOf(fromD) : (() => { const c = new Date(lastStart); c.setDate(c.getDate() - 11 * 7); return c; })();
          while (cursor <= lastStart) {
            const weekStart = new Date(cursor);
            const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6); weekEnd.setHours(23, 59, 59, 999);
            weeks.push({ key: dayKey(weekStart), start: weekStart, end: weekEnd, label: `${weekStart.getMonth() + 1}/${weekStart.getDate()}`, total: 0 });
            cursor = new Date(cursor); cursor.setDate(cursor.getDate() + 7);
          }
          fd.forEach(e => {
            const d2 = new Date(e.date);
            const week = weeks.find(w => d2 >= w.start && d2 <= w.end);
            if (week) week.total += e.amount;
          });
          return weeks.map(w => ({ key: w.key, label: w.label, total: w.total }));
        }

        if (timeRange === "daily") {
          const days = [];
          let cursor = custom ? new Date(fromD) : (() => { const c = new Date(now); c.setDate(c.getDate() - 59); return c; })();
          const endD = custom ? new Date(toD) : new Date(now);
          cursor.setHours(0, 0, 0, 0); endD.setHours(0, 0, 0, 0);
          while (cursor <= endD) {
            const key = dayKey(cursor);
            days.push({ key, label: `${cursor.getMonth() + 1}/${cursor.getDate()}`, total: 0 });
            cursor = new Date(cursor); cursor.setDate(cursor.getDate() + 1);
          }
          fd.forEach(e => {
            const day = days.find(d => d.key === e.date);
            if (day) day.total += e.amount;
          });
          return days;
        }

        return [];
      }, [graphFiltered, timeRange, filters.dateFrom, filters.dateTo]);

      // Date span the chart currently covers (for the exclusion summary).
      const windowRange = useMemo(() => {
        const now = new Date();
        const fmtLocal = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
        if (filters.dateFrom || filters.dateTo) {
          return { start: filters.dateFrom || "0000-01-01", end: filters.dateTo || "9999-12-31" };
        }
        let start;
        if (timeRange === "monthly") start = new Date(now.getFullYear(), now.getMonth() - 11, 1);
        else if (timeRange === "weekly") { start = new Date(now); const day = now.getDay(); start.setDate(now.getDate() - (day === 0 ? 6 : day - 1) - 11 * 7); }
        else { start = new Date(now); start.setDate(now.getDate() - 59); }
        return { start: fmtLocal(start), end: fmtLocal(now) };
      }, [filters.dateFrom, filters.dateTo, timeRange]);

      // Summary of what the active filters removed from the current window.
      const exclusionSummary = useMemo(() => {
        if (!hasActiveFilters) return null;
        const windowRaw = allExpenses.filter(e => e.date >= windowRange.start && e.date <= windowRange.end);
        const kept = new Set(applyGraphFilters(windowRaw, filters).map(e => e.id));
        const excluded = windowRaw.filter(e => !kept.has(e.id));
        if (!excluded.length) return null;
        const sumOf = (rows) => rows.reduce((s, r) => s + r.amount, 0);
        const segs = [];
        const counted = new Set();
        if (filters.excludeOutliers) {
          const o = excluded.filter(e => e.expense_type === "outlier");
          o.forEach(e => counted.add(e.id));
          if (o.length) segs.push(`${o.length} outlier${o.length > 1 ? "s" : ""} (${fmt(sumOf(o))})`);
        }
        if (filters.excludeFixed) {
          const fx = excluded.filter(e => e.expense_type === "fixed");
          fx.forEach(e => counted.add(e.id));
          if (fx.length) segs.push(`${fx.length} fixed (${fmt(sumOf(fx))})`);
        }
        const narrowed = excluded.filter(e => !counted.has(e.id));
        if (narrowed.length) segs.push(`${narrowed.length} filtered out (${fmt(sumOf(narrowed))})`);
        return segs.length ? "Excluded: " + segs.join(", ") : null;
      }, [allExpenses, filters, windowRange, hasActiveFilters]);

      // Calculate stats for the selected time range
      const rangeStats = useMemo(() => {
        const nonZeroPeriods = chartData.filter(d => d.total > 0);
        const total = chartData.reduce((s, d) => s + d.total, 0);
        const avg = nonZeroPeriods.length > 0 ? Math.round(total / nonZeroPeriods.length) : 0;
        const max = Math.max(...chartData.map(d => d.total), 0);
        const maxPeriod = chartData.find(d => d.total === max);
        return { total, avg, max, maxPeriod };
      }, [chartData]);

      const CustomTooltip = ({ active, payload, label }) => {
        if (!active || !payload?.length) return null;
        return (<div style={{background:"#1a1a2e",border:`1px solid ${theme.cardBorder}`,borderRadius:6,padding:"8px 12px",fontSize:11}}><div style={{fontWeight:600,color:"#fff"}}>{label}</div>{payload.map((p,i) => <div key={i} style={{color:theme.textMuted}}>{fmt(p.value)}</div>)}</div>);
      };

      const rangeLabels = {
        monthly: { title: "Monthly (Last 12 months)", avgLabel: "Avg/Month" },
        weekly: { title: "Weekly (Last 12 weeks)", avgLabel: "Avg/Week" },
        daily: { title: "Daily (Last 60 days)", avgLabel: "Avg/Day" },
      };

      return (
        <>
          {filterToast && (
            <div className="cm-toast" style={{position:"fixed",top:16,right:16,zIndex:999,padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:500,background:theme.primary,color:"#fff",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
              ↺ {filterToast}
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))",gap:10,marginBottom:16}}>
            {[{l:"Total",v:fmt(totalSpend),c:theme.primary},{l:"Monthly",v:fmt(monthlyAvg),c:theme.success},{l:"Daily",v:fmt(dailyAvg),c:theme.warning},{l:"Count",v:filtered.length,c:"#ec4899"}].map((x,i) => (
              <div key={i} style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:10,padding:"14px 12px",borderLeft:`3px solid ${x.c}`}}>
                <div style={{fontSize:9,color:theme.textMuted,textTransform:"uppercase",marginBottom:4}}>{x.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{x.v}</div>
              </div>
            ))}
          </div>

          {/* Graph Filter Bar */}
          <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,marginBottom:14,overflow:"hidden"}}>
            <button onClick={() => setFilterOpen(o => !o)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"transparent",border:"none",cursor:"pointer"}}>
              <span style={{fontSize:12,fontWeight:600,color:theme.textMuted,display:"flex",alignItems:"center",gap:6}}>
                🔎 Graph Filters
                {hasActiveFilters && <span style={{fontSize:9,background:theme.primaryGlow,color:"#fff",padding:"2px 6px",borderRadius:6}}>active</span>}
              </span>
              <span style={{color:theme.textMuted,fontSize:11}}>{filterOpen ? "▲" : "▼"}</span>
            </button>
            {filterOpen && (
              <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:12}}>
                {/* Exclude toggles */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                  <button className="cm-chip" onClick={() => toggleField("excludeFixed")} style={chipStyle(filters.excludeFixed, EXPENSE_TYPES.fixed.color)}>📌 Exclude fixed</button>

                {/* Categories */}
                <div>
                  <label style={filterLabelStyle}>Categories</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {categories.map(c => (
                      <button key={c.name} className="cm-chip" onClick={() => toggleInArray("categories", c.name)} style={chipStyle(filters.categories.includes(c.name), c.color)}>
                        <span>{c.icon}</span>{c.name}

                <button onClick={() => setMoreFiltersOpen(o => !o)} style={{alignSelf:"flex-start",background:"none",border:"none",cursor:"pointer",padding:0,fontSize:11,fontWeight:600,color:theme.textMuted,display:"flex",alignItems:"center",gap:5}}>
                  {moreFiltersOpen ? "▾" : "▸"} More filters · shops & tags
                  {(filters.shops.length > 0 || filters.tags.length > 0) && <span style={{fontSize:9,background:theme.primaryGlow,color:"#fff",padding:"2px 6px",borderRadius:6}}>{filters.shops.length + filters.tags.length}</span>}

                {/* Shops */}
                {moreFiltersOpen && shops.length > 0 && (
                  <div>
                    <label style={filterLabelStyle}>Shops</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {shops.map(s => (
                        <button key={s.id} className="cm-chip" onClick={() => toggleInArray("shops", s.name)} style={chipStyle(filters.shops.includes(s.name), theme.primary)}>

                      {tags.map(t => (
                        <button key={t.name} className="cm-chip" onClick={() => toggleInArray("tags", t.name)} style={chipStyle(filters.tags.includes(t.name), t.color)}>
                          <span>{t.icon}</span>{t.name}
                        </button>
                      ))}
                    </div>
                  </div>

                  <label style={filterLabelStyle}>Custom date range</label>

                    <input type="date" value={filters.dateFrom} onChange={e => setDate("dateFrom", e.target.value)} style={dateInputStyle}/>
                    <span style={{color:theme.textDim,fontSize:11}}>to</span>
                    <input type="date" value={filters.dateTo} onChange={e => setDate("dateTo", e.target.value)} style={dateInputStyle}/>
                    {(filters.dateFrom || filters.dateTo) && (
                      <button onClick={() => setFilters(f => ({...f, dateFrom:"", dateTo:""}))} style={{background:"none",border:"none",color:theme.textMuted,cursor:"pointer",fontSize:11}}>clear</button>
                    )}

                </div>
                {/* Reset */}

                  <button onClick={resetFilters} disabled={!hasActiveFilters} style={{
                    padding:"7px 14px",borderRadius:8,border:`1px solid ${theme.cardBorder}`,fontSize:11,fontWeight:500,
                    cursor:hasActiveFilters?"pointer":"not-allowed",background:theme.inputBg,color:theme.textMuted,opacity:hasActiveFilters?1:0.5,
                  }}>↺ Reset filters</button>
                </div>
              </div>

          {/* Time Range Chart */}
          <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,padding:"16px 14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <h3 style={{fontSize:12,fontWeight:600,color:theme.textMuted,margin:0}}>Spending Trend</h3>
              <div style={{display:"flex",gap:4}}>
                {["monthly", "weekly", "daily"].map(range => (
                  <button key={range} onClick={() => setTimeRange(range)} style={{
                    padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:timeRange===range?600:400,
                    background:timeRange===range?theme.primaryGlow:theme.inputBg,
                    color:timeRange===range?"#fff":theme.textMuted,

                    {range.charAt(0).toUpperCase() + range.slice(1)}

            <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{fontSize:11,color:theme.textDim}}>
                <span style={{color:theme.textMuted}}>Period Total:</span> <span style={{color:"#fff",fontWeight:600}}>{fmt(rangeStats.total)}</span>
              </div>
              <div style={{fontSize:11,color:theme.textDim}}>
                <span style={{color:theme.textMuted}}>{rangeLabels[timeRange].avgLabel}:</span> <span style={{color:"#fff",fontWeight:600}}>{fmt(rangeStats.avg)}</span>
              </div>

                <div style={{fontSize:11,color:theme.textDim}}>
                  <span style={{color:theme.textMuted}}>Peak:</span> <span style={{color:theme.warning,fontWeight:600}}>{rangeStats.maxPeriod.label} ({fmt(rangeStats.max)})</span>

            <div className="cm-fade" style={{fontSize:11,color:theme.textDim,marginTop:-4,marginBottom:14}}>{exclusionSummary}</div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))",gap:14}}>

    // ═══════════════════════════════════════════
    //  RECURRING FORM (shared add / edit)
    // ═══════════════════════════════════════════
    function RecurringForm({ initial, saving, onSave, onCancel, onDelete }) {
      const { theme, inputStyle, categories, shops } = useTheme();
      const [form, setForm] = useState(initial);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const categoryShops = useMemo(() => {
        if (!form.category) return [];
        return shops.filter(s => s.category === form.category).sort(favSort);
      }, [shops, form.category]);

      const changeFreq = (freq) => setForm(f => ({
        ...f, frequency: freq,
        day_value: freq === "monthly"
          ? (f.day_value >= 1 && f.day_value <= 31 ? f.day_value : 1)
          : freq === "weekly"
          ? (f.day_value != null && f.day_value >= 0 && f.day_value <= 6 ? f.day_value : null)
          : null,
      }));

      const dayOk = form.frequency === "monthly"
        ? (Number(form.day_value) >= 1 && Number(form.day_value) <= 31)
        : form.frequency === "weekly"
        ? (form.day_value != null && form.day_value !== "")
        : true;
      const valid = form.name.trim() && Number(form.amount) > 0 && form.category && form.shop.trim() && dayOk;

      const labelS = { fontSize: 11, color: theme.textMuted, marginBottom: 6, display: "block" };
      const segBtn = (on, color) => ({
        flex: 1, padding: "8px 6px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11,
        background: on ? (color && color !== "transparent" ? `${color}30` : theme.primaryGlow) : theme.inputBg,
        color: on ? (color && color !== "transparent" ? color : "#fff") : theme.textMuted,
        outline: on ? `2px solid ${color && color !== "transparent" ? color : theme.primary}` : `1px solid ${theme.cardBorder}`,
      });

      return (
        <div style={{ maxHeight: "72vh", overflowY: "auto", paddingRight: 2 }}>
          {/* Name */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>NAME</label>
            <input type="text" value={form.name} onChange={e => set("name", e.target.value)} placeholder="e.g. Rent, Konbini" style={{ ...inputStyle, fontSize: 13 }} />
          </div>
          {/* Amount */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>AMOUNT</label>
            <input type="number" inputMode="numeric" value={form.amount} onChange={e => set("amount", e.target.value)} placeholder="¥" style={{ ...inputStyle, fontSize: 14, fontWeight: 600 }} />
          </div>
          {/* Category */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>CATEGORY</label>
            <select value={form.category} onChange={e => { set("category", e.target.value); set("shop", ""); }} style={{ ...inputStyle, fontSize: 13, cursor: "pointer" }}>
              <option value="">Select…</option>
              {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
            </select>
          </div>
          {/* Shop */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>SHOP</label>
            {form.category ? (
              <>
                {categoryShops.length > 0 && (
                  <select value={categoryShops.some(s => s.name === form.shop) ? form.shop : ""} onChange={e => e.target.value && set("shop", e.target.value)} style={{ ...inputStyle, fontSize: 13, cursor: "pointer", marginBottom: 6 }}>
                    <option value="">Pick a shop…</option>
                    {categoryShops.map(s => <option key={s.id} value={s.name}>{s.is_favorite ? "⭐ " : ""}{s.name}</option>)}
                  </select>
                )}
                <input type="text" value={form.shop} onChange={e => set("shop", e.target.value)} placeholder="Or type a shop name" style={{ ...inputStyle, fontSize: 13 }} />
              </>
            ) : (
              <div style={{ fontSize: 11, color: theme.textDim }}>Choose a category first.</div>
            )}
          </div>
          {/* Frequency */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>FREQUENCY</label>
            <div style={{ display: "flex", gap: 6 }}>
              {FREQ_ORDER.map(f => (
                <button key={f} onClick={() => changeFreq(f)} style={segBtn(form.frequency === f)}>{FREQ_LABELS[f]}</button>
              ))}
            </div>
          </div>
          {/* Day value (conditional) */}
          {form.frequency === "weekly" && (
            <div style={{ marginBottom: 12 }}>
              <label style={labelS}>DAY OF WEEK</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {DOW_SHORT.map((d, i) => (
                  <button key={d} onClick={() => set("day_value", i)} style={{
                    padding: "6px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11,
                    background: form.day_value === i ? theme.primaryGlow : theme.inputBg,
                    color: form.day_value === i ? "#fff" : theme.textMuted,
                    outline: form.day_value === i ? `2px solid ${theme.primary}` : `1px solid ${theme.cardBorder}`,
                  }}>{d}</button>
                ))}
              </div>
            </div>
          )}
          {form.frequency === "monthly" && (
            <div style={{ marginBottom: 12 }}>
              <label style={labelS}>DAY OF MONTH (1–31)</label>
              <input type="number" inputMode="numeric" min="1" max="31" value={form.day_value ?? ""} onChange={e => set("day_value", e.target.value === "" ? "" : Number(e.target.value))} style={{ ...inputStyle, fontSize: 13 }} />
            </div>
          )}
          {/* Expense type */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>TYPE</label>
            <div style={{ display: "flex", gap: 6 }}>
              {Object.entries(EXPENSE_TYPES).map(([key, cfg]) => (
                <button key={key} onClick={() => set("expense_type", key)} style={segBtn(form.expense_type === key, cfg.color)}>{cfg.icon} {cfg.label}</button>
              ))}
            </div>
          </div>
          {/* Tags */}
          <div style={{ marginBottom: 12 }}>
            <label style={labelS}>TAGS</label>
            <TagSelector selectedTags={form.tags} onChange={t => set("tags", t)} />
          </div>
          {/* Active */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, fontSize: 12, color: theme.textMuted, cursor: "pointer" }}>
            <input type="checkbox" checked={form.is_active} onChange={e => set("is_active", e.target.checked)} />
            Active
          </label>
          {/* Notes */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelS}>NOTES</label>
            <textarea value={form.notes} onChange={e => set("notes", e.target.value)} rows={2} placeholder="Optional" style={{ ...inputStyle, fontSize: 12, resize: "vertical", fontFamily: "inherit" }} />
          </div>

          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={onCancel} style={{ flex: 1, padding: "10px", borderRadius: 8, border: `1px solid ${theme.cardBorder}`, background: "transparent", color: theme.textMuted, cursor: "pointer", fontSize: 12 }}>Cancel</button>
            <button onClick={() => onSave(form)} disabled={!valid || saving} style={{
              flex: 2, padding: "10px", borderRadius: 8, border: "none", fontWeight: 600, fontSize: 12, color: "#fff",
              cursor: (!valid || saving) ? "not-allowed" : "pointer",
              background: (!valid || saving) ? theme.textDim : `linear-gradient(135deg,${theme.primary},${theme.accent})`,
              opacity: (!valid || saving) ? 0.5 : 1,
            }}>{saving ? "Saving…" : "Save"}</button>
          </div>
          {onDelete && (
            <button onClick={onDelete} style={{ width: "100%", marginTop: 10, padding: "9px", borderRadius: 8, border: `1px solid ${theme.danger}40`, background: "transparent", color: theme.danger, cursor: "pointer", fontSize: 12 }}>🗑️ Delete this recurring entry</button>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  RECURRING VIEW (templates — CRUD only)
    // ═══════════════════════════════════════════
    function RecurringView() {
      const { theme, supabase, getCatIcon, getCatColor } = useTheme();
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [editing, setEditing] = useState(null);
      const [deleting, setDeleting] = useState(null);
      const [saving, setSaving] = useState(false);
      const [newId, setNewId] = useState(null);
      const [removingId, setRemovingId] = useState(null);
      const dragItemRef = useRef(null);
      const [dragId, setDragId] = useState(null);
      const [overId, setOverId] = useState(null);
      const [dragEnabledId, setDragEnabledId] = useState(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

      const blankForm = { name: "", amount: "", category: "", shop: "", frequency: "monthly", day_value: 1, expense_type: "normal", tags: [], is_active: true, notes: "" };
      const buildRecord = (form) => ({
        name: form.name.trim(),
        category: form.category,
        shop: form.shop.trim(),
        amount: Number(form.amount),
        expense_type: form.expense_type,
        tags: (form.tags || []).join(","),
        frequency: form.frequency,
        day_value: (form.frequency === "weekly" || form.frequency === "monthly") ? Number(form.day_value) : null,
        notes: (form.notes || "").trim(),
        is_active: form.is_active,
      });

      const fetchList = useCallback(async () => {
        const { data, error } = await supabase.from("cost_management_recurring")
          .select("*").order("frequency").order("sort_order");
        if (!error && data) setItems(data);
        setLoading(false);
      }, []);
      useEffect(() => { fetchList(); }, [fetchList]);

      const grouped = useMemo(() => {
        const g = { daily: [], weekdays: [], weekly: [], monthly: [] };
        items.forEach(r => { if (g[r.frequency]) g[r.frequency].push(r); });
        FREQ_ORDER.forEach(f => g[f].sort((a, b) => a.sort_order - b.sort_order));
        return g;
      }, [items]);

      const handleToggle = async (item) => {
        vibrate(10);
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, is_active: !i.is_active } : i));
        const { error } = await supabase.from("cost_management_recurring")
          .update({ is_active: !item.is_active }).eq("id", item.id);
        if (error) { showToast("Update failed"); fetchList(); }
      };

      const handleAdd = async (form) => {
        setSaving(true);
        const maxSort = grouped[form.frequency].reduce((m, i) => Math.max(m, i.sort_order ?? 0), -1);
        const rec = { ...buildRecord(form), sort_order: maxSort + 1 };
        const { data, error } = await supabase.from("cost_management_recurring").insert(rec).select().single();
        setSaving(false);
        if (error) { showToast(error.message); return; }
        setShowAdd(false);
        setNewId(data?.id ?? null);
        showToast("Recurring entry added");
        vibrate(10);
        await fetchList();
        setTimeout(() => setNewId(null), 1000);
      };

      const openEdit = (item) => setEditing({
        id: item.id, name: item.name, amount: item.amount, category: item.category, shop: item.shop,
        frequency: item.frequency, day_value: item.day_value, expense_type: item.expense_type || "normal",
        tags: (item.tags || "").split(",").filter(Boolean), is_active: item.is_active, notes: item.notes || "",
        _origFreq: item.frequency,
      });

      const handleEdit = async (form) => {
        setSaving(true);
        const rec = buildRecord(form);
        // If the frequency group changed, re-append at the end of the new group.
        if (form.frequency !== form._origFreq) {
          const maxSort = grouped[form.frequency].reduce((m, i) => Math.max(m, i.sort_order ?? 0), -1);
          rec.sort_order = maxSort + 1;
        }
        const { error } = await supabase.from("cost_management_recurring").update(rec).eq("id", form.id);
        setSaving(false);
        if (error) { showToast(error.message); return; }
        setEditing(null);
        showToast("Updated");
        vibrate(10);
        await fetchList();
      };

      const handleDelete = async () => {
        const id = deleting.id;
        setDeleting(null);
        setRemovingId(id);
        vibrate(10);
        setTimeout(async () => {
          const { error } = await supabase.from("cost_management_recurring").delete().eq("id", id);
          if (error) { showToast(error.message); setRemovingId(null); return; }
          setItems(prev => prev.filter(i => i.id !== id));
          setRemovingId(null);
          showToast("Deleted");
        }, 300);
      };

      // ── Drag-to-reorder (within a frequency group) ──
      const clearDrag = () => { dragItemRef.current = null; setDragId(null); setOverId(null); setDragEnabledId(null); };
      const persistOrder = (rows) => Promise.all(rows.map(it =>
        supabase.from("cost_management_recurring").update({ sort_order: it.sort_order }).eq("id", it.id)
      ));
      const onRowDrop = (target) => {
        const dragged = dragItemRef.current;
        if (!dragged || dragged.id === target.id || dragged.frequency !== target.frequency) { clearDrag(); return; }
        const freq = dragged.frequency;
        const group = grouped[freq];
        const fromIdx = group.findIndex(i => i.id === dragged.id);
        const toIdx = group.findIndex(i => i.id === target.id);
        if (fromIdx < 0 || toIdx < 0) { clearDrag(); return; }
        const reordered = [...group];
        const [moved] = reordered.splice(fromIdx, 1);
        reordered.splice(toIdx, 0, moved);
        const renumbered = reordered.map((it, idx) => ({ ...it, sort_order: idx }));
        setItems(prev => [...prev.filter(i => i.frequency !== freq), ...renumbered]);
        vibrate(10);
        persistOrder(renumbered).catch(() => { showToast("Reorder failed"); fetchList(); });
        clearDrag();
      };

      const togglePill = (on) => ({
        padding: "4px 10px", borderRadius: 14, border: "none", cursor: "pointer", fontSize: 10, fontWeight: 600,
        background: on ? `${theme.success}25` : theme.inputBg,
        color: on ? theme.success : theme.textDim,
        outline: on ? `1px solid ${theme.success}` : `1px solid ${theme.cardBorder}`,
      });

      const RecurringRow = ({ item }) => (
        <div
          draggable={dragEnabledId === item.id}
          onDragStart={(e) => { dragItemRef.current = item; setDragId(item.id); e.dataTransfer.effectAllowed = "move"; try { e.dataTransfer.setData("text/plain", String(item.id)); } catch (err) {} }}
          onDragOver={(e) => { if (dragItemRef.current && dragItemRef.current.frequency === item.frequency) { e.preventDefault(); setOverId(item.id); } }}
          onDragLeave={() => setOverId(o => (o === item.id ? null : o))}
          onDrop={(e) => { e.preventDefault(); onRowDrop(item); }}
          onDragEnd={clearDrag}
          className={[dragId === item.id ? "cm-dragging" : "", newId === item.id ? "cm-slide-in" : "", removingId === item.id ? "cm-fade-out" : ""].filter(Boolean).join(" ")}
          style={{
            display: "flex", alignItems: "center", gap: 10, padding: "12px 14px",
            background: theme.inputBg, borderRadius: 10, marginBottom: 8,
            opacity: item.is_active ? 1 : 0.5,
            borderTop: overId === item.id ? `2px solid ${theme.primary}` : "2px solid transparent",
            transition: "box-shadow 0.15s ease, transform 0.15s ease",
          }}>
          <div onClick={() => openEdit(item)} style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0, cursor: "pointer" }}>
            <span style={{ fontSize: 20 }}>{getCatIcon(item.category)}</span>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {EXPENSE_TYPES[item.expense_type]?.icon && <span style={{ fontSize: 11 }}>{EXPENSE_TYPES[item.expense_type].icon}</span>}
                <span style={{ fontSize: 14, fontWeight: 600, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</span>
              </div>
              <div style={{ fontSize: 11, color: theme.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {item.shop} · {freqSummary(item)}
              </div>
            </div>
          </div>
          <span onClick={() => openEdit(item)} style={{ fontSize: 14, fontWeight: 700, color: "#fff", whiteSpace: "nowrap", cursor: "pointer" }}>{fmt(item.amount)}</span>
          <button onClick={(e) => { e.stopPropagation(); handleToggle(item); }} style={togglePill(item.is_active)}>{item.is_active ? "On" : "Off"}</button>
          <span
            onMouseDown={() => setDragEnabledId(item.id)}
            onMouseUp={() => setDragEnabledId(d => (d === item.id ? null : d))}
            onTouchStart={() => setDragEnabledId(item.id)}
            title="Drag to reorder"
            style={{ cursor: "grab", color: theme.textDim, fontSize: 16, padding: "0 2px", userSelect: "none", touchAction: "none" }}
          >⠿</span>
        </div>
      );

      return (
        <div style={{ maxWidth: 560, margin: "0 auto", paddingBottom: 80 }}>
          {toast && (
            <div className="cm-toast" style={{ position: "fixed", top: 16, right: 16, zIndex: 999, padding: "10px 16px", borderRadius: 10, fontSize: 13, fontWeight: 500, background: theme.primary, color: "#fff", boxShadow: "0 4px 16px rgba(0,0,0,0.3)" }}>
              {toast}
            </div>
          )}

          <div style={{ marginTop: 8, marginBottom: 12 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: "#fff", margin: 0 }}>🔁 Recurring</h3>
            <p style={{ fontSize: 11, color: theme.textDim, margin: "4px 0 0" }}>Templates for expenses you log regularly.</p>
          </div>

          {loading ? (
            <div style={{ textAlign: "center", padding: 40, color: theme.textMuted }}>⏳ Loading…</div>
          ) : (
            FREQ_ORDER.map(freq => (
              <div key={freq} style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
                  {FREQ_LABELS[freq]} <span style={{ color: theme.textDim }}>({grouped[freq].length})</span>
                </div>
                {grouped[freq].length === 0 ? (
                  <div style={{ fontSize: 12, color: theme.textDim, fontStyle: "italic", padding: "10px 14px", background: theme.cardBg, border: `1px dashed ${theme.cardBorder}`, borderRadius: 10 }}>
                    No {FREQ_LABELS[freq].toLowerCase()} recurring entries yet
                  </div>
                ) : (
                  grouped[freq].map(item => <RecurringRow key={item.id} item={item} />)
                )}
              </div>
            ))
          )}

          {/* Floating add button */}
          <button onClick={() => { vibrate(10); setShowAdd(true); }} title="Add recurring entry" style={{
            position: "fixed", right: 20, bottom: 20, zIndex: 80, width: 54, height: 54, borderRadius: "50%",
            border: "none", cursor: "pointer", fontSize: 26, color: "#fff", lineHeight: 1,
            background: `linear-gradient(135deg,${theme.primary},${theme.accent})`,
            boxShadow: `0 6px 20px ${theme.primaryGlow}`,
          }}>+</button>

          {/* Add modal */}
          {showAdd && (
            <Modal onClose={() => setShowAdd(false)}>
              <h4 style={{ color: "#fff", fontSize: 14, margin: "0 0 12px 0" }}>🔁 New Recurring Entry</h4>
              <RecurringForm initial={blankForm} saving={saving} onSave={handleAdd} onCancel={() => setShowAdd(false)} />
            </Modal>
          )}

          {/* Edit modal */}
          {editing && (
            <Modal onClose={() => setEditing(null)}>
              <h4 style={{ color: "#fff", fontSize: 14, margin: "0 0 12px 0" }}>✏️ Edit Recurring Entry</h4>
              <RecurringForm
                initial={editing}
                saving={saving}
                onSave={handleEdit}
                onCancel={() => setEditing(null)}
                onDelete={() => setDeleting(editing)}
              />
            </Modal>
          )}

          {/* Delete confirm */}
          {deleting && (
            <Modal onClose={() => setDeleting(null)}>
              <h4 style={{ color: theme.danger, fontSize: 14, margin: "0 0 8px 0" }}>Delete this recurring entry?</h4>
              <div style={{ background: theme.inputBg, borderRadius: 6, padding: 10, marginBottom: 10, display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: theme.text, fontSize: 12 }}>{getCatIcon(deleting.category)} {deleting.name}</span>
                <span style={{ color: "#fff", fontWeight: 600, fontSize: 12 }}>{fmt(deleting.amount)}</span>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setDeleting(null)} style={{ flex: 1, padding: "8px", borderRadius: 6, border: `1px solid ${theme.cardBorder}`, background: "transparent", color: theme.textMuted, cursor: "pointer", fontSize: 11 }}>Cancel</button>
                <button onClick={handleDelete} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "none", background: theme.danger, color: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 11 }}>Delete</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
