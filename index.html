<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cost Management Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.15.3/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    input:focus, select:focus { outline: none; }
    @keyframes cmFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    @keyframes cmSlideIn { from { opacity: 0.4; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    @keyframes cmSheetIn { from { opacity: 0.4; } to { opacity: 1; } }
    @keyframes cmFadeOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-8px); } }
    @keyframes cmToastIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
    .cm-fade { animation: cmFadeIn 0.35s ease; }
    .cm-slide-in { animation: cmSlideIn 0.32s ease both; }
    .cm-sheet-in { animation: cmSheetIn 0.22s ease both; }
    .cm-fade-out { animation: cmFadeOut 0.3s ease forwards; pointer-events: none; }
    .cm-toast { animation: cmToastIn 0.25s ease; }
    .cm-dragging { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.45); opacity: 0.92; }
    .cm-chip { transition: background 0.15s ease, color 0.15s ease, outline-color 0.15s ease, transform 0.1s ease, filter 0.15s ease; }
    .cm-chip:hover { filter: brightness(1.18); transform: translateY(-1px); }
    .cm-chip:active { transform: scale(0.94); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://wylxvmkcrexwfpjpbhyy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const THEMES = {
      midnight: { name: "Midnight", icon: "🌙", bg: "linear-gradient(145deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%)", headerBg: "rgba(255,255,255,0.03)", cardBg: "rgba(255,255,255,0.04)", cardBorder: "rgba(255,255,255,0.06)", inputBg: "rgba(255,255,255,0.06)", inputBorder: "rgba(255,255,255,0.12)", primary: "#2563eb", primaryGlow: "rgba(37,99,235,0.3)", accent: "#7c3aed", text: "#e0e0e0", textMuted: "#888", textDim: "#666", success: "#10b981", warning: "#f59e0b", danger: "#ef4444" },
      sakura: { name: "Sakura", icon: "🌸", bg: "linear-gradient(145deg, #1a0a10 0%, #2d1520 50%, #3d1a2a 100%)", headerBg: "rgba(255,182,193,0.05)", cardBg: "rgba(255,182,193,0.04)", cardBorder: "rgba(255,182,193,0.08)", inputBg: "rgba(255,182,193,0.06)", inputBorder: "rgba(255,182,193,0.15)", primary: "#ec4899", primaryGlow: "rgba(236,72,153,0.3)", accent: "#f472b6", text: "#fce7f3", textMuted: "#f9a8d4", textDim: "#9d174d", success: "#34d399", warning: "#fbbf24", danger: "#f87171" },
      ocean: { name: "Ocean", icon: "🌊", bg: "linear-gradient(145deg, #0a1628 0%, #0c2340 50%, #0f3052 100%)", headerBg: "rgba(56,189,248,0.05)", cardBg: "rgba(56,189,248,0.04)", cardBorder: "rgba(56,189,248,0.08)", inputBg: "rgba(56,189,248,0.06)", inputBorder: "rgba(56,189,248,0.15)", primary: "#0ea5e9", primaryGlow: "rgba(14,165,233,0.3)", accent: "#38bdf8", text: "#e0f2fe", textMuted: "#7dd3fc", textDim: "#0369a1", success: "#22d3ee", warning: "#fbbf24", danger: "#fb7185" },
      forest: { name: "Forest", icon: "🌲", bg: "linear-gradient(145deg, #0a1a0f 0%, #132a1a 50%, #1a3a22 100%)", headerBg: "rgba(34,197,94,0.05)", cardBg: "rgba(34,197,94,0.04)", cardBorder: "rgba(34,197,94,0.08)", inputBg: "rgba(34,197,94,0.06)", inputBorder: "rgba(34,197,94,0.15)", primary: "#22c55e", primaryGlow: "rgba(34,197,94,0.3)", accent: "#4ade80", text: "#dcfce7", textMuted: "#86efac", textDim: "#166534", success: "#34d399", warning: "#facc15", danger: "#f87171" },
      sunset: { name: "Sunset", icon: "🌅", bg: "linear-gradient(145deg, #1a0f0a 0%, #2d1810 50%, #3d2018 100%)", headerBg: "rgba(251,146,60,0.05)", cardBg: "rgba(251,146,60,0.04)", cardBorder: "rgba(251,146,60,0.08)", inputBg: "rgba(251,146,60,0.06)", inputBorder: "rgba(251,146,60,0.15)", primary: "#f97316", primaryGlow: "rgba(249,115,22,0.3)", accent: "#fb923c", text: "#ffedd5", textMuted: "#fdba74", textDim: "#9a3412", success: "#4ade80", warning: "#fbbf24", danger: "#ef4444" },
      lavender: { name: "Lavender", icon: "💜", bg: "linear-gradient(145deg, #110f1a 0%, #1e1a2e 50%, #2a2440 100%)", headerBg: "rgba(167,139,250,0.05)", cardBg: "rgba(167,139,250,0.04)", cardBorder: "rgba(167,139,250,0.08)", inputBg: "rgba(167,139,250,0.06)", inputBorder: "rgba(167,139,250,0.15)", primary: "#8b5cf6", primaryGlow: "rgba(139,92,246,0.3)", accent: "#a78bfa", text: "#ede9fe", textMuted: "#c4b5fd", textDim: "#5b21b6", success: "#34d399", warning: "#fbbf24", danger: "#f87171" },
      mono: { name: "Mono", icon: "⚪", bg: "linear-gradient(145deg, #0a0a0a 0%, #171717 50%, #1f1f1f 100%)", headerBg: "rgba(255,255,255,0.03)", cardBg: "rgba(255,255,255,0.03)", cardBorder: "rgba(255,255,255,0.06)", inputBg: "rgba(255,255,255,0.05)", inputBorder: "rgba(255,255,255,0.1)", primary: "#a3a3a3", primaryGlow: "rgba(163,163,163,0.3)", accent: "#d4d4d4", text: "#e5e5e5", textMuted: "#a3a3a3", textDim: "#525252", success: "#86efac", warning: "#fde047", danger: "#fca5a5" },
    };

    const THEME_KEYS = Object.keys(THEMES);
    const EXPENSE_TYPES = {
      normal: { label: "Normal", icon: "", color: "transparent" },
      fixed: { label: "Fixed", icon: "📌", color: "#f59e0b" },
      outlier: { label: "Outlier", icon: "⚡", color: "#8b5cf6" },
    };

    function getStoredTheme() {
      try {
        const stored = localStorage.getItem("cost_mgmt_theme");
        if (stored) { const { theme } = JSON.parse(stored); return theme; }
      } catch (e) {}
      return "midnight";
    }
    function setStoredTheme(theme) { localStorage.setItem("cost_mgmt_theme", JSON.stringify({ theme, timestamp: Date.now() })); }

    const { useState, useMemo, useEffect, useCallback, useRef, createContext, useContext } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area, CartesianGrid } = Recharts;

    const ThemeContext = createContext();
    const useTheme = () => useContext(ThemeContext);

    const MONTHS_SHORT = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    const DEFAULT_CATEGORIES = [
      { id: 1, name: "Supermarket", icon: "🛒", color: "#2563eb" },
      { id: 2, name: "Convenience", icon: "🏪", color: "#f59e0b" },
      { id: 3, name: "Asian shop", icon: "🌏", color: "#10b981" },
      { id: 4, name: "Restaurant", icon: "🍜", color: "#ef4444" },
      { id: 5, name: "Daily need stuffs", icon: "🧹", color: "#ec4899" },
      { id: 99, name: "Other", icon: "📦", color: "#8b5cf6" },
    ];

    const DEFAULT_TAGS = [
      { id: 1, name: "Food", icon: "🍎", color: "#22c55e" },
      { id: 2, name: "Dining Out", icon: "🍜", color: "#ef4444" },
      { id: 3, name: "Fruits", icon: "🍇", color: "#a855f7" },
      { id: 4, name: "Transport", icon: "🚃", color: "#3b82f6" },
      { id: 5, name: "Travel", icon: "✈️", color: "#06b6d4" },
    ];

    const fmt = (n) => `¥${n.toLocaleString()}`;
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const vibrate = (ms) => { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} };

    // ── Recurring (templates) ──
    const FREQ_ORDER = ["daily", "weekdays", "weekly", "monthly"];
    const FREQ_LABELS = { daily: "Daily", weekdays: "Weekdays", weekly: "Weekly", monthly: "Monthly" };
    const DOW_SHORT = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const freqSummary = (r) => {
      if (r.frequency === "monthly") return `Monthly · day ${r.day_value}`;
      if (r.frequency === "weekly") return `Weekly · ${DOW_SHORT[r.day_value] ?? "?"}`;
      if (r.frequency === "weekdays") return "Weekdays";
      return "Daily";
    };
    const favSort = (a, b) => (a.is_favorite === b.is_favorite ? a.name.localeCompare(b.name) : a.is_favorite ? -1 : 1);

    // ── Graph filters (overview charts) ──
    const GRAPH_FILTER_KEY = "cost_management_graph_filters";
    const DEFAULT_GRAPH_FILTERS = { excludeOutliers: false, excludeFixed: false, categories: [], shops: [], tags: [], dateFrom: "", dateTo: "" };
    function getStoredGraphFilters() {
      try {
        const stored = localStorage.getItem(GRAPH_FILTER_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          return {
            ...DEFAULT_GRAPH_FILTERS, ...parsed,
            categories: Array.isArray(parsed.categories) ? parsed.categories : [],
            shops: Array.isArray(parsed.shops) ? parsed.shops : [],
            tags: Array.isArray(parsed.tags) ? parsed.tags : [],
          };
        }
      } catch (e) {}
      return { ...DEFAULT_GRAPH_FILTERS, categories: [], shops: [], tags: [] };
    }
    function setStoredGraphFilters(f) { try { localStorage.setItem(GRAPH_FILTER_KEY, JSON.stringify(f)); } catch (e) {} }
    function applyGraphFilters(rows, f) {
      return rows.filter(r => {
        if (f.excludeOutliers && r.expense_type === "outlier") return false;
        if (f.excludeFixed && r.expense_type === "fixed") return false;
        if (f.categories.length && !f.categories.includes(r.category)) return false;
        if (f.shops.length && !f.shops.includes(r.shop)) return false;
        if (f.tags.length) {
          const rowTags = (r.tags || "").split(",").map(t => t.trim()).filter(Boolean);
          if (!f.tags.some(t => rowTags.includes(t))) return false;
        }
        if (f.dateFrom && r.date < f.dateFrom) return false;
        if (f.dateTo && r.date > f.dateTo) return false;
        return true;
      });
    }

    function enrichRow(r) {
      const d = new Date(r.date);
      return { ...r, year: d.getFullYear(), month: d.getMonth() + 1 };
    }

    // ═══════════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════════
    function App() {
      const [themeName, setThemeName] = useState(getStoredTheme);
      const theme = THEMES[themeName] || THEMES.midnight;
      const [data, setData] = useState([]);
      const [shops, setShops] = useState([]);
      const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
      const [tags, setTags] = useState(DEFAULT_TAGS);
      const [recurring, setRecurring] = useState([]);
      const [loading, setLoading] = useState(true);
      const [yearFilter, setYearFilter] = useState("All");
      const [catFilter, setCatFilter] = useState("All");
      const [typeFilter, setTypeFilter] = useState("All");
      const [tagFilter, setTagFilter] = useState("All");
      const [view, setView] = useState("add");
      const [txPage, setTxPage] = useState(0);
      const [showThemePicker, setShowThemePicker] = useState(false);

      const changeTheme = (t) => { setThemeName(t); setStoredTheme(t); setShowThemePicker(false); };

      const fetchData = useCallback(async () => {
        // no setLoading(true) here: refetches after a save must not unmount the
        // active view (the Add view keeps its review list / flash state)
        const [expRes, shopRes, catRes, tagRes, recRes] = await Promise.all([
          supabase.from("cost_management_expenses").select("*").order("date", { ascending: true }),
          supabase.from("cost_management_shops").select("*").order("is_favorite", { ascending: false }).order("name"),
          supabase.from("cost_management_categories").select("*").order("sort_order"),
          supabase.from("cost_management_tags").select("*").order("sort_order"),
          supabase.from("cost_management_recurring").select("*").order("name"),
        ]);
        if (!expRes.error && expRes.data) {
          setData(expRes.data.map(r => enrichRow({ 
            id: r.id, amount: r.amount, date: r.date, category: r.category, 
            shop: r.shop, notes: r.notes || "", expense_type: r.expense_type || "normal",
            tags: r.tags || ""
          })));
          const years = [...new Set(expRes.data.map(r => new Date(r.date).getFullYear()))];
          if (years.length) setYearFilter(String(Math.max(...years)));
        }
        if (!shopRes.error && shopRes.data) setShops(shopRes.data);
        if (!catRes.error && catRes.data && catRes.data.length > 0) setCategories(catRes.data);
        if (!tagRes.error && tagRes.data && tagRes.data.length > 0) setTags(tagRes.data);
        if (!recRes.error && recRes.data) setRecurring(recRes.data);
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const RAW = data;
      const catList = useMemo(() => [...new Set(RAW.map(r => r.category))].sort(), [RAW]);
      const years = useMemo(() => [...new Set(RAW.map(r => String(r.year)))].sort(), [RAW]);

      const filtered = useMemo(() => RAW.filter(r => {
        if (yearFilter !== "All" && String(r.year) !== yearFilter) return false;
        if (catFilter !== "All" && r.category !== catFilter) return false;
        if (typeFilter !== "All" && r.expense_type !== typeFilter) return false;
        if (tagFilter !== "All" && !(r.tags || "").split(",").includes(tagFilter)) return false;
        return true;
      }), [RAW, yearFilter, catFilter, typeFilter, tagFilter]);

      const totalSpend = useMemo(() => filtered.reduce((s,r) => s+r.amount, 0), [filtered]);
      const monthlyData = useMemo(() => {
        const map = {};
        filtered.forEach(r => {
          const key = `${r.year}-${String(r.month).padStart(2,"0")}`;
          const label = `${MONTHS_SHORT[r.month]} ${String(r.year).slice(2)}`;
          if (!map[key]) map[key] = { key, label, total: 0 };
          map[key].total += r.amount;
        });
        return Object.values(map).sort((a,b) => a.key.localeCompare(b.key));
      }, [filtered]);
      const monthlyAvg = monthlyData.length ? Math.round(totalSpend / monthlyData.length) : 0;
      const dailyAvg = filtered.length ? Math.round(totalSpend / new Set(filtered.map(r => r.date)).size) : 0;
      const catData = useMemo(() => {
        const map = {};
        filtered.forEach(r => { map[r.category] = (map[r.category]||0) + r.amount; });
        return Object.entries(map).map(([name,value]) => ({name,value})).sort((a,b) => b.value-a.value);
      }, [filtered]);
      const topShops = useMemo(() => {
        const map = {};
        filtered.forEach(r => { map[r.shop] = (map[r.shop]||0) + r.amount; });
        return Object.entries(map).map(([name,value]) => ({name,value})).sort((a,b) => b.value-a.value).slice(0,6);
      }, [filtered]);

      const sortedTx = useMemo(() => [...filtered].sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id), [filtered]);
      const txPerPage = 15;
      const txPages = Math.ceil(sortedTx.length / txPerPage);
      const pageTx = sortedTx.slice(txPage * txPerPage, (txPage+1) * txPerPage);
      const recentEntries = useMemo(() => [...RAW].sort((a,b) => b.id - a.id).slice(0, 5), [RAW]);

      const getCatIcon = (n) => categories.find(c => c.name === n)?.icon || "📦";
      const getCatColor = (n) => categories.find(c => c.name === n)?.color || "#8b5cf6";
      const getTagIcon = (n) => tags.find(t => t.name === n)?.icon || "🏷️";
      const getTagColor = (n) => tags.find(t => t.name === n)?.color || "#6b7280";

      const pillStyle = (active) => ({
        padding:"6px 14px",fontSize:12,borderRadius:16,border:"none",cursor:"pointer",fontWeight:500,
        background: active ? theme.primaryGlow : theme.cardBg,
        color: active ? "#fff" : theme.textMuted,
        border: active ? `1px solid ${theme.primary}` : `1px solid ${theme.cardBorder}`,
      });
      const inputStyle = {
        width:"100%",padding:"10px 14px",borderRadius:10,border:`1px solid ${theme.inputBorder}`,
        background:theme.inputBg,color:theme.text,fontSize:14,outline:"none",fontFamily:"inherit",
      };
      const labelStyle = { fontSize:11,fontWeight:500,color:theme.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,display:"block" };

      const navTabs = [
        { id: "add", label: "➕ Add" },
        { id: "overview", label: "📊 Overview" },
        { id: "transactions", label: "📋 History" },
        { id: "recurring", label: "🔁 Recurring" },
        { id: "settings", label: "⚙️ Settings" },
      ];

      return (
        <ThemeContext.Provider value={{ theme, themeName, inputStyle, labelStyle, pillStyle, supabase, fetchData, categories, tags, getCatIcon, getCatColor, getTagIcon, getTagColor, shops, recurring, changeTheme }}>
          <div style={{minHeight:"100vh",background:theme.bg,color:theme.text,fontFamily:"'Noto Sans JP', system-ui, sans-serif"}}>
            {/* Header */}
            <div style={{background:theme.headerBg,borderBottom:`1px solid ${theme.cardBorder}`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:theme.textDim}}>家計簿</div>
                <h1 style={{fontSize:18,fontWeight:700,color:"#fff",margin:0}}>Cost Management</h1>
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                {navTabs.map(tab => (
                  <button key={tab.id} onClick={() => { setView(tab.id); setTxPage(0); }} style={{...pillStyle(view===tab.id),padding:"5px 10px",fontSize:11}}>{tab.label}</button>
                ))}
                <div style={{position:"relative"}}>
                  <button onClick={() => setShowThemePicker(!showThemePicker)} style={{...pillStyle(false),padding:"5px 8px",fontSize:14}}>{theme.icon}</button>
                  {showThemePicker && (
                    <>
                      <div style={{position:"fixed",inset:0,zIndex:90}} onClick={() => setShowThemePicker(false)}/>
                      <div style={{position:"absolute",top:"100%",right:0,marginTop:6,background:"#1a1a2e",border:`1px solid ${theme.cardBorder}`,borderRadius:10,padding:6,zIndex:100,minWidth:130}}>
                        {THEME_KEYS.map(key => (
                          <button key={key} onClick={() => changeTheme(key)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"6px 8px",background:themeName===key?`${THEMES[key].primary}20`:"transparent",border:"none",borderRadius:6,cursor:"pointer"}}>
                            <span style={{fontSize:12}}>{THEMES[key].icon}</span>
                            <span style={{color:themeName===key?THEMES[key].primary:"#ccc",fontSize:11}}>{THEMES[key].name}</span>
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* Filters */}
            {(view === "overview" || view === "transactions") && (
              <div style={{padding:"10px 16px",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <select value={yearFilter} onChange={e => setYearFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Years</option>
                  {years.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
                <select value={catFilter} onChange={e => setCatFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Categories</option>
                  {catList.map(c => <option key={c} value={c}>{getCatIcon(c)} {c}</option>)}
                </select>
                <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Types</option>
                  <option value="normal">Normal</option>
                  <option value="fixed">📌 Fixed</option>
                  <option value="outlier">⚡ Outlier</option>
                </select>
                <select value={tagFilter} onChange={e => setTagFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Tags</option>
                  {tags.map(t => <option key={t.name} value={t.name}>{t.icon} {t.name}</option>)}
                </select>
              </div>
            )}

            <div style={{padding:"0 16px 20px"}}>
              {loading ? (
                <div style={{textAlign:"center",padding:50,color:theme.textMuted}}>⏳ Loading…</div>
              ) : view === "add" ? (
                <AddEntryView recentEntries={recentEntries} allExpenses={RAW} />
              ) : view === "overview" ? (
                <OverviewView {...{filtered,totalSpend,monthlyAvg,dailyAvg,monthlyData,catData,topShops}} allExpenses={RAW} />
              ) : view === "transactions" ? (
                <TransactionsView pageTx={pageTx} txPage={txPage} setTxPage={setTxPage} txPages={txPages} />
              ) : view === "recurring" ? (
                <RecurringView />
              ) : (
                <SettingsView allExpenses={RAW} />
              )}
            </div>
          </div>
        </ThemeContext.Provider>
      );
    }

    // ═══════════════════════════════════════════
    //  MULTI-DATE CALENDAR
    // ═══════════════════════════════════════════
    function MultiDateCalendar({ selectedDates, setSelectedDates, onDone, expenses = [] }) {
      const { theme } = useTheme();
      const [isOpen, setIsOpen] = useState(false);
      const [viewDate, setViewDate] = useState(() => {
        const d = new Date();
        return { year: d.getFullYear(), month: d.getMonth() };
      });

      const openCalendar = () => { setIsOpen(true); setSelectedDates([]); };
      const daysInMonth = new Date(viewDate.year, viewDate.month + 1, 0).getDate();
      const firstDayJS = new Date(viewDate.year, viewDate.month, 1).getDay();
      const firstDayOfWeek = firstDayJS === 0 ? 6 : firstDayJS - 1;

      const toggleDate = (day) => {
        const dateStr = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        setSelectedDates(prev => prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr].sort());
      };
      const isSelected = (day) => {
        const dateStr = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        return selectedDates.includes(dateStr);
      };
      const isToday = (day) => {
        const today = new Date();
        return viewDate.year === today.getFullYear() && viewDate.month === today.getMonth() && day === today.getDate();
      };

      // Get expense indicators for a date
      const getDateIndicators = (day) => {
        const dateStr = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const dateExpenses = expenses.filter(e => e.date === dateStr);
        if (dateExpenses.length === 0) return null;
        
        const types = new Set(dateExpenses.map(e => e.expense_type || "normal"));
        const indicators = [];
        if (types.has("fixed")) indicators.push("📌");
        if (types.has("outlier")) indicators.push("⚡");
        if (types.has("normal")) indicators.push("●");
        return indicators;
      };

      const confirmDates = () => {
        if (selectedDates.length === 0) setSelectedDates([todayStr()]);
        setIsOpen(false);
        if (onDone) onDone();
      };

      const displayText = selectedDates.length === 0 ? "Select dates" : selectedDates.length === 1 ? selectedDates[0] : `${selectedDates.length} dates`;

      return (
        <div style={{marginBottom:16}}>
          {!isOpen && (
            <button onClick={openCalendar} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:10,cursor:"pointer",width:"100%",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>📅</span>
                <span style={{fontSize:14,fontWeight:600,color:"#fff"}}>{displayText}</span>
              </div>
              <span style={{color:theme.textMuted,fontSize:12}}>Change ▼</span>
            </button>
          )}
          {isOpen && (
            <div style={{background:theme.cardBg,borderRadius:12,padding:16,border:`1px solid ${theme.cardBorder}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <button onClick={() => setViewDate(v => v.month===0?{year:v.year-1,month:11}:{...v,month:v.month-1})} style={{background:theme.inputBg,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",color:theme.textMuted}}>◀</button>
                <div style={{fontSize:14,fontWeight:600,color:"#fff"}}>{MONTHS_FULL[viewDate.month]} {viewDate.year}</div>
                <button onClick={() => setViewDate(v => v.month===11?{year:v.year+1,month:0}:{...v,month:v.month+1})} style={{background:theme.inputBg,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",color:theme.textMuted}}>▶</button>
              </div>
              {/* Legend */}
              <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:10,fontSize:10,color:theme.textDim}}>
                <span><span style={{color:"#22c55e"}}>●</span> Normal</span>
                <span>📌 Fixed</span>
                <span>⚡ Outlier</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:4,marginBottom:8}}>
                {["Mo","Tu","We","Th","Fr","Sa","Su"].map(d => <div key={d} style={{textAlign:"center",fontSize:10,color:theme.textDim,fontWeight:600,padding:4}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:4}}>
                {Array.from({length:firstDayOfWeek}).map((_,i) => <div key={`e-${i}`}/>)}
                {Array.from({length:daysInMonth}).map((_,i) => {
                  const day = i+1;
                  const sel = isSelected(day);
                  const tod = isToday(day);
                  const indicators = getDateIndicators(day);
                  return (
                    <button key={day} onClick={() => toggleDate(day)} style={{
                      aspectRatio:"1",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:sel?600:400,
                      background:sel?theme.primary:tod?theme.inputBg:"transparent",
                      color:sel?"#fff":tod?theme.primary:theme.text,
                      position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                    }}>
                      <span>{day}</span>
                      {indicators && (
                        <span style={{fontSize:7,lineHeight:1,marginTop:1,display:"flex",gap:1}}>
                          {indicators.map((ind, idx) => (
                            <span key={idx} style={{color: ind === "●" ? "#22c55e" : undefined}}>{ind}</span>
                          ))}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
              {selectedDates.length > 0 && (
                <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:4}}>
                  {selectedDates.map(d => (
                    <span key={d} style={{background:theme.primaryGlow,color:theme.accent,padding:"3px 8px",borderRadius:6,fontSize:11,display:"flex",alignItems:"center",gap:4}}>
                      {d}<button onClick={() => setSelectedDates(prev => prev.filter(x => x !== d))} style={{background:"none",border:"none",color:theme.accent,cursor:"pointer",fontSize:12,padding:0}}>×</button>
                    </span>
                  ))}
                </div>
              )}
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button onClick={() => { setSelectedDates([todayStr()]); setIsOpen(false); if(onDone)onDone(); }} style={{flex:1,background:theme.inputBg,border:`1px solid ${theme.cardBorder}`,borderRadius:8,padding:"10px",fontSize:12,color:theme.textMuted,cursor:"pointer"}}>Today</button>
                <button onClick={confirmDates} style={{flex:1,background:theme.primary,border:"none",borderRadius:8,padding:"10px",fontSize:12,color:"#fff",cursor:"pointer",fontWeight:600}}>Done ({selectedDates.length || 1})</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  TAG SELECTOR (Multi-select chips)
    // ═══════════════════════════════════════════
    function TagSelector({ selectedTags, onChange }) {
      const { theme, tags, getTagIcon, getTagColor } = useTheme();
      const toggle = (name) => {
        onChange(selectedTags.includes(name) ? selectedTags.filter(t => t !== name) : [...selectedTags, name]);
      };
      return (
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {tags.map(tag => {
            const sel = selectedTags.includes(tag.name);
            return (
              <button key={tag.name} onClick={() => toggle(tag.name)} style={{
                padding:"5px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,
                display:"flex",alignItems:"center",gap:4,
                background:sel?`${tag.color}30`:theme.cardBg,
                color:sel?tag.color:theme.textMuted,
                outline:sel?`2px solid ${tag.color}`:`1px solid ${theme.cardBorder}`,
              }}>
                <span>{tag.icon}</span>{tag.name}
              </button>
            );
          })}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  ADD ENTRY VIEW
    // ═══════════════════════════════════════════
    // ═══════════════════════════════════════════
    //  ADD ENTRY VIEW  (redesigned: Quick / Same shop / Different)
    // ═══════════════════════════════════════════
    function AddEntryView({ recentEntries, allExpenses }) {
      const { theme, supabase, fetchData, categories, shops, tags } = useTheme();
      const C = {
        text: theme.text, muted: theme.textMuted, dim: theme.textDim,
        card: theme.cardBg, border: theme.cardBorder, input: theme.inputBg, primary: theme.primary,
      };
      const ADD_EMOJI = ["🛒","🏪","🍜","🌏","☕","🧹","🚗","🏠","📦","🍕","💊","🎮","📚","👕","💡","✈️","🎁","💰","🍎","🛍️"];
      const ADD_COLOR = ["#2563eb","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#14b8a6","#a78bfa","#64748b","#84cc16"];
      const today = new Date(); const yest = new Date(Date.now() - 86400000);
      const isoOfDate = (d) => d.toISOString().slice(0, 10);
      const blankRow = (d) => ({ date: d, cat: null, shop: null, type: "normal", tags: [], amount: "" });

      const [mode, setMode] = useState("quick"); // quick | same | list
      const [amount, setAmount] = useState("");
      const [dates, setDates] = useState([isoOfDate(today)]);
      const [cat, setCat] = useState(null);
      const [shop, setShop] = useState(null);
      const [etype, setEtype] = useState("normal");
      const [etags, setEtags] = useState([]);
      const [rows, setRows] = useState([]);
      const [activeRow, setActiveRow] = useState(-1); // expanded review row (multi); -1 = none
      const [catSheetOpen, setCatSheetOpen] = useState(false);
      const [shopSheetOpen, setShopSheetOpen] = useState(false);
      const [calOpen, setCalOpen] = useState(false);
      const [padOpen, setPadOpen] = useState(false);
      const [tagsOpen, setTagsOpen] = useState(false);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [flash, setFlash] = useState(null);
      const [toast, setToast] = useState(null);
      const [newCatOpen, setNewCatOpen] = useState(false);
      const [newCat, setNewCat] = useState({ name: "", icon: "📦", color: "#8b5cf6" });
      const [newShopOpen, setNewShopOpen] = useState(false);
      const [newShop, setNewShop] = useState({ name: "", fav: false });
      const [dupDialog, setDupDialog] = useState(null); // { multi, queue: [{ record, existing, rowIdx }], idx, kept, view }

      const isDiff = mode === "list";
      const isSame = mode === "same";
      const isMulti = isDiff || isSame;
      const activeIdx = activeRow >= 0 && activeRow < rows.length ? activeRow : -1;
      const aRow = activeIdx >= 0 ? rows[activeIdx] : null;

      const curAmountStr = isMulti ? (aRow ? aRow.amount : "") : amount;
      const curCat = isDiff ? (aRow ? aRow.cat : null) : cat;
      const curShop = isDiff ? (aRow ? aRow.shop : null) : shop;
      const curType = isDiff ? (aRow ? aRow.type : "normal") : etype;
      const curTags = isDiff ? (aRow ? aRow.tags : []) : etags;

      const catObj = categories.find((c) => c.name === curCat);
      const accent = catObj ? catObj.color : theme.primary;
      const favSort = (a, b) => (b.is_favorite ? 1 : 0) - (a.is_favorite ? 1 : 0);
      const catShops = shops.filter((s) => s.category === curCat).sort(favSort);
      const amt = Number(curAmountStr) || 0;
      const valid = amt > 0 && curCat && curShop;

      const whenLabel = (s) => s === isoOfDate(today) ? "Today" : s === isoOfDate(yest) ? "Yesterday"
        : `${MONTHS_SHORT[Number(s.slice(5, 7))]} ${Number(s.slice(8, 10))}`;
      const dateLabel = isMulti
        ? (rows.length === 0 ? "Select days" : rows.length === 1 ? whenLabel(rows[0].date) : `${rows.length} days`)
        : whenLabel(dates[0]);

      const updRow = (patch) => { if (activeIdx < 0) return; setRows((rs) => rs.map((r, i) => (i === activeIdx ? { ...r, ...patch } : r))); };
      const press = (key) => {
        setSaved(false);
        const apply = (a) => key === "del" ? a.slice(0, -1) : key === "00" ? (a === "" ? "" : (a.length < 8 ? a + "00" : a)) : (a.length < 9 ? (a === "0" ? key : a + key) : a);
        if (isMulti) { if (activeIdx < 0) return; setRows((rs) => rs.map((r, i) => (i === activeIdx ? { ...r, amount: apply(r.amount) } : r))); } else setAmount((a) => apply(a));
      };
      const setCurCat = (name) => { if (isDiff) updRow({ cat: name, shop: null }); else { setCat(name); setShop(null); } };
      const setCurShop = (name) => { if (isDiff) updRow({ shop: name }); else setShop(name); };
      const setCurType = (t) => { if (isDiff) updRow({ type: t }); else setEtype(t); };
      const setCurTags = (list) => { if (isDiff) updRow({ tags: list }); else setEtags(list); };
      const pickCat = (c) => { setCurCat(c.name); setNewCatOpen(false); setNewShopOpen(false); setCatSheetOpen(false); setShopSheetOpen(true); };
      const pickShop = (name) => { setCurShop(name); setNewShopOpen(false); setShopSheetOpen(false); };

      // the multi-date selection drives the review list: one editable row per picked day,
      // keeping whatever was already entered for days that stay selected
      const applyDates = (ds) => {
        const uniq = [...new Set(ds)].sort();
        setRows((prev) => uniq.map((d) => prev.find((r) => r.date === d) || blankRow(d)));
        setActiveRow(-1);
      };
      const openCal = () => { if (isMulti) setDates([...new Set(rows.map((r) => r.date))].sort()); setCalOpen(true); };
      const removeRow = (i) => {
        setRows((rs) => rs.filter((_, j) => j !== i));
        setActiveRow((a) => (a === i ? -1 : i < a ? a - 1 : a));
      };

      const switchMode = (m) => {
        setMode(m); setCalOpen(false); setNewCatOpen(false); setNewShopOpen(false); setCatSheetOpen(false); setShopSheetOpen(false); setPadOpen(false); setActiveRow(-1); setDupDialog(null);
        if (m === "quick") setDates([isoOfDate(today)]); else setDates([]);
      };

      const showToast = (type, msg) => { setToast({ type, msg }); setTimeout(() => setToast(null), 3000); };
      const insertExpenses = async (records) => {
        setSaving(true);
        const { error } = await supabase.from("cost_management_expenses").insert(records);
        setSaving(false);
        if (error) { showToast("error", error.message); return false; }
        await fetchData();
        return true;
      };

      // ── duplicate detection: same date + same shop + same amount already in the table ──
      const findDuplicate = (date, shopName, amountVal) =>
        allExpenses.find((e) => e.date === date && e.shop === shopName && Number(e.amount) === Number(amountVal)) || null;

      const commitQuick = async (records) => {
        const ok = await insertExpenses(records);
        if (!ok) return;
        setSaved(true); setFlash(fmt(records.reduce((s, r) => s + r.amount, 0)));
        setTimeout(() => { setAmount(""); setShop(null); setCat(null); setEtags([]); setEtype("normal"); setTagsOpen(false); setSaved(false); }, 900);
        setTimeout(() => setFlash(null), 1700);
      };
      const save = () => {
        if (!valid || saving) return;
        const record = { date: dates[0], category: cat, shop, amount: amt, notes: "", expense_type: etype, tags: (etags || []).join(",") };
        const existing = findDuplicate(record.date, record.shop, record.amount);
        if (existing) { setDupDialog({ multi: false, queue: [{ record, existing }], idx: 0, kept: [], view: false }); return; }
        commitQuick([record]);
      };
      const rowCatOf = (r) => (isSame ? cat : r.cat);
      const rowShopOf = (r) => (isSame ? shop : r.shop);
      const isRowFilled = (r) => rowCatOf(r) && rowShopOf(r) && Number(r.amount) > 0;
      const buildRecord = (r) => ({ date: r.date, category: rowCatOf(r), shop: rowShopOf(r), amount: Number(r.amount), notes: "", expense_type: isSame ? etype : (r.type || "normal"), tags: ((isSame ? etags : r.tags) || []).join(",") });
      const filledEntries = rows.map((r, i) => ({ r, i })).filter(({ r }) => isRowFilled(r));
      const rowsTotal = rows.reduce((s, r) => s + Number(r.amount || 0), 0);

      const commitMulti = async (entries) => { // entries: [{ record, rowIdx }] — saved rows leave the list, the rest stay editable
        if (!entries.length) return;
        const ok = await insertExpenses(entries.map((e) => e.record));
        if (!ok) return;
        const savedIdx = new Set(entries.map((e) => e.rowIdx));
        const remaining = rows.filter((_, i) => !savedIdx.has(i));
        setSaved(true);
        setFlash(`${entries.length} item${entries.length > 1 ? "s" : ""} · ${fmt(entries.reduce((s, e) => s + e.record.amount, 0))}`);
        setTimeout(() => {
          setRows(remaining); setActiveRow(-1); setSaved(false);
          if (!remaining.length && isSame) { setShop(null); setCat(null); setEtags([]); setEtype("normal"); }
        }, 900);
        setTimeout(() => setFlash(null), 1700);
      };
      const saveMulti = () => {
        if (!filledEntries.length || saving) return;
        commitMulti(filledEntries.map(({ r, i }) => ({ record: buildRecord(r), rowIdx: i })));
      };

      // Add-anyway / Cancel for the entry the duplicate dialog is showing;
      // when the queue is exhausted, insert whatever was kept
      const dupAdvance = (keep) => {
        const d = dupDialog; if (!d) return;
        const cur = d.queue[d.idx];
        const kept = keep ? [...d.kept, { record: cur.record, rowIdx: cur.rowIdx }] : d.kept;
        if (d.idx + 1 < d.queue.length) { setDupDialog({ ...d, kept, idx: d.idx + 1, view: false }); return; }
        setDupDialog(null);
        if (d.multi) commitMulti(kept);
        else if (kept.length) commitQuick(kept.map((k) => k.record));
      };

      const addCategory = async () => {
        const name = newCat.name.trim(); if (!name) return;
        const existing = categories.find((c) => c.name.toLowerCase() === name.toLowerCase());
        if (!existing) {
          const { error } = await supabase.from("cost_management_categories").insert({ name, icon: newCat.icon, color: newCat.color, sort_order: categories.length + 1 });
          if (error) { showToast("error", error.message.includes("duplicate") ? "Exists" : error.message); return; }
          await fetchData();
        }
        setNewCat({ name: "", icon: "📦", color: "#8b5cf6" });
        pickCat(existing || { name });
      };
      const addShop = async () => {
        const name = newShop.name.trim(); if (!name || !curCat) return;
        if (!shops.some((s) => s.name === name && s.category === curCat)) {
          const { error } = await supabase.from("cost_management_shops").insert({ name, category: curCat, is_favorite: newShop.fav });
          if (error) { showToast("error", error.message.includes("duplicate") ? "Shop exists" : error.message); return; }
          await fetchData();
        }
        setNewShop({ name: "", fav: false });
        pickShop(name);
      };
      const repeat = (e) => { if (isDiff) updRow({ cat: e.category, shop: e.shop, amount: String(e.amount) }); else if (isSame) { setCat(e.category); setShop(e.shop); updRow({ amount: String(e.amount) }); } else { setCat(e.category); setShop(e.shop); setAmount(String(e.amount)); } };

      // styles
      const chip = (active, color) => ({ padding: "9px 13px", borderRadius: 11, border: "none", cursor: "pointer", fontSize: 13, fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, transition: "all .15s", display: "flex", alignItems: "center", gap: 6, background: active ? `${color}26` : C.input, color: active ? "#fff" : C.muted, boxShadow: active ? `inset 0 0 0 1.5px ${color}` : `inset 0 0 0 1px ${C.border}` });
      const sLbl = { fontSize: 10.5, letterSpacing: 1.4, textTransform: "uppercase", color: C.dim, margin: "0 0 9px", fontWeight: 600 };
      const closeBtn = { border: "none", background: C.input, color: C.muted, width: 30, height: 30, borderRadius: 15, fontSize: 17, cursor: "pointer", boxShadow: `inset 0 0 0 1px ${C.border}`, flexShrink: 0 };
      const newChip = (on) => ({ padding: "8px 12px", borderRadius: 11, cursor: "pointer", fontSize: 13, fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0, display: "flex", alignItems: "center", gap: 5, color: theme.primary, fontWeight: 600, background: on ? `${theme.primary}22` : "transparent", border: `1.5px dashed ${on ? theme.primary : theme.primary + "70"}` });
      const creatorCard = { marginTop: 12, background: C.card, borderRadius: 14, padding: 14, boxShadow: `inset 0 0 0 1px ${C.border}` };
      const fieldInput = { width: "100%", padding: "11px 13px", borderRadius: 11, border: "none", background: C.input, color: "#fff", fontSize: 14.5, fontFamily: "inherit", boxShadow: `inset 0 0 0 1px ${C.border}`, outline: "none" };
      const emojiBtn = (on) => ({ width: 34, height: 34, borderRadius: 9, border: "none", cursor: "pointer", fontSize: 16, background: on ? `${theme.primary}26` : C.input, boxShadow: on ? `inset 0 0 0 1.5px ${theme.primary}` : `inset 0 0 0 1px ${C.border}` });
      const swatch = (col, on) => ({ width: 28, height: 28, borderRadius: 8, border: on ? "2px solid #fff" : "none", background: col, cursor: "pointer", boxShadow: on ? "0 0 0 2px rgba(255,255,255,0.18)" : "none" });
      const ghostBtn = { flex: 1, height: 44, borderRadius: 12, border: "none", background: C.input, color: C.muted, fontSize: 13.5, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", boxShadow: `inset 0 0 0 1px ${C.border}` };
      const okBtn = (en) => ({ flex: 2, height: 44, borderRadius: 12, border: "none", color: en ? "#fff" : C.dim, fontSize: 13.5, fontWeight: 700, cursor: en ? "pointer" : "not-allowed", fontFamily: "inherit", background: en ? `linear-gradient(135deg, ${theme.primary}, ${theme.accent})` : C.input });
      const ctaStyle = (en) => ({ width: "100%", height: 54, borderRadius: 15, border: "none", fontFamily: "inherit", fontSize: 16, fontWeight: 700, cursor: en && !saving ? "pointer" : "not-allowed", transition: "all .2s", background: saved ? theme.success : en ? `linear-gradient(135deg, ${accent}, ${theme.accent})` : C.input, boxShadow: en && !saved ? `0 8px 24px ${accent}44` : "none", color: en || saved ? "#fff" : C.dim, opacity: saving ? 0.7 : 1 });

      // ── compact entry chips — the grid lives in the bottom sheets below ──
      const catChipsRow = (
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => { setShopSheetOpen(false); setCatSheetOpen(true); }} style={{ ...chip(!!curCat, accent), flex: 1, justifyContent: "center", minWidth: 0 }}>
            <span style={{ fontSize: 15 }}>{catObj ? catObj.icon : "📂"}</span>
            <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{curCat || "Category"}</span>
          </button>
          <button onClick={() => { if (curCat) setShopSheetOpen(true); else setCatSheetOpen(true); }} style={{ ...chip(!!curShop, accent), flex: 1, justifyContent: "center", minWidth: 0 }}>
            <span style={{ fontSize: 15 }}>🏪</span>
            <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{curShop || "Shop"}</span>
          </button>
        </div>
      );

      const typeRow = (
        <div style={{ display: "flex", gap: 8 }}>
          {Object.entries(EXPENSE_TYPES).map(([key, cfg]) => (
            <button key={key} onClick={() => setCurType(key)} style={{ ...chip(curType === key, cfg.color !== "transparent" ? cfg.color : theme.primary), flex: 1, justifyContent: "center", padding: "7px 8px", fontSize: 12 }}>{cfg.icon} {cfg.label}</button>
          ))}
        </div>
      );

      const tagsRow = (
        <div>
          <button onClick={() => setTagsOpen((o) => !o)} style={{ ...sLbl, marginBottom: tagsOpen ? 7 : 0, background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 6 }}>
            Tags {(curTags || []).length > 0 && <span style={{ color: accent }}>· {curTags.length}</span>} <span style={{ fontSize: 9 }}>{tagsOpen ? "▴" : "▾"}</span>
          </button>
          {tagsOpen && (
            <div className="cm-slide-in" style={{ marginTop: 4 }}>
              <TagSelector selectedTags={curTags || []} onChange={setCurTags} />
            </div>
          )}
        </div>
      );

      // ── category bottom sheet (full grid + new-category creator) ──
      const catSheet = catSheetOpen && (
        <Modal sheet onClose={() => { setCatSheetOpen(false); setNewCatOpen(false); }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ ...sLbl, margin: 0 }}>Category</div>
            <button onClick={() => { setCatSheetOpen(false); setNewCatOpen(false); }} style={closeBtn}>×</button>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {categories.map((c) => (
              <button key={c.id || c.name} onClick={() => pickCat(c)} style={chip(curCat === c.name, c.color)}>
                <span style={{ fontSize: 15 }}>{c.icon}</span>{c.name}
              </button>
            ))}
            <button onClick={() => { setNewCatOpen((o) => !o); setNewShopOpen(false); }} style={newChip(newCatOpen)}>＋ New</button>
          </div>
          {newCatOpen && (
            <div className="cm-slide-in" style={creatorCard}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ width: 38, height: 38, borderRadius: 11, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 19, flexShrink: 0, background: `${newCat.color}22`, boxShadow: `inset 0 0 0 1.5px ${newCat.color}` }}>{newCat.icon}</span>
                <input value={newCat.name} onChange={(e) => setNewCat((n) => ({ ...n, name: e.target.value }))} placeholder="Category name" style={fieldInput} />
              </div>
              <div style={{ ...sLbl, marginBottom: 7 }}>Icon</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 13 }}>
                {ADD_EMOJI.map((em) => <button key={em} onClick={() => setNewCat((n) => ({ ...n, icon: em }))} style={emojiBtn(newCat.icon === em)}>{em}</button>)}
              </div>
              <div style={{ ...sLbl, marginBottom: 7 }}>Color</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 15 }}>
                {ADD_COLOR.map((col) => <button key={col} onClick={() => setNewCat((n) => ({ ...n, color: col }))} style={swatch(col, newCat.color === col)} />)}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setNewCatOpen(false)} style={ghostBtn}>Cancel</button>
                <button onClick={addCategory} disabled={!newCat.name.trim()} style={okBtn(!!newCat.name.trim())}>Add category</button>
              </div>
            </div>
          )}
        </Modal>
      );

      // ── shop bottom sheet (filtered to the picked category + new-shop creator) ──
      const shopSheet = shopSheetOpen && (
        <Modal sheet onClose={() => { setShopSheetOpen(false); setNewShopOpen(false); }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <button onClick={() => { setShopSheetOpen(false); setNewShopOpen(false); setCatSheetOpen(true); }} style={{ border: "none", background: "none", color: C.muted, cursor: "pointer", fontSize: 12.5, fontWeight: 600, padding: 0, fontFamily: "inherit" }}>‹ Categories</button>
            <button onClick={() => { setShopSheetOpen(false); setNewShopOpen(false); }} style={closeBtn}>×</button>
          </div>
          <div style={sLbl}>{catObj ? `${catObj.icon} ${curCat} · shops` : "Pick a category first"}</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {catShops.map((s) => (
              <button key={s.id || s.name} onClick={() => pickShop(s.name)} style={chip(curShop === s.name, accent)}>{s.is_favorite ? "⭐ " : ""}{s.name}</button>
            ))}
            <button onClick={() => { setNewShopOpen((o) => !o); setNewCatOpen(false); }} style={newChip(newShopOpen)}>＋ New shop</button>
          </div>
          {newShopOpen && (
            <div className="cm-slide-in" style={creatorCard}>
              <input value={newShop.name} onChange={(e) => setNewShop((s) => ({ ...s, name: e.target.value }))} placeholder={`New shop in ${curCat}`} style={fieldInput} />
              <label style={{ display: "flex", alignItems: "center", gap: 9, margin: "13px 2px 15px", fontSize: 13.5, color: C.muted, cursor: "pointer" }}>
                <input type="checkbox" checked={newShop.fav} onChange={(e) => setNewShop((s) => ({ ...s, fav: e.target.checked }))} style={{ width: 17, height: 17, accentColor: accent }} />
                ⭐ Mark as favorite (shows first)
              </label>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setNewShopOpen(false)} style={ghostBtn}>Cancel</button>
                <button onClick={addShop} disabled={!newShop.name.trim()} style={okBtn(!!newShop.name.trim())}>Add shop</button>
              </div>
            </div>
          )}
        </Modal>
      );

      // ── non-blocking duplicate warning: Add anyway / View / Cancel ──
      const dupModal = dupDialog && (() => {
        const cur = dupDialog.queue[dupDialog.idx];
        const ex = cur.existing;
        const exType = EXPENSE_TYPES[ex.expense_type || "normal"] || EXPENSE_TYPES.normal;
        const dlgBtn = { flex: 1, padding: "10px 6px", borderRadius: 9, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit" };
        return (
          <Modal onClose={() => dupAdvance(false)}>
            <h4 style={{ color: theme.warning, fontSize: 14, margin: "0 0 8px" }}>⚠ Possible duplicate{dupDialog.queue.length > 1 ? ` · ${dupDialog.idx + 1} of ${dupDialog.queue.length}` : ""}</h4>
            <p style={{ fontSize: 13, color: theme.text, margin: "0 0 12px", lineHeight: 1.55 }}>
              <b>{fmt(cur.record.amount)}</b> at <b>{cur.record.shop}</b> already logged on <b>{cur.record.date}</b>.
            </p>
            {dupDialog.view && (
              <div className="cm-slide-in" style={{ background: theme.inputBg, borderRadius: 10, padding: 12, marginBottom: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", color: theme.textDim, marginBottom: 8 }}>Existing entry</div>
                {[["Date", ex.date], ["Shop", ex.shop], ["Amount", fmt(ex.amount)], ["Type", `${exType.icon ? exType.icon + " " : ""}${exType.label}`], ["Notes", ex.notes || "—"]].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 10, fontSize: 12, padding: "3px 0" }}>
                    <span style={{ color: theme.textMuted }}>{k}</span>
                    <span style={{ color: "#fff", fontWeight: 500, textAlign: "right" }}>{v}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => dupAdvance(false)} style={{ ...dlgBtn, background: "transparent", color: theme.textMuted, boxShadow: `inset 0 0 0 1px ${theme.cardBorder}` }}>Cancel</button>
              <button onClick={() => setDupDialog((d) => ({ ...d, view: !d.view }))} style={{ ...dlgBtn, background: theme.inputBg, color: "#fff", boxShadow: `inset 0 0 0 1px ${theme.cardBorder}` }}>{dupDialog.view ? "Hide" : "View"}</button>
              <button onClick={() => dupAdvance(true)} style={{ ...dlgBtn, background: `linear-gradient(135deg, ${theme.primary}, ${theme.accent})`, color: "#fff" }}>Add anyway</button>
            </div>
          </Modal>
        );
      })();

      const keypad = (h) => (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>
          {["7","8","9","4","5","6","1","2","3","00","0","del"].map((k) => (
            <button key={k} className="cm-chip" onClick={() => press(k)} style={{ height: h, borderRadius: 12, border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: k === "del" ? 18 : 22, fontWeight: 600, color: k === "del" ? C.muted : "#fff", background: theme.inputBg, boxShadow: `inset 0 0 0 1px ${C.border}` }}>{k === "del" ? "⌫" : k}</button>
          ))}
        </div>
      );

      // ── per-entry editable review list (multi modes): tap a row to edit it inline ──
      const reviewList = (
        <div style={{ marginTop: 2, marginBottom: 16 }}>
          {isSame && (
            <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ ...sLbl, margin: 0 }}>Shop · applies to every day</div>
              {catChipsRow}
              {typeRow}
              {tagsRow}
            </div>
          )}
          <div style={sLbl}>Entries · {rows.length}{rowsTotal > 0 ? ` · ${fmt(rowsTotal)}` : ""}</div>
          {rows.length === 0 ? (
            <div style={{ padding: "18px 14px", borderRadius: 12, background: C.card, boxShadow: `inset 0 0 0 1px ${C.border}`, fontSize: 12.5, color: C.dim, textAlign: "center" }}>
              Pick days with the date control above — one editable entry per day shows up here.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {rows.map((r, i) => {
                const rCat = rowCatOf(r), rShop = rowShopOf(r);
                const rc = categories.find((c) => c.name === rCat);
                const expanded = i === activeIdx;
                const ringColor = rc ? rc.color : theme.primary;
                const rType = isSame ? etype : (r.type || "normal");
                return (
                  <div key={i} style={{ borderRadius: 12, background: expanded ? `${ringColor}14` : C.input, boxShadow: expanded ? `inset 0 0 0 1.5px ${ringColor}` : `inset 0 0 0 1px ${C.border}` }}>
                    <div onClick={() => setActiveRow(expanded ? -1 : i)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", cursor: "pointer" }}>
                      <span style={{ fontSize: 10.5, fontWeight: 700, color: expanded ? "#fff" : C.muted, minWidth: 56 }}>{whenLabel(r.date)}</span>
                      <span style={{ width: 26, height: 26, borderRadius: 8, background: `${rc ? rc.color : "#888"}22`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{rc ? rc.icon : "▫"}</span>
                      <span style={{ flex: 1, minWidth: 0, fontSize: 13, color: rShop ? C.text : C.dim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{rShop || (isSame ? "set the shop above" : "tap to set shop")}</span>
                      {EXPENSE_TYPES[rType]?.icon && <span style={{ fontSize: 12 }}>{EXPENSE_TYPES[rType].icon}</span>}
                      <span style={{ fontSize: 13.5, fontWeight: 700, color: r.amount ? "#fff" : C.dim }}>{r.amount ? fmt(Number(r.amount)) : "¥–"}</span>
                      <button onClick={(e) => { e.stopPropagation(); removeRow(i); }} style={{ border: "none", background: "none", color: C.dim, cursor: "pointer", fontSize: 17, lineHeight: 1, padding: "0 2px" }}>×</button>
                    </div>
                    {expanded && (
                      <div className="cm-slide-in" style={{ padding: "2px 12px 12px", display: "flex", flexDirection: "column", gap: 10 }}>
                        <input type="date" value={r.date} onChange={(e) => e.target.value && updRow({ date: e.target.value })} style={{ ...fieldInput, colorScheme: "dark" }} />
                        {isDiff && catChipsRow}
                        {keypad(42)}
                        {isDiff && typeRow}
                        {isDiff && tagsRow}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {rows.length > 0 && (
            <div style={{ marginTop: 12, fontSize: 11, color: C.dim, textAlign: "center" }}>{isSame ? "Tap a day to edit its amount or date" : "Tap a row to set its shop, amount, date & type"}</div>
          )}
        </div>
      );

      const recentBlock = recentEntries && recentEntries.length > 0 ? (
        <div style={{ marginTop: 22 }}>
          <div style={sLbl}>Recent · tap to repeat</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            {recentEntries.slice(0, 5).map((e) => {
              const ec = categories.find((c) => c.name === e.category);
              return (
                <button key={e.id} onClick={() => repeat(e)} style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 4px", background: "none", border: "none", borderBottom: `1px solid ${C.border}`, cursor: "pointer", textAlign: "left", width: "100%" }}>
                  <span style={{ width: 30, height: 30, borderRadius: 9, background: `${ec ? ec.color : "#888"}22`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0 }}>{ec ? ec.icon : "📦"}</span>
                  <span style={{ flex: 1, minWidth: 0 }}>
                    <span style={{ display: "block", fontSize: 13.5, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.shop}</span>
                    <span style={{ display: "block", fontSize: 10.5, color: C.dim }}>{e.category} · {whenLabel(e.date)}</span>
                  </span>
                  <span style={{ fontSize: 13.5, fontWeight: 700, color: "#fff" }}>{fmt(e.amount)}</span>
                  <span style={{ color: C.dim, fontSize: 15, marginLeft: 2 }}>↻</span>
                </button>
              );
            })}
          </div>
        </div>
      ) : null;
      return (
        <div style={{ maxWidth: 460, margin: "0 auto", position: "relative" }}>
          {toast && (
            <div className="cm-toast" style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", zIndex: 999, padding: "12px 20px", borderRadius: 10, fontSize: 13, fontWeight: 500, background: toast.type === "success" ? theme.success : theme.danger, color: "#fff" }}>
              {toast.type === "success" ? "✅" : "❌"} {toast.msg}
            </div>
          )}
          {flash && (
            <div className="cm-fade" style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, background: "rgba(8,11,22,0.8)", backdropFilter: "blur(6px)" }}>
              <div style={{ width: 76, height: 76, borderRadius: 38, background: theme.success, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M10 20l6 6 12-13" stroke="#fff" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round" /></svg>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>Added {flash}</div>
            </div>
          )}

          {/* mode switcher */}
          <div style={{ display: "flex", gap: 3, padding: 3, background: theme.headerBg, borderRadius: 12, border: `1px solid ${C.border}`, marginTop: 8 }}>
            {[{ k: "quick", label: "Quick", sub: "one entry" }, { k: "same", label: "Same shop", sub: "many days" }, { k: "list", label: "Different", sub: "many shops" }].map((m) => (
              <button key={m.k} onClick={() => switchMode(m.k)} style={{ flex: 1, padding: "6px 4px", borderRadius: 9, border: "none", cursor: "pointer", fontFamily: "inherit", background: mode === m.k ? theme.primaryGlow : "transparent", boxShadow: mode === m.k ? `inset 0 0 0 1px ${theme.primary}` : "none" }}>
                <div style={{ fontSize: 12.5, fontWeight: 700, color: mode === m.k ? "#fff" : C.muted }}>{m.label}</div>
                <div style={{ fontSize: 8.5, color: mode === m.k ? "rgba(255,255,255,0.7)" : C.dim, marginTop: 1 }}>{m.sub}</div>
              </button>
            ))}
          </div>

          {/* date control — on top, all modes; single date for Quick, multi-date otherwise */}
          <div style={{ marginTop: 12 }}>
            <button onClick={() => (calOpen ? setCalOpen(false) : openCal())} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 14px", borderRadius: 12, border: "none", cursor: "pointer", fontFamily: "inherit", background: C.input, boxShadow: `inset 0 0 0 1px ${C.border}` }}>
              <span style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, fontWeight: 600, color: "#fff" }}>📅 {dateLabel}</span>
              <span style={{ color: C.muted, fontSize: 11 }}>{calOpen ? "▴" : "▾"}</span>
            </button>
            {calOpen && (
              <div className="cm-slide-in" style={{ marginTop: 8 }}>
                <AddCalSheet dates={dates} setDates={setDates} today={today} yest={yest} C={C} chip={chip} theme={theme}
                  single={!isMulti} confirmLabel={isMulti ? "Use these days" : "Done"}
                  onClose={() => { if (isMulti) applyDates(dates); setCalOpen(false); }} />
              </div>
            )}
          </div>

          {/* amount hero — tap to open the keypad (quick only) */}
          {!isMulti && (
            <div onClick={() => setPadOpen((o) => !o)} style={{ padding: "14px 0 12px", textAlign: "center", cursor: "pointer" }}>
              <div style={{ fontSize: 50, fontWeight: 700, letterSpacing: -2, lineHeight: 1, color: amt > 0 ? "#fff" : C.dim, display: "inline-flex", alignItems: "center", gap: 8, padding: "2px 14px", borderRadius: 14, boxShadow: padOpen ? `inset 0 0 0 1.5px ${accent}66` : "none", transition: "box-shadow .15s" }}>{amt > 0 ? fmt(amt) : "¥0"}</div>
              <div style={{ fontSize: 12.5, color: C.muted, marginTop: 8, minHeight: 18 }}>
                {curCat && curShop ? <span><span style={{ color: catObj.color }}>{catObj.icon} {curCat}</span> · {curShop}{!padOpen && amt === 0 ? <span style={{ color: C.dim }}> · tap ¥ to enter amount</span> : ""}</span>
                  : curCat ? <span style={{ color: catObj.color }}>{catObj.icon} {curCat} — pick a shop</span>
                  : "Tap ¥ for the keypad · pick a category"}
              </div>
            </div>
          )}

          {/* numpad — only when the amount is tapped */}
          {padOpen && !isMulti && (
            <div className="cm-sheet-in" style={{ padding: "0 0 12px" }}>{keypad(48)}</div>
          )}

          {/* entry body */}
          <div>
            {isMulti && reviewList}
            {mode === "quick" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {catChipsRow}
                {typeRow}
                {tagsRow}
              </div>
            )}
          </div>

          {/* action bar */}
          <div style={{ padding: "6px 0 24px" }}>
            {!isMulti ? (
              <button onClick={save} disabled={!valid || saving} style={ctaStyle(valid)}>
                {saving ? "Saving…" : saved ? "✓ Saved" : valid ? `Add ${fmt(amt)} · ${dateLabel}` : "Enter amount, category & shop"}
              </button>
            ) : (
              <button onClick={saveMulti} disabled={!filledEntries.length || saving} style={ctaStyle(!!filledEntries.length)}>
                {saving ? "Saving…" : saved ? "✓ Saved" : filledEntries.length ? `Save all (${filledEntries.length}) · ${fmt(filledEntries.reduce((s, e) => s + Number(e.r.amount), 0))}` : (isSame ? "Set a shop & amounts" : "Fill in shops & amounts")}
              </button>
            )}
          </div>

          {recentBlock}
          {catSheet}
          {shopSheet}
          {dupModal}
        </div>
      );
    }

    // compact multi-date picker sheet for the Add screen
    function AddCalSheet({ dates, setDates, today, yest, C, chip, theme, onClose, confirmLabel = "Done", single = false }) {
      const [view, setView] = useState({ y: today.getFullYear(), m: today.getMonth() });
      const dim = new Date(view.y, view.m + 1, 0).getDate();
      const fd = (new Date(view.y, view.m, 1).getDay() + 6) % 7;
      const isoOf = (day) => `${view.y}-${String(view.m + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      const toggle = (day) => {
        const s = isoOf(day);
        if (single) { setDates([s]); onClose(); return; }
        setDates((p) => p.includes(s) ? p.filter((x) => x !== s) : [...p, s].sort());
      };
      const quick = (d) => { const s = d.toISOString().slice(0, 10); setDates([s]); if (single) onClose(); };
      return (
        <div style={{ background: C.card, borderRadius: 16, padding: 14, boxShadow: `inset 0 0 0 1px ${C.border}` }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
            <button onClick={() => quick(today)} style={{ ...chip(dates.length === 1 && dates[0] === today.toISOString().slice(0, 10), theme.primary), flex: 1, justifyContent: "center" }}>Today</button>
            <button onClick={() => quick(yest)} style={{ ...chip(dates.length === 1 && dates[0] === yest.toISOString().slice(0, 10), theme.primary), flex: 1, justifyContent: "center" }}>Yesterday</button>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <button onClick={() => setView((v) => v.m === 0 ? { y: v.y - 1, m: 11 } : { ...v, m: v.m - 1 })} style={{ background: C.input, border: "none", color: C.muted, width: 28, height: 28, borderRadius: 8, cursor: "pointer" }}>◀</button>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>{MONTHS_FULL[view.m]} {view.y}</span>
            <button onClick={() => setView((v) => v.m === 11 ? { y: v.y + 1, m: 0 } : { ...v, m: v.m + 1 })} style={{ background: C.input, border: "none", color: C.muted, width: 28, height: 28, borderRadius: 8, cursor: "pointer" }}>▶</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
            {["M","T","W","T","F","S","S"].map((d, i) => <div key={i} style={{ textAlign: "center", fontSize: 9, color: C.dim, padding: 2 }}>{d}</div>)}
            {Array.from({ length: fd }).map((_, i) => <div key={"e" + i} />)}
            {Array.from({ length: dim }).map((_, i) => {
              const day = i + 1; const sel = dates.includes(isoOf(day));
              return (
                <button key={day} onClick={() => toggle(day)} style={{ aspectRatio: "1", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, background: sel ? theme.primary : "transparent", color: sel ? "#fff" : C.text, fontWeight: sel ? 700 : 400 }}>{day}</button>
              );
            })}
          </div>
          <button onClick={onClose} style={{ width: "100%", marginTop: 10, height: 38, borderRadius: 11, border: "none", background: dates.length ? theme.primary : C.input, color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
            {confirmLabel}{dates.length > 1 ? ` · ${dates.length} days` : ""}
          </button>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  SETTINGS VIEW (Categories + Tags + Recurring)
    // ═══════════════════════════════════════════
    function SettingsView({ allExpenses }) {
      const { theme, inputStyle, labelStyle, supabase, fetchData, categories, tags, shops, getCatIcon } = useTheme();
      const [activeTab, setActiveTab] = useState("categories");
      const [toast, setToast] = useState(null);

      // Category state
      const [editingCat, setEditingCat] = useState(null);
      const [newCat, setNewCat] = useState({ name: "", icon: "📦", color: "#8b5cf6" });
      const [showAddCat, setShowAddCat] = useState(false);

      // Tag state
      const [editingTag, setEditingTag] = useState(null);
      const [newTag, setNewTag] = useState({ name: "", icon: "🏷️", color: "#6b7280" });
      const [showAddTag, setShowAddTag] = useState(false);

      // Shop state
      const [selectedShopCategory, setSelectedShopCategory] = useState("");
      const [editingShop, setEditingShop] = useState(null);
      const [newShop, setNewShop] = useState({ name: "", category: "", is_favorite: false });
      const [showAddShop, setShowAddShop] = useState(false);

      const EMOJI_OPTIONS = ["🛒","🏪","🌏","🍜","📦","🧹","🍕","☕","🚗","💊","🎮","📚","👕","🏠","💡","🎬","✈️","🎁","💰","🏥","🍎","🍇","🚃","🏷️","👨‍👩‍👧","📄","🛍️"];
      const COLOR_OPTIONS = ["#2563eb","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#06b6d4","#84cc16","#f97316","#6366f1","#64748b","#a855f7"];

      const getCategoryUsage = (n) => allExpenses.filter(e => e.category === n).length;
      const getTagUsage = (n) => allExpenses.filter(e => (e.tags||"").split(",").includes(n)).length;
      const getShopUsage = (n) => allExpenses.filter(e => e.shop === n).length;

      // Get shops for selected category
      const filteredShops = useMemo(() => {
        if (!selectedShopCategory) return shops;
        return shops.filter(s => s.category === selectedShopCategory);
      }, [shops, selectedShopCategory]);

      // Category handlers
      const handleAddCategory = async () => {
        if (!newCat.name.trim()) { showToast("error","Enter name"); return; }
        const { error } = await supabase.from("cost_management_categories").insert({ name: newCat.name.trim(), icon: newCat.icon, color: newCat.color, sort_order: categories.length + 1 });
        if (error) showToast("error", error.message.includes("duplicate") ? "Exists" : error.message);
        else { showToast("success","Added"); setNewCat({ name: "", icon: "📦", color: "#8b5cf6" }); setShowAddCat(false); fetchData(); }
      };
      const handleUpdateCategory = async () => {
        if (!editingCat?.name.trim()) return;
        const { error } = await supabase.from("cost_management_categories").update({ name: editingCat.name, icon: editingCat.icon, color: editingCat.color }).eq("id", editingCat.id);
        if (!error && editingCat.originalName !== editingCat.name) {
          await supabase.from("cost_management_expenses").update({ category: editingCat.name }).eq("category", editingCat.originalName);
          await supabase.from("cost_management_shops").update({ category: editingCat.name }).eq("category", editingCat.originalName);
        }
        if (error) showToast("error", error.message); else { showToast("success","Updated"); setEditingCat(null); fetchData(); }
      };

      // Tag handlers
      const handleAddTag = async () => {
        if (!newTag.name.trim()) { showToast("error","Enter name"); return; }
        const { error } = await supabase.from("cost_management_tags").insert({ name: newTag.name.trim(), icon: newTag.icon, color: newTag.color, sort_order: tags.length + 1 });
        if (error) showToast("error", error.message.includes("duplicate") ? "Exists" : error.message);
        else { showToast("success","Added"); setNewTag({ name: "", icon: "🏷️", color: "#6b7280" }); setShowAddTag(false); fetchData(); }
      };
      const handleUpdateTag = async () => {
        if (!editingTag?.name.trim()) return;
        const { error } = await supabase.from("cost_management_tags").update({ name: editingTag.name, icon: editingTag.icon, color: editingTag.color }).eq("id", editingTag.id);
        if (!error && editingTag.originalName !== editingTag.name) {
          const { data: expenses } = await supabase.from("cost_management_expenses").select("id, tags").like("tags", `%${editingTag.originalName}%`);
          for (const exp of (expenses || [])) {
            const newTags = (exp.tags || "").split(",").map(t => t === editingTag.originalName ? editingTag.name : t).join(",");
            await supabase.from("cost_management_expenses").update({ tags: newTags }).eq("id", exp.id);
          }
        }
        if (error) showToast("error", error.message); else { showToast("success","Updated"); setEditingTag(null); fetchData(); }
      };
      const handleDeleteTag = async (id) => {
        const { error } = await supabase.from("cost_management_tags").delete().eq("id", id);
        if (error) showToast("error", error.message); else { showToast("success","Deleted"); fetchData(); }
      };

      // Shop handlers
      const handleAddShop = async () => {
        if (!newShop.name.trim() || !newShop.category) { showToast("error","Enter name and category"); return; }
        const { error } = await supabase.from("cost_management_shops").insert({ 
          name: newShop.name.trim(), 
          category: newShop.category, 
          is_favorite: newShop.is_favorite 
        });
        if (error) showToast("error", error.message.includes("duplicate") ? "Shop exists" : error.message);
        else { showToast("success","Added"); setNewShop({ name: "", category: selectedShopCategory || "", is_favorite: false }); setShowAddShop(false); fetchData(); }
      };
      const handleUpdateShop = async () => {
        if (!editingShop?.name.trim()) return;
        const { error } = await supabase.from("cost_management_shops").update({ 
          name: editingShop.name, 
          category: editingShop.category,
          is_favorite: editingShop.is_favorite 
        }).eq("id", editingShop.id);
        // Update expenses if shop name changed
        if (!error && editingShop.originalName !== editingShop.name) {
          await supabase.from("cost_management_expenses").update({ shop: editingShop.name }).eq("shop", editingShop.originalName);
        }
        if (error) showToast("error", error.message); else { showToast("success","Updated"); setEditingShop(null); fetchData(); }
      };
      const handleDeleteShop = async (id) => {
        const { error } = await supabase.from("cost_management_shops").delete().eq("id", id);
        if (error) showToast("error", error.message); else { showToast("success","Deleted"); fetchData(); }
      };
      const handleToggleFavorite = async (shop) => {
        await supabase.from("cost_management_shops").update({ is_favorite: !shop.is_favorite }).eq("id", shop.id);
        fetchData();
      };

      const showToast = (type, msg) => { setToast({ type, msg }); setTimeout(() => setToast(null), 3000); };

      const tabStyle = (active) => ({
        padding:"8px 14px",fontSize:11,fontWeight:active?600:400,cursor:"pointer",
        background:active?theme.inputBg:"transparent",color:active?theme.text:theme.textMuted,
        border:"none",borderBottom:active?`2px solid ${theme.primary}`:"2px solid transparent",
      });

      return (
        <div style={{maxWidth:560,margin:"0 auto"}}>
          {toast && (
            <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:500,background:toast.type==="success"?theme.success:theme.danger,color:"#fff"}}>
              {toast.type==="success"?"✅":"❌"} {toast.msg}
            </div>
          )}

          <div style={{display:"flex",borderBottom:`1px solid ${theme.cardBorder}`,marginBottom:16,marginTop:8}}>
            <button onClick={() => setActiveTab("categories")} style={tabStyle(activeTab==="categories")}>📂 Categories</button>
            <button onClick={() => setActiveTab("shops")} style={tabStyle(activeTab==="shops")}>🏪 Shops</button>
            <button onClick={() => setActiveTab("tags")} style={tabStyle(activeTab==="tags")}>🏷️ Tags</button>
          </div>

          {/* CATEGORIES TAB */}
          {activeTab === "categories" && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px"}}>
              {categories.map(cat => (
