<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cost Management Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.15.3/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    input:focus, select:focus { outline: none; }
    @keyframes cmFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    @keyframes cmSlideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
    @keyframes cmFadeOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-8px); } }
    @keyframes cmToastIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
    .cm-fade { animation: cmFadeIn 0.35s ease; }
    .cm-slide-in { animation: cmSlideIn 0.32s ease; }
    .cm-fade-out { animation: cmFadeOut 0.3s ease forwards; pointer-events: none; }
    .cm-toast { animation: cmToastIn 0.25s ease; }
    .cm-dragging { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.45); opacity: 0.92; }
    .cm-chip { transition: background 0.15s ease, color 0.15s ease, outline-color 0.15s ease, transform 0.1s ease, filter 0.15s ease; }
    .cm-chip:hover { filter: brightness(1.18); transform: translateY(-1px); }
    .cm-chip:active { transform: scale(0.94); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const SUPABASE_URL = "https://wylxvmkcrexwfpjpbhyy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const THEMES = {
      midnight: { name: "Midnight", icon: "🌙", bg: "linear-gradient(145deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%)", headerBg: "rgba(255,255,255,0.03)", cardBg: "rgba(255,255,255,0.04)", cardBorder: "rgba(255,255,255,0.06)", inputBg: "rgba(255,255,255,0.06)", inputBorder: "rgba(255,255,255,0.12)", primary: "#2563eb", primaryGlow: "rgba(37,99,235,0.3)", accent: "#7c3aed", text: "#e0e0e0", textMuted: "#888", textDim: "#666", success: "#10b981", warning: "#f59e0b", danger: "#ef4444" },
      sakura: { name: "Sakura", icon: "🌸", bg: "linear-gradient(145deg, #1a0a10 0%, #2d1520 50%, #3d1a2a 100%)", headerBg: "rgba(255,182,193,0.05)", cardBg: "rgba(255,182,193,0.04)", cardBorder: "rgba(255,182,193,0.08)", inputBg: "rgba(255,182,193,0.06)", inputBorder: "rgba(255,182,193,0.15)", primary: "#ec4899", primaryGlow: "rgba(236,72,153,0.3)", accent: "#f472b6", text: "#fce7f3", textMuted: "#f9a8d4", textDim: "#9d174d", success: "#34d399", warning: "#fbbf24", danger: "#f87171" },
      ocean: { name: "Ocean", icon: "🌊", bg: "linear-gradient(145deg, #0a1628 0%, #0c2340 50%, #0f3052 100%)", headerBg: "rgba(56,189,248,0.05)", cardBg: "rgba(56,189,248,0.04)", cardBorder: "rgba(56,189,248,0.08)", inputBg: "rgba(56,189,248,0.06)", inputBorder: "rgba(56,189,248,0.15)", primary: "#0ea5e9", primaryGlow: "rgba(14,165,233,0.3)", accent: "#38bdf8", text: "#e0f2fe", textMuted: "#7dd3fc", textDim: "#0369a1", success: "#22d3ee", warning: "#fbbf24", danger: "#fb7185" },
      forest: { name: "Forest", icon: "🌲", bg: "linear-gradient(145deg, #0a1a0f 0%, #132a1a 50%, #1a3a22 100%)", headerBg: "rgba(34,197,94,0.05)", cardBg: "rgba(34,197,94,0.04)", cardBorder: "rgba(34,197,94,0.08)", inputBg: "rgba(34,197,94,0.06)", inputBorder: "rgba(34,197,94,0.15)", primary: "#22c55e", primaryGlow: "rgba(34,197,94,0.3)", accent: "#4ade80", text: "#dcfce7", textMuted: "#86efac", textDim: "#166534", success: "#34d399", warning: "#facc15", danger: "#f87171" },
      sunset: { name: "Sunset", icon: "🌅", bg: "linear-gradient(145deg, #1a0f0a 0%, #2d1810 50%, #3d2018 100%)", headerBg: "rgba(251,146,60,0.05)", cardBg: "rgba(251,146,60,0.04)", cardBorder: "rgba(251,146,60,0.08)", inputBg: "rgba(251,146,60,0.06)", inputBorder: "rgba(251,146,60,0.15)", primary: "#f97316", primaryGlow: "rgba(249,115,22,0.3)", accent: "#fb923c", text: "#ffedd5", textMuted: "#fdba74", textDim: "#9a3412", success: "#4ade80", warning: "#fbbf24", danger: "#ef4444" },
      lavender: { name: "Lavender", icon: "💜", bg: "linear-gradient(145deg, #110f1a 0%, #1e1a2e 50%, #2a2440 100%)", headerBg: "rgba(167,139,250,0.05)", cardBg: "rgba(167,139,250,0.04)", cardBorder: "rgba(167,139,250,0.08)", inputBg: "rgba(167,139,250,0.06)", inputBorder: "rgba(167,139,250,0.15)", primary: "#8b5cf6", primaryGlow: "rgba(139,92,246,0.3)", accent: "#a78bfa", text: "#ede9fe", textMuted: "#c4b5fd", textDim: "#5b21b6", success: "#34d399", warning: "#fbbf24", danger: "#f87171" },
      mono: { name: "Mono", icon: "⚪", bg: "linear-gradient(145deg, #0a0a0a 0%, #171717 50%, #1f1f1f 100%)", headerBg: "rgba(255,255,255,0.03)", cardBg: "rgba(255,255,255,0.03)", cardBorder: "rgba(255,255,255,0.06)", inputBg: "rgba(255,255,255,0.05)", inputBorder: "rgba(255,255,255,0.1)", primary: "#a3a3a3", primaryGlow: "rgba(163,163,163,0.3)", accent: "#d4d4d4", text: "#e5e5e5", textMuted: "#a3a3a3", textDim: "#525252", success: "#86efac", warning: "#fde047", danger: "#fca5a5" },
    };

    const THEME_KEYS = Object.keys(THEMES);
    const EXPENSE_TYPES = {
      normal: { label: "Normal", icon: "", color: "transparent" },
      fixed: { label: "Fixed", icon: "📌", color: "#f59e0b" },
      outlier: { label: "Outlier", icon: "⚡", color: "#8b5cf6" },
    };

    function getStoredTheme() {
      try {
        const stored = localStorage.getItem("cost_mgmt_theme");
        if (stored) { const { theme } = JSON.parse(stored); return theme; }
      } catch (e) {}
      return "midnight";
    }
    function setStoredTheme(theme) { localStorage.setItem("cost_mgmt_theme", JSON.stringify({ theme, timestamp: Date.now() })); }

    const { useState, useMemo, useEffect, useCallback, useRef, createContext, useContext } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area, CartesianGrid } = Recharts;

    const ThemeContext = createContext();
    const useTheme = () => useContext(ThemeContext);

    const MONTHS_SHORT = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    const DEFAULT_CATEGORIES = [
      { id: 1, name: "Supermarket", icon: "🛒", color: "#2563eb" },
      { id: 2, name: "Convenience", icon: "🏪", color: "#f59e0b" },
      { id: 3, name: "Asian shop", icon: "🌏", color: "#10b981" },
      { id: 4, name: "Restaurant", icon: "🍜", color: "#ef4444" },
      { id: 5, name: "Daily need stuffs", icon: "🧹", color: "#ec4899" },
      { id: 99, name: "Other", icon: "📦", color: "#8b5cf6" },
    ];

    const DEFAULT_TAGS = [
      { id: 1, name: "Food", icon: "🍎", color: "#22c55e" },
      { id: 2, name: "Dining Out", icon: "🍜", color: "#ef4444" },
      { id: 3, name: "Fruits", icon: "🍇", color: "#a855f7" },
      { id: 4, name: "Transport", icon: "🚃", color: "#3b82f6" },
      { id: 5, name: "Travel", icon: "✈️", color: "#06b6d4" },
    ];

    const fmt = (n) => `¥${n.toLocaleString()}`;
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const vibrate = (ms) => { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} };

    // ── Recurring (templates) ──
    const FREQ_ORDER = ["daily", "weekdays", "weekly", "monthly"];
    const FREQ_LABELS = { daily: "Daily", weekdays: "Weekdays", weekly: "Weekly", monthly: "Monthly" };
    const DOW_SHORT = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const freqSummary = (r) => {
      if (r.frequency === "monthly") return `Monthly · day ${r.day_value}`;
      if (r.frequency === "weekly") return `Weekly · ${DOW_SHORT[r.day_value] ?? "?"}`;
      if (r.frequency === "weekdays") return "Weekdays";
      return "Daily";
    };
    const favSort = (a, b) => (a.is_favorite === b.is_favorite ? a.name.localeCompare(b.name) : a.is_favorite ? -1 : 1);

    // ── Graph filters (overview charts) ──
    const GRAPH_FILTER_KEY = "cost_management_graph_filters";
    const DEFAULT_GRAPH_FILTERS = { excludeOutliers: false, excludeFixed: false, categories: [], shops: [], tags: [], dateFrom: "", dateTo: "" };
    function getStoredGraphFilters() {
      try {
        const stored = localStorage.getItem(GRAPH_FILTER_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          return {
            ...DEFAULT_GRAPH_FILTERS, ...parsed,
            categories: Array.isArray(parsed.categories) ? parsed.categories : [],
            shops: Array.isArray(parsed.shops) ? parsed.shops : [],
            tags: Array.isArray(parsed.tags) ? parsed.tags : [],
          };
        }
      } catch (e) {}
      return { ...DEFAULT_GRAPH_FILTERS, categories: [], shops: [], tags: [] };
    }
    function setStoredGraphFilters(f) { try { localStorage.setItem(GRAPH_FILTER_KEY, JSON.stringify(f)); } catch (e) {} }
    function applyGraphFilters(rows, f) {
      return rows.filter(r => {
        if (f.excludeOutliers && r.expense_type === "outlier") return false;
        if (f.excludeFixed && r.expense_type === "fixed") return false;
        if (f.categories.length && !f.categories.includes(r.category)) return false;
        if (f.shops.length && !f.shops.includes(r.shop)) return false;
        if (f.tags.length) {
          const rowTags = (r.tags || "").split(",").map(t => t.trim()).filter(Boolean);
          if (!f.tags.some(t => rowTags.includes(t))) return false;
        }
        if (f.dateFrom && r.date < f.dateFrom) return false;
        if (f.dateTo && r.date > f.dateTo) return false;
        return true;
      });
    }

    function enrichRow(r) {
      const d = new Date(r.date);
      return { ...r, year: d.getFullYear(), month: d.getMonth() + 1 };
    }

    // ═══════════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════════
    function App() {
      const [themeName, setThemeName] = useState(getStoredTheme);
      const theme = THEMES[themeName] || THEMES.midnight;
      const [data, setData] = useState([]);
      const [shops, setShops] = useState([]);
      const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
      const [tags, setTags] = useState(DEFAULT_TAGS);
      const [recurring, setRecurring] = useState([]);
      const [loading, setLoading] = useState(true);
      const [yearFilter, setYearFilter] = useState("All");
      const [catFilter, setCatFilter] = useState("All");
      const [typeFilter, setTypeFilter] = useState("All");
      const [tagFilter, setTagFilter] = useState("All");
      const [view, setView] = useState("add");
      const [txPage, setTxPage] = useState(0);
      const [showThemePicker, setShowThemePicker] = useState(false);

      const changeTheme = (t) => { setThemeName(t); setStoredTheme(t); setShowThemePicker(false); };

      const fetchData = useCallback(async () => {
        setLoading(true);
        const [expRes, shopRes, catRes, tagRes, recRes] = await Promise.all([
          supabase.from("cost_management_expenses").select("*").order("date", { ascending: true }),
          supabase.from("cost_management_shops").select("*").order("is_favorite", { ascending: false }).order("name"),
          supabase.from("cost_management_categories").select("*").order("sort_order"),
          supabase.from("cost_management_tags").select("*").order("sort_order"),
          supabase.from("cost_management_recurring").select("*").order("name"),
        ]);
        if (!expRes.error && expRes.data) {
          setData(expRes.data.map(r => enrichRow({ 
            id: r.id, amount: r.amount, date: r.date, category: r.category, 
            shop: r.shop, notes: r.notes || "", expense_type: r.expense_type || "normal",
            tags: r.tags || ""
          })));
          const years = [...new Set(expRes.data.map(r => new Date(r.date).getFullYear()))];
          if (years.length) setYearFilter(String(Math.max(...years)));
        }
        if (!shopRes.error && shopRes.data) setShops(shopRes.data);
        if (!catRes.error && catRes.data && catRes.data.length > 0) setCategories(catRes.data);
        if (!tagRes.error && tagRes.data && tagRes.data.length > 0) setTags(tagRes.data);
        if (!recRes.error && recRes.data) setRecurring(recRes.data);
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const RAW = data;
      const catList = useMemo(() => [...new Set(RAW.map(r => r.category))].sort(), [RAW]);
      const years = useMemo(() => [...new Set(RAW.map(r => String(r.year)))].sort(), [RAW]);

      const filtered = useMemo(() => RAW.filter(r => {
        if (yearFilter !== "All" && String(r.year) !== yearFilter) return false;
        if (catFilter !== "All" && r.category !== catFilter) return false;
        if (typeFilter !== "All" && r.expense_type !== typeFilter) return false;
        if (tagFilter !== "All" && !(r.tags || "").split(",").includes(tagFilter)) return false;
        return true;
      }), [RAW, yearFilter, catFilter, typeFilter, tagFilter]);

      const totalSpend = useMemo(() => filtered.reduce((s,r) => s+r.amount, 0), [filtered]);
      const monthlyData = useMemo(() => {
        const map = {};
        filtered.forEach(r => {
          const key = `${r.year}-${String(r.month).padStart(2,"0")}`;
          const label = `${MONTHS_SHORT[r.month]} ${String(r.year).slice(2)}`;
          if (!map[key]) map[key] = { key, label, total: 0 };
          map[key].total += r.amount;
        });
        return Object.values(map).sort((a,b) => a.key.localeCompare(b.key));
      }, [filtered]);
      const monthlyAvg = monthlyData.length ? Math.round(totalSpend / monthlyData.length) : 0;
      const dailyAvg = filtered.length ? Math.round(totalSpend / new Set(filtered.map(r => r.date)).size) : 0;
      const catData = useMemo(() => {
        const map = {};
        filtered.forEach(r => { map[r.category] = (map[r.category]||0) + r.amount; });
        return Object.entries(map).map(([name,value]) => ({name,value})).sort((a,b) => b.value-a.value);
      }, [filtered]);
      const topShops = useMemo(() => {
        const map = {};
        filtered.forEach(r => { map[r.shop] = (map[r.shop]||0) + r.amount; });
        return Object.entries(map).map(([name,value]) => ({name,value})).sort((a,b) => b.value-a.value).slice(0,6);
      }, [filtered]);

      const sortedTx = useMemo(() => [...filtered].sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id), [filtered]);
      const txPerPage = 15;
      const txPages = Math.ceil(sortedTx.length / txPerPage);
      const pageTx = sortedTx.slice(txPage * txPerPage, (txPage+1) * txPerPage);
      const recentEntries = useMemo(() => [...RAW].sort((a,b) => b.id - a.id).slice(0, 5), [RAW]);

      const getCatIcon = (n) => categories.find(c => c.name === n)?.icon || "📦";
      const getCatColor = (n) => categories.find(c => c.name === n)?.color || "#8b5cf6";
      const getTagIcon = (n) => tags.find(t => t.name === n)?.icon || "🏷️";
      const getTagColor = (n) => tags.find(t => t.name === n)?.color || "#6b7280";

      const pillStyle = (active) => ({
        padding:"6px 14px",fontSize:12,borderRadius:16,border:"none",cursor:"pointer",fontWeight:500,
        background: active ? theme.primaryGlow : theme.cardBg,
        color: active ? "#fff" : theme.textMuted,
        border: active ? `1px solid ${theme.primary}` : `1px solid ${theme.cardBorder}`,
      });
      const inputStyle = {
        width:"100%",padding:"10px 14px",borderRadius:10,border:`1px solid ${theme.inputBorder}`,
        background:theme.inputBg,color:theme.text,fontSize:14,outline:"none",fontFamily:"inherit",
      };
      const labelStyle = { fontSize:11,fontWeight:500,color:theme.textMuted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,display:"block" };

      const navTabs = [
        { id: "add", label: "➕ Add" },
        { id: "overview", label: "📊 Overview" },
        { id: "transactions", label: "📋 History" },
        { id: "recurring", label: "🔁 Recurring" },
        { id: "settings", label: "⚙️ Settings" },
      ];

      return (
        <ThemeContext.Provider value={{ theme, themeName, inputStyle, labelStyle, pillStyle, supabase, fetchData, categories, tags, getCatIcon, getCatColor, getTagIcon, getTagColor, shops, recurring, changeTheme }}>
          <div style={{minHeight:"100vh",background:theme.bg,color:theme.text,fontFamily:"'Noto Sans JP', system-ui, sans-serif"}}>
            {/* Header */}
            <div style={{background:theme.headerBg,borderBottom:`1px solid ${theme.cardBorder}`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:theme.textDim}}>家計簿</div>
                <h1 style={{fontSize:18,fontWeight:700,color:"#fff",margin:0}}>Cost Management</h1>
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                {navTabs.map(tab => (
                  <button key={tab.id} onClick={() => { setView(tab.id); setTxPage(0); }} style={{...pillStyle(view===tab.id),padding:"5px 10px",fontSize:11}}>{tab.label}</button>
                ))}
                <div style={{position:"relative"}}>
                  <button onClick={() => setShowThemePicker(!showThemePicker)} style={{...pillStyle(false),padding:"5px 8px",fontSize:14}}>{theme.icon}</button>
                  {showThemePicker && (
                    <>
                      <div style={{position:"fixed",inset:0,zIndex:90}} onClick={() => setShowThemePicker(false)}/>
                      <div style={{position:"absolute",top:"100%",right:0,marginTop:6,background:"#1a1a2e",border:`1px solid ${theme.cardBorder}`,borderRadius:10,padding:6,zIndex:100,minWidth:130}}>
                        {THEME_KEYS.map(key => (
                          <button key={key} onClick={() => changeTheme(key)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"6px 8px",background:themeName===key?`${THEMES[key].primary}20`:"transparent",border:"none",borderRadius:6,cursor:"pointer"}}>
                            <span style={{fontSize:12}}>{THEMES[key].icon}</span>
                            <span style={{color:themeName===key?THEMES[key].primary:"#ccc",fontSize:11}}>{THEMES[key].name}</span>
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* Filters */}
            {(view === "overview" || view === "transactions") && (
              <div style={{padding:"10px 16px",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <select value={yearFilter} onChange={e => setYearFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Years</option>
                  {years.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
                <select value={catFilter} onChange={e => setCatFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Categories</option>
                  {catList.map(c => <option key={c} value={c}>{getCatIcon(c)} {c}</option>)}
                </select>
                <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Types</option>
                  <option value="normal">Normal</option>
                  <option value="fixed">📌 Fixed</option>
                  <option value="outlier">⚡ Outlier</option>
                </select>
                <select value={tagFilter} onChange={e => setTagFilter(e.target.value)} style={{background:theme.inputBg,border:`1px solid ${theme.inputBorder}`,color:theme.text,padding:"4px 8px",borderRadius:6,fontSize:11}}>
                  <option value="All">All Tags</option>
                  {tags.map(t => <option key={t.name} value={t.name}>{t.icon} {t.name}</option>)}
                </select>
              </div>
            )}

            <div style={{padding:"0 16px 20px"}}>
              {loading ? (
                <div style={{textAlign:"center",padding:50,color:theme.textMuted}}>⏳ Loading…</div>
              ) : view === "add" ? (
                <AddEntryView recentEntries={recentEntries} allExpenses={RAW} />
              ) : view === "overview" ? (
                <OverviewView {...{filtered,totalSpend,monthlyAvg,dailyAvg,monthlyData,catData,topShops}} allExpenses={RAW} />
              ) : view === "transactions" ? (
                <TransactionsView pageTx={pageTx} txPage={txPage} setTxPage={setTxPage} txPages={txPages} />
              ) : view === "recurring" ? (
                <RecurringView />
              ) : (
                <SettingsView allExpenses={RAW} />
              )}
            </div>
          </div>
        </ThemeContext.Provider>
      );
    }

    // ═══════════════════════════════════════════
    //  MULTI-DATE CALENDAR
    // ═══════════════════════════════════════════
    function MultiDateCalendar({ selectedDates, setSelectedDates, onDone, expenses = [] }) {
      const { theme } = useTheme();
      const [isOpen, setIsOpen] = useState(false);
      const [viewDate, setViewDate] = useState(() => {
        const d = new Date();
        return { year: d.getFullYear(), month: d.getMonth() };
      });

      const openCalendar = () => { setIsOpen(true); setSelectedDates([]); };
      const daysInMonth = new Date(viewDate.year, viewDate.month + 1, 0).getDate();
      const firstDayJS = new Date(viewDate.year, viewDate.month, 1).getDay();
      const firstDayOfWeek = firstDayJS === 0 ? 6 : firstDayJS - 1;

      const toggleDate = (day) => {
        const dateStr = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        setSelectedDates(prev => prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr].sort());
      };
      const isSelected = (day) => {
        const dateStr = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        return selectedDates.includes(dateStr);
      };
      const isToday = (day) => {
        const today = new Date();
        return viewDate.year === today.getFullYear() && viewDate.month === today.getMonth() && day === today.getDate();
      };

      // Get expense indicators for a date
      const getDateIndicators = (day) => {
        const dateStr = `${viewDate.year}-${String(viewDate.month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const dateExpenses = expenses.filter(e => e.date === dateStr);
        if (dateExpenses.length === 0) return null;
        
        const types = new Set(dateExpenses.map(e => e.expense_type || "normal"));
        const indicators = [];
        if (types.has("fixed")) indicators.push("📌");
        if (types.has("outlier")) indicators.push("⚡");
        if (types.has("normal")) indicators.push("●");
        return indicators;
      };

      const confirmDates = () => {
        if (selectedDates.length === 0) setSelectedDates([todayStr()]);
        setIsOpen(false);
        if (onDone) onDone();
      };

      const displayText = selectedDates.length === 0 ? "Select dates" : selectedDates.length === 1 ? selectedDates[0] : `${selectedDates.length} dates`;

      return (
        <div style={{marginBottom:16}}>
          {!isOpen && (
            <button onClick={openCalendar} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:10,cursor:"pointer",width:"100%",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>📅</span>
                <span style={{fontSize:14,fontWeight:600,color:"#fff"}}>{displayText}</span>
              </div>
              <span style={{color:theme.textMuted,fontSize:12}}>Change ▼</span>
            </button>
          )}
          {isOpen && (
            <div style={{background:theme.cardBg,borderRadius:12,padding:16,border:`1px solid ${theme.cardBorder}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <button onClick={() => setViewDate(v => v.month===0?{year:v.year-1,month:11}:{...v,month:v.month-1})} style={{background:theme.inputBg,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",color:theme.textMuted}}>◀</button>
                <div style={{fontSize:14,fontWeight:600,color:"#fff"}}>{MONTHS_FULL[viewDate.month]} {viewDate.year}</div>
                <button onClick={() => setViewDate(v => v.month===11?{year:v.year+1,month:0}:{...v,month:v.month+1})} style={{background:theme.inputBg,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",color:theme.textMuted}}>▶</button>
              </div>
              {/* Legend */}
              <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:10,fontSize:10,color:theme.textDim}}>
                <span><span style={{color:"#22c55e"}}>●</span> Normal</span>
                <span>📌 Fixed</span>
                <span>⚡ Outlier</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:4,marginBottom:8}}>
                {["Mo","Tu","We","Th","Fr","Sa","Su"].map(d => <div key={d} style={{textAlign:"center",fontSize:10,color:theme.textDim,fontWeight:600,padding:4}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:4}}>
                {Array.from({length:firstDayOfWeek}).map((_,i) => <div key={`e-${i}`}/>)}
                {Array.from({length:daysInMonth}).map((_,i) => {
                  const day = i+1;
                  const sel = isSelected(day);
                  const tod = isToday(day);
                  const indicators = getDateIndicators(day);
                  return (
                    <button key={day} onClick={() => toggleDate(day)} style={{
                      aspectRatio:"1",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:sel?600:400,
                      background:sel?theme.primary:tod?theme.inputBg:"transparent",
                      color:sel?"#fff":tod?theme.primary:theme.text,
                      position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                    }}>
                      <span>{day}</span>
                      {indicators && (
                        <span style={{fontSize:7,lineHeight:1,marginTop:1,display:"flex",gap:1}}>
                          {indicators.map((ind, idx) => (
                            <span key={idx} style={{color: ind === "●" ? "#22c55e" : undefined}}>{ind}</span>
                          ))}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
              {selectedDates.length > 0 && (
                <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:4}}>
                  {selectedDates.map(d => (
                    <span key={d} style={{background:theme.primaryGlow,color:theme.accent,padding:"3px 8px",borderRadius:6,fontSize:11,display:"flex",alignItems:"center",gap:4}}>
                      {d}<button onClick={() => setSelectedDates(prev => prev.filter(x => x !== d))} style={{background:"none",border:"none",color:theme.accent,cursor:"pointer",fontSize:12,padding:0}}>×</button>
                    </span>
                  ))}
                </div>
              )}
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button onClick={() => { setSelectedDates([todayStr()]); setIsOpen(false); if(onDone)onDone(); }} style={{flex:1,background:theme.inputBg,border:`1px solid ${theme.cardBorder}`,borderRadius:8,padding:"10px",fontSize:12,color:theme.textMuted,cursor:"pointer"}}>Today</button>
                <button onClick={confirmDates} style={{flex:1,background:theme.primary,border:"none",borderRadius:8,padding:"10px",fontSize:12,color:"#fff",cursor:"pointer",fontWeight:600}}>Done ({selectedDates.length || 1})</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  TAG SELECTOR (Multi-select chips)
    // ═══════════════════════════════════════════
    function TagSelector({ selectedTags, onChange }) {
      const { theme, tags, getTagIcon, getTagColor } = useTheme();
      const toggle = (name) => {
        onChange(selectedTags.includes(name) ? selectedTags.filter(t => t !== name) : [...selectedTags, name]);
      };
      return (
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {tags.map(tag => {
            const sel = selectedTags.includes(tag.name);
            return (
              <button key={tag.name} onClick={() => toggle(tag.name)} style={{
                padding:"5px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,
                display:"flex",alignItems:"center",gap:4,
                background:sel?`${tag.color}30`:theme.cardBg,
                color:sel?tag.color:theme.textMuted,
                outline:sel?`2px solid ${tag.color}`:`1px solid ${theme.cardBorder}`,
              }}>
                <span>{tag.icon}</span>{tag.name}
              </button>
            );
          })}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  ADD ENTRY VIEW
    // ═══════════════════════════════════════════
    function AddEntryView({ recentEntries, allExpenses }) {
      const { theme, inputStyle, supabase, fetchData, categories, shops, tags, getCatIcon, getCatColor, getTagIcon } = useTheme();
      const [selectedDates, setSelectedDates] = useState([todayStr()]);
      const [shopMode, setShopMode] = useState("same"); // "same" or "different"
      const [sharedCategory, setSharedCategory] = useState("");
      const [sharedShop, setSharedShop] = useState("");
      const [sharedExpenseType, setSharedExpenseType] = useState("normal");
      const [sharedTags, setSharedTags] = useState([]);
      const [entries, setEntries] = useState([]);
      const [saving, setSaving] = useState(false);
      const [toast, setToast] = useState(null);
      const [customShop, setCustomShop] = useState("");

      // When dates change, rebuild entries
      useEffect(() => {
        if (shopMode === "same") {
          setEntries(selectedDates.map(d => ({ date: d, amount: "", notes: "" })));
        } else {
          setEntries(selectedDates.map(d => ({ date: d, category: "", shop: "", amount: "", notes: "", expense_type: "normal", tags: [] })));
        }
      }, [selectedDates, shopMode]);

      const updateEntry = (index, field, value) => {
        setEntries(prev => { const n = [...prev]; n[index] = { ...n[index], [field]: value }; return n; });
      };

      const categoryShops = useMemo(() => {
        const cat = shopMode === "same" ? sharedCategory : null;
        if (!cat) return [];
        return shops.filter(s => s.category === cat).sort((a,b) => {
          if (a.is_favorite && !b.is_favorite) return -1;
          if (!a.is_favorite && b.is_favorite) return 1;
          return a.name.localeCompare(b.name);
        });
      }, [shops, sharedCategory, shopMode]);

      const totalAmount = entries.reduce((s, e) => s + (Number(e.amount) || 0), 0);
      const validEntries = shopMode === "same"
        ? (sharedCategory && sharedShop ? entries.filter(e => e.amount && Number(e.amount) > 0) : [])
        : entries.filter(e => e.category && e.shop && e.amount && Number(e.amount) > 0);

      const handleSubmit = async () => {
        if (validEntries.length === 0) {
          setToast({ type: "error", msg: "Complete entries" });
          setTimeout(() => setToast(null), 3000);
          return;
        }
        setSaving(true);
        const records = validEntries.map(e => ({
          date: e.date,
          category: shopMode === "same" ? sharedCategory : e.category,
          shop: shopMode === "same" ? sharedShop : e.shop,
          amount: Number(e.amount),
          notes: e.notes?.trim() || "",
          expense_type: shopMode === "same" ? sharedExpenseType : (e.expense_type || "normal"),
          tags: shopMode === "same" ? sharedTags.join(",") : (e.tags || []).join(","),
        }));
        const { error } = await supabase.from("cost_management_expenses").insert(records);
        setSaving(false);
        if (error) { setToast({ type: "error", msg: error.message }); }
        else {
          setToast({ type: "success", msg: `Saved ${records.length} entries` });
          setSelectedDates([todayStr()]);
          setSharedCategory(""); setSharedShop(""); setSharedTags([]); setSharedExpenseType("normal");
          fetchData();
        }
        setTimeout(() => setToast(null), 3000);
      };

      const selectShop = (name) => { setSharedShop(name); setCustomShop(""); };
      const useCustomShop = () => { if (customShop.trim()) { setSharedShop(customShop.trim()); setCustomShop(""); } };

      return (
        <div style={{maxWidth:560,margin:"0 auto"}}>
          {toast && (
            <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:500,background:toast.type==="success"?theme.success:theme.danger,color:"#fff"}}>
              {toast.type==="success"?"✅":"❌"} {toast.msg}
            </div>
          )}

          <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"20px",marginTop:8}}>
            <h3 style={{fontSize:15,fontWeight:700,color:"#fff",margin:"0 0 16px 0"}}>💰 New Expense</h3>

            {/* Date Selection */}
            <MultiDateCalendar selectedDates={selectedDates} setSelectedDates={setSelectedDates} expenses={allExpenses} />

            {/* Shop Mode */}
            {selectedDates.length > 0 && (
              <div style={{marginBottom:16}}>
                <label style={{...inputStyle,fontSize:11,marginBottom:8,display:"block",background:"transparent",border:"none",padding:0,color:theme.textMuted}}>SHOP MODE</label>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={() => setShopMode("same")} style={{
                    flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,
                    background:shopMode==="same"?theme.primaryGlow:theme.inputBg,
                    color:shopMode==="same"?"#fff":theme.textMuted,
                    outline:shopMode==="same"?`2px solid ${theme.primary}`:`1px solid ${theme.cardBorder}`,
                  }}>🏪 Same shop for all</button>
                  <button onClick={() => setShopMode("different")} style={{
                    flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,
                    background:shopMode==="different"?theme.primaryGlow:theme.inputBg,
                    color:shopMode==="different"?"#fff":theme.textMuted,
                    outline:shopMode==="different"?`2px solid ${theme.primary}`:`1px solid ${theme.cardBorder}`,
                  }}>📋 Different shops</button>
                </div>
              </div>
            )}

            {/* SAME SHOP MODE */}
            {shopMode === "same" && selectedDates.length > 0 && (
              <>
                {/* Shared Category */}
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:11,color:theme.textMuted,marginBottom:6,display:"block"}}>CATEGORY</label>
                  <select value={sharedCategory} onChange={e => { setSharedCategory(e.target.value); setSharedShop(""); }}
                    style={{...inputStyle,cursor:"pointer"}}>
                    <option value="">Select...</option>
                    {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                  </select>
                </div>

                {/* Shared Shop */}
                {sharedCategory && (
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:11,color:theme.textMuted,marginBottom:6,display:"block"}}>SHOP</label>
                    {categoryShops.length > 0 && (
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                        {categoryShops.map(s => (
                          <button key={s.id} onClick={() => selectShop(s.name)} style={{
                            padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,
                            background:sharedShop===s.name?theme.primaryGlow:theme.inputBg,
                            color:sharedShop===s.name?"#fff":theme.text,
                            outline:sharedShop===s.name?`2px solid ${theme.primary}`:`1px solid ${theme.cardBorder}`,
                          }}>{s.is_favorite?"⭐ ":""}{s.name}</button>
                        ))}
                        <button onClick={() => selectShop("Other")} style={{
                          padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,
                          background:sharedShop==="Other"?`${getCatColor("Other")}30`:theme.inputBg,
                          color:sharedShop==="Other"?getCatColor("Other"):theme.textMuted,
                          outline:sharedShop==="Other"?`2px solid ${getCatColor("Other")}`:`1px solid ${theme.cardBorder}`,
                        }}>📦 Other</button>
                      </div>
                    )}
                    <div style={{display:"flex",gap:6}}>
                      <input type="text" placeholder="Or type new..." value={customShop} onChange={e => setCustomShop(e.target.value)} onKeyDown={e => { if(e.key==="Enter")useCustomShop(); }} style={{...inputStyle,fontSize:12,flex:1}}/>
                      {customShop.trim() && <button onClick={useCustomShop} style={{background:theme.primary,border:"none",borderRadius:8,padding:"8px 12px",color:"#fff",cursor:"pointer",fontSize:11}}>Use</button>}
                    </div>
                  </div>
                )}

                {/* Expense Type & Tags (shared) */}
                {sharedCategory && sharedShop && (
                  <>
                    <div style={{marginBottom:12}}>
                      <label style={{fontSize:11,color:theme.textMuted,marginBottom:6,display:"block"}}>TYPE</label>
                      <div style={{display:"flex",gap:6}}>
                        {Object.entries(EXPENSE_TYPES).map(([key, cfg]) => (
                          <button key={key} onClick={() => setSharedExpenseType(key)} style={{
                            padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,
                            background:sharedExpenseType===key?(cfg.color!=="transparent"?`${cfg.color}30`:theme.primaryGlow):theme.inputBg,
                            color:sharedExpenseType===key?(cfg.color!=="transparent"?cfg.color:"#fff"):theme.textMuted,
                            outline:sharedExpenseType===key?`2px solid ${cfg.color!=="transparent"?cfg.color:theme.primary}`:`1px solid ${theme.cardBorder}`,
                          }}>{cfg.icon} {cfg.label}</button>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:16}}>
                      <label style={{fontSize:11,color:theme.textMuted,marginBottom:6,display:"block"}}>TAGS</label>
                      <TagSelector selectedTags={sharedTags} onChange={setSharedTags} />
                    </div>
                  </>
                )}

                {/* Entry rows (date + amount only) */}
                {sharedCategory && sharedShop && (
                  <div style={{background:theme.inputBg,borderRadius:10,padding:12,marginBottom:16}}>
                    <div style={{fontSize:11,color:theme.textMuted,marginBottom:10}}>AMOUNTS PER DATE</div>
                    {entries.map((entry, i) => (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                        <span style={{fontSize:12,color:theme.text,minWidth:90}}>{entry.date}</span>
                        <input type="number" inputMode="numeric" placeholder="¥" value={entry.amount}
                          onChange={e => updateEntry(i, "amount", e.target.value)}
                          style={{...inputStyle,flex:1,fontSize:16,fontWeight:600,textAlign:"right",padding:"8px 12px"}}/>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}

            {/* DIFFERENT SHOPS MODE */}
            {shopMode === "different" && selectedDates.length > 0 && (
              <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
                {entries.map((entry, i) => (
                  <DifferentShopEntry key={i} entry={entry} index={i} updateEntry={updateEntry} />
                ))}
              </div>
            )}

            {/* Summary & Submit */}
            {validEntries.length > 0 && (
              <div style={{background:theme.inputBg,borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:theme.textMuted}}>{validEntries.length} entries</span>
                <span style={{fontSize:18,fontWeight:700,color:"#fff"}}>{fmt(totalAmount)}</span>
              </div>
            )}

            <button onClick={handleSubmit} disabled={saving || validEntries.length === 0}
              style={{
                width:"100%",padding:"14px",borderRadius:10,border:"none",
                cursor:(saving||validEntries.length===0)?"not-allowed":"pointer",
                fontSize:14,fontWeight:600,color:"#fff",
                background:(saving||validEntries.length===0)?theme.textDim:`linear-gradient(135deg,${theme.primary},${theme.accent})`,
                opacity:(saving||validEntries.length===0)?0.5:1,
              }}>
              {saving ? "Saving…" : `💾 Save ${validEntries.length || ""}`}
            </button>
          </div>

          {/* Recent */}
          {recentEntries.length > 0 && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px",marginTop:16}}>
              <h4 style={{fontSize:11,fontWeight:600,color:theme.textMuted,marginTop:0,marginBottom:10,textTransform:"uppercase"}}>Recent</h4>
              {recentEntries.slice(0,4).map(e => (
                <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${theme.cardBorder}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {EXPENSE_TYPES[e.expense_type]?.icon && <span style={{fontSize:10}}>{EXPENSE_TYPES[e.expense_type].icon}</span>}
                    <span style={{fontSize:14}}>{getCatIcon(e.category)}</span>
                    <div>
                      <div style={{fontSize:12,color:theme.text}}>{e.shop}</div>
                      <div style={{fontSize:10,color:theme.textDim}}>{e.date}</div>
                    </div>
                  </div>
                  <span style={{fontSize:13,fontWeight:600,color:"#fff"}}>{fmt(e.amount)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Different Shop Entry Row
    function DifferentShopEntry({ entry, index, updateEntry }) {
      const { theme, inputStyle, categories, shops, getCatIcon, getCatColor } = useTheme();
      const [customShop, setCustomShop] = useState("");

      const categoryShops = useMemo(() => {
        if (!entry.category) return [];
        return shops.filter(s => s.category === entry.category).sort((a,b) => {
          if (a.is_favorite && !b.is_favorite) return -1;
          if (!a.is_favorite && b.is_favorite) return 1;
          return a.name.localeCompare(b.name);
        });
      }, [shops, entry.category]);

      const selectShop = (name) => { updateEntry(index, "shop", name); setCustomShop(""); };

      return (
        <div style={{background:theme.inputBg,borderRadius:10,padding:12,border:`1px solid ${theme.cardBorder}`}}>
          <div style={{fontSize:12,fontWeight:600,color:theme.text,marginBottom:10}}>#{index+1} — {entry.date}</div>
          
          <select value={entry.category||""} onChange={e => { updateEntry(index, "category", e.target.value); updateEntry(index, "shop", ""); }}
            style={{...inputStyle,marginBottom:8,fontSize:12,cursor:"pointer"}}>
            <option value="">Category...</option>
            {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
          </select>

          {entry.category && (
            <>
              {categoryShops.length > 0 && (
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                  {categoryShops.map(s => (
                    <button key={s.id} onClick={() => selectShop(s.name)} style={{
                      padding:"6px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,
                      background:entry.shop===s.name?theme.primaryGlow:theme.cardBg,
                      color:entry.shop===s.name?"#fff":theme.text,
                    }}>{s.is_favorite?"⭐ ":""}{s.name}</button>
                  ))}
                  <button onClick={() => selectShop("Other")} style={{
                    padding:"6px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,
                    background:entry.shop==="Other"?`${getCatColor("Other")}30`:theme.cardBg,
                    color:entry.shop==="Other"?getCatColor("Other"):theme.textMuted,
                  }}>Other</button>
                </div>
              )}
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input type="text" placeholder="Or type shop..." value={customShop} onChange={e => setCustomShop(e.target.value)}
                  onKeyDown={e => { if(e.key==="Enter" && customShop.trim()) selectShop(customShop.trim()); }}
                  style={{...inputStyle,fontSize:11,flex:1,padding:"6px 10px"}}/>
                {customShop.trim() && <button onClick={() => selectShop(customShop.trim())} style={{background:theme.primary,border:"none",borderRadius:6,padding:"6px 10px",color:"#fff",cursor:"pointer",fontSize:10}}>Use</button>}
              </div>
            </>
          )}

          {entry.category && entry.shop && (
            <div style={{display:"flex",gap:8}}>
              <input type="number" inputMode="numeric" placeholder="¥ Amount" value={entry.amount||""}
                onChange={e => updateEntry(index, "amount", e.target.value)}
                style={{...inputStyle,flex:1,fontSize:14,fontWeight:600,textAlign:"right",padding:"8px 10px"}}/>
              <select value={entry.expense_type||"normal"} onChange={e => updateEntry(index, "expense_type", e.target.value)}
                style={{...inputStyle,width:90,fontSize:11,cursor:"pointer",padding:"8px"}}>
                <option value="normal">Normal</option>
                <option value="fixed">📌 Fixed</option>
                <option value="outlier">⚡ Outlier</option>
              </select>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  SETTINGS VIEW (Categories + Tags + Recurring)
    // ═══════════════════════════════════════════
    function SettingsView({ allExpenses }) {
      const { theme, inputStyle, labelStyle, supabase, fetchData, categories, tags, shops, getCatIcon } = useTheme();
      const [activeTab, setActiveTab] = useState("categories");
      const [toast, setToast] = useState(null);

      // Category state
      const [editingCat, setEditingCat] = useState(null);
      const [newCat, setNewCat] = useState({ name: "", icon: "📦", color: "#8b5cf6" });
      const [showAddCat, setShowAddCat] = useState(false);

      // Tag state
      const [editingTag, setEditingTag] = useState(null);
      const [newTag, setNewTag] = useState({ name: "", icon: "🏷️", color: "#6b7280" });
      const [showAddTag, setShowAddTag] = useState(false);

      // Shop state
      const [selectedShopCategory, setSelectedShopCategory] = useState("");
      const [editingShop, setEditingShop] = useState(null);
      const [newShop, setNewShop] = useState({ name: "", category: "", is_favorite: false });
      const [showAddShop, setShowAddShop] = useState(false);

      const EMOJI_OPTIONS = ["🛒","🏪","🌏","🍜","📦","🧹","🍕","☕","🚗","💊","🎮","📚","👕","🏠","💡","🎬","✈️","🎁","💰","🏥","🍎","🍇","🚃","🏷️","👨‍👩‍👧","📄","🛍️"];
      const COLOR_OPTIONS = ["#2563eb","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#06b6d4","#84cc16","#f97316","#6366f1","#64748b","#a855f7"];

      const getCategoryUsage = (n) => allExpenses.filter(e => e.category === n).length;
      const getTagUsage = (n) => allExpenses.filter(e => (e.tags||"").split(",").includes(n)).length;
      const getShopUsage = (n) => allExpenses.filter(e => e.shop === n).length;

      // Get shops for selected category
      const filteredShops = useMemo(() => {
        if (!selectedShopCategory) return shops;
        return shops.filter(s => s.category === selectedShopCategory);
      }, [shops, selectedShopCategory]);

      // Category handlers
      const handleAddCategory = async () => {
        if (!newCat.name.trim()) { showToast("error","Enter name"); return; }
        const { error } = await supabase.from("cost_management_categories").insert({ name: newCat.name.trim(), icon: newCat.icon, color: newCat.color, sort_order: categories.length + 1 });
        if (error) showToast("error", error.message.includes("duplicate") ? "Exists" : error.message);
        else { showToast("success","Added"); setNewCat({ name: "", icon: "📦", color: "#8b5cf6" }); setShowAddCat(false); fetchData(); }
      };
      const handleUpdateCategory = async () => {
        if (!editingCat?.name.trim()) return;
        const { error } = await supabase.from("cost_management_categories").update({ name: editingCat.name, icon: editingCat.icon, color: editingCat.color }).eq("id", editingCat.id);
        if (!error && editingCat.originalName !== editingCat.name) {
          await supabase.from("cost_management_expenses").update({ category: editingCat.name }).eq("category", editingCat.originalName);
          await supabase.from("cost_management_shops").update({ category: editingCat.name }).eq("category", editingCat.originalName);
        }
        if (error) showToast("error", error.message); else { showToast("success","Updated"); setEditingCat(null); fetchData(); }
      };

      // Tag handlers
      const handleAddTag = async () => {
        if (!newTag.name.trim()) { showToast("error","Enter name"); return; }
        const { error } = await supabase.from("cost_management_tags").insert({ name: newTag.name.trim(), icon: newTag.icon, color: newTag.color, sort_order: tags.length + 1 });
        if (error) showToast("error", error.message.includes("duplicate") ? "Exists" : error.message);
        else { showToast("success","Added"); setNewTag({ name: "", icon: "🏷️", color: "#6b7280" }); setShowAddTag(false); fetchData(); }
      };
      const handleUpdateTag = async () => {
        if (!editingTag?.name.trim()) return;
        const { error } = await supabase.from("cost_management_tags").update({ name: editingTag.name, icon: editingTag.icon, color: editingTag.color }).eq("id", editingTag.id);
        if (!error && editingTag.originalName !== editingTag.name) {
          const { data: expenses } = await supabase.from("cost_management_expenses").select("id, tags").like("tags", `%${editingTag.originalName}%`);
          for (const exp of (expenses || [])) {
            const newTags = (exp.tags || "").split(",").map(t => t === editingTag.originalName ? editingTag.name : t).join(",");
            await supabase.from("cost_management_expenses").update({ tags: newTags }).eq("id", exp.id);
          }
        }
        if (error) showToast("error", error.message); else { showToast("success","Updated"); setEditingTag(null); fetchData(); }
      };
      const handleDeleteTag = async (id) => {
        const { error } = await supabase.from("cost_management_tags").delete().eq("id", id);
        if (error) showToast("error", error.message); else { showToast("success","Deleted"); fetchData(); }
      };

      // Shop handlers
      const handleAddShop = async () => {
        if (!newShop.name.trim() || !newShop.category) { showToast("error","Enter name and category"); return; }
        const { error } = await supabase.from("cost_management_shops").insert({ 
          name: newShop.name.trim(), 
          category: newShop.category, 
          is_favorite: newShop.is_favorite 
        });
        if (error) showToast("error", error.message.includes("duplicate") ? "Shop exists" : error.message);
        else { showToast("success","Added"); setNewShop({ name: "", category: selectedShopCategory || "", is_favorite: false }); setShowAddShop(false); fetchData(); }
      };
      const handleUpdateShop = async () => {
        if (!editingShop?.name.trim()) return;
        const { error } = await supabase.from("cost_management_shops").update({ 
          name: editingShop.name, 
          category: editingShop.category,
          is_favorite: editingShop.is_favorite 
        }).eq("id", editingShop.id);
        // Update expenses if shop name changed
        if (!error && editingShop.originalName !== editingShop.name) {
          await supabase.from("cost_management_expenses").update({ shop: editingShop.name }).eq("shop", editingShop.originalName);
        }
        if (error) showToast("error", error.message); else { showToast("success","Updated"); setEditingShop(null); fetchData(); }
      };
      const handleDeleteShop = async (id) => {
        const { error } = await supabase.from("cost_management_shops").delete().eq("id", id);
        if (error) showToast("error", error.message); else { showToast("success","Deleted"); fetchData(); }
      };
      const handleToggleFavorite = async (shop) => {
        await supabase.from("cost_management_shops").update({ is_favorite: !shop.is_favorite }).eq("id", shop.id);
        fetchData();
      };

      const showToast = (type, msg) => { setToast({ type, msg }); setTimeout(() => setToast(null), 3000); };

      const tabStyle = (active) => ({
        padding:"8px 14px",fontSize:11,fontWeight:active?600:400,cursor:"pointer",
        background:active?theme.inputBg:"transparent",color:active?theme.text:theme.textMuted,
        border:"none",borderBottom:active?`2px solid ${theme.primary}`:"2px solid transparent",
      });

      return (
        <div style={{maxWidth:560,margin:"0 auto"}}>
          {toast && (
            <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:500,background:toast.type==="success"?theme.success:theme.danger,color:"#fff"}}>
              {toast.type==="success"?"✅":"❌"} {toast.msg}
            </div>
          )}

          <div style={{display:"flex",borderBottom:`1px solid ${theme.cardBorder}`,marginBottom:16,marginTop:8}}>
            <button onClick={() => setActiveTab("categories")} style={tabStyle(activeTab==="categories")}>📂 Categories</button>
            <button onClick={() => setActiveTab("shops")} style={tabStyle(activeTab==="shops")}>🏪 Shops</button>
            <button onClick={() => setActiveTab("tags")} style={tabStyle(activeTab==="tags")}>🏷️ Tags</button>
          </div>

          {/* CATEGORIES TAB */}
          {activeTab === "categories" && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px"}}>
              {categories.map(cat => (
                <div key={cat.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:theme.inputBg,borderRadius:8,marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{cat.icon}</span>
                    <div>
                      <div style={{color:theme.text,fontSize:13,fontWeight:500}}>{cat.name}</div>
                      <div style={{color:theme.textDim,fontSize:10}}>{getCategoryUsage(cat.name)} expenses</div>
                    </div>
                    <div style={{width:10,height:10,borderRadius:3,background:cat.color}}/>
                  </div>
                  <button onClick={() => setEditingCat({ ...cat, originalName: cat.name })} style={{background:"none",border:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                </div>
              ))}
              {!showAddCat ? (
                <button onClick={() => setShowAddCat(true)} style={{width:"100%",padding:"10px",borderRadius:8,border:`2px dashed ${theme.success}50`,background:"transparent",color:theme.success,cursor:"pointer",fontSize:12}}>+ Add Category</button>
              ) : (
                <ItemForm item={newCat} setItem={setNewCat} onSave={handleAddCategory} onCancel={() => setShowAddCat(false)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Add" />
              )}
            </div>
          )}

          {/* SHOPS TAB */}
          {activeTab === "shops" && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px"}}>
              <p style={{fontSize:11,color:theme.textDim,marginTop:0,marginBottom:12}}>Manage shops for each category. Favorite shops appear first when adding expenses.</p>
              
              {/* Category Filter */}
              <div style={{marginBottom:12}}>
                <select value={selectedShopCategory} onChange={e => setSelectedShopCategory(e.target.value)}
                  style={{...inputStyle,fontSize:12,cursor:"pointer"}}>
                  <option value="">All Categories</option>
                  {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                </select>
              </div>

              {/* Shop List */}
              {filteredShops.length > 0 ? (
                <div style={{maxHeight:300,overflowY:"auto",marginBottom:12}}>
                  {filteredShops.map(shop => (
                    <div key={shop.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:theme.inputBg,borderRadius:8,marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <button onClick={() => handleToggleFavorite(shop)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14}}>
                          {shop.is_favorite ? "⭐" : "☆"}
                        </button>
                        <div>
                          <div style={{color:theme.text,fontSize:13,fontWeight:500}}>{shop.name}</div>
                          <div style={{color:theme.textDim,fontSize:10}}>{getCatIcon(shop.category)} {shop.category} • {getShopUsage(shop.name)} expenses</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={() => setEditingShop({ ...shop, originalName: shop.name })} style={{background:"none",border:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                        <button onClick={() => handleDeleteShop(shop.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:theme.danger}}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{color:theme.textDim,textAlign:"center",padding:20,fontSize:12}}>
                  {selectedShopCategory ? `No shops in ${selectedShopCategory}` : "No shops yet"}
                </div>
              )}

              {/* Add Shop */}
              {!showAddShop ? (
                <button onClick={() => { setShowAddShop(true); setNewShop({ name: "", category: selectedShopCategory || "", is_favorite: false }); }} 
                  style={{width:"100%",padding:"10px",borderRadius:8,border:`2px dashed ${theme.primary}50`,background:"transparent",color:theme.primary,cursor:"pointer",fontSize:12}}>
                  + Add Shop
                </button>
              ) : (
                <div style={{background:theme.inputBg,borderRadius:10,padding:12}}>
                  <input type="text" value={newShop.name} onChange={e => setNewShop({...newShop, name: e.target.value})} 
                    placeholder="Shop name" style={{...inputStyle,marginBottom:8,fontSize:12}}/>
                  <select value={newShop.category} onChange={e => setNewShop({...newShop, category: e.target.value})}
                    style={{...inputStyle,marginBottom:8,fontSize:12,cursor:"pointer"}}>
                    <option value="">Select category...</option>
                    {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                  </select>
                  <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontSize:12,color:theme.textMuted,cursor:"pointer"}}>
                    <input type="checkbox" checked={newShop.is_favorite} onChange={e => setNewShop({...newShop, is_favorite: e.target.checked})} />
                    ⭐ Mark as favorite
                  </label>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => setShowAddShop(false)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                    <button onClick={handleAddShop} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.primary,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Add</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* TAGS TAB */}
          {activeTab === "tags" && (
            <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:14,padding:"16px"}}>
              <p style={{fontSize:11,color:theme.textDim,marginTop:0,marginBottom:12}}>Tags help categorize what expenses are for (Food, Transport, Travel, etc.)</p>
              {tags.map(tag => (
                <div key={tag.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:theme.inputBg,borderRadius:8,marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:18}}>{tag.icon}</span>
                    <div>
                      <div style={{color:theme.text,fontSize:13,fontWeight:500}}>{tag.name}</div>
                      <div style={{color:theme.textDim,fontSize:10}}>{getTagUsage(tag.name)} expenses</div>
                    </div>
                    <div style={{width:10,height:10,borderRadius:3,background:tag.color}}/>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => setEditingTag({ ...tag, originalName: tag.name })} style={{background:"none",border:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                    <button onClick={() => handleDeleteTag(tag.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:theme.danger}}>🗑️</button>
                  </div>
                </div>
              ))}
              {!showAddTag ? (
                <button onClick={() => setShowAddTag(true)} style={{width:"100%",padding:"10px",borderRadius:8,border:`2px dashed ${theme.warning}50`,background:"transparent",color:theme.warning,cursor:"pointer",fontSize:12}}>+ Add Tag</button>
              ) : (
                <ItemForm item={newTag} setItem={setNewTag} onSave={handleAddTag} onCancel={() => setShowAddTag(false)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Add" />
              )}
            </div>
          )}

          {/* Edit Category Modal */}
          {editingCat && (
            <Modal onClose={() => setEditingCat(null)}>
              <h5 style={{color:"#fff",margin:"0 0 12px 0",fontSize:14}}>Edit Category</h5>
              <ItemForm item={editingCat} setItem={setEditingCat} onSave={handleUpdateCategory} onCancel={() => setEditingCat(null)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Save" />
            </Modal>
          )}

          {/* Edit Tag Modal */}
          {editingTag && (
            <Modal onClose={() => setEditingTag(null)}>
              <h5 style={{color:"#fff",margin:"0 0 12px 0",fontSize:14}}>Edit Tag</h5>
              <ItemForm item={editingTag} setItem={setEditingTag} onSave={handleUpdateTag} onCancel={() => setEditingTag(null)} emojis={EMOJI_OPTIONS} colors={COLOR_OPTIONS} saveLabel="Save" />
            </Modal>
          )}

          {/* Edit Shop Modal */}
          {editingShop && (
            <Modal onClose={() => setEditingShop(null)}>
              <h5 style={{color:"#fff",margin:"0 0 12px 0",fontSize:14}}>Edit Shop</h5>
              <div style={{background:theme.inputBg,borderRadius:10,padding:12}}>
                <input type="text" value={editingShop.name} onChange={e => setEditingShop({...editingShop, name: e.target.value})} 
                  placeholder="Shop name" style={{...inputStyle,marginBottom:8,fontSize:12}}/>
                <select value={editingShop.category} onChange={e => setEditingShop({...editingShop, category: e.target.value})}
                  style={{...inputStyle,marginBottom:8,fontSize:12,cursor:"pointer"}}>
                  {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
                </select>
                <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontSize:12,color:theme.textMuted,cursor:"pointer"}}>
                  <input type="checkbox" checked={editingShop.is_favorite} onChange={e => setEditingShop({...editingShop, is_favorite: e.target.checked})} />
                  ⭐ Favorite
                </label>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={() => setEditingShop(null)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                  <button onClick={handleUpdateShop} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.primary,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Save</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function Modal({ children, onClose }) {
      const { theme } = useTheme();
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{background:"#1a1a2e",borderRadius:12,padding:16,width:"100%",maxWidth:360}}>
            {children}
          </div>
        </div>
      );
    }

    function ItemForm({ item, setItem, onSave, onCancel, emojis, colors, saveLabel }) {
      const { theme, inputStyle } = useTheme();
      return (
        <div style={{background:theme.inputBg,borderRadius:10,padding:12}}>
          <input type="text" value={item.name} onChange={e => setItem({...item, name: e.target.value})} placeholder="Name" style={{...inputStyle,marginBottom:8,fontSize:12}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
            {emojis.map(emoji => (
              <button key={emoji} onClick={() => setItem({...item, icon: emoji})} style={{width:28,height:28,borderRadius:6,border:item.icon===emoji?`2px solid ${theme.primary}`:`1px solid ${theme.cardBorder}`,background:item.icon===emoji?theme.primaryGlow:"transparent",cursor:"pointer",fontSize:14}}>{emoji}</button>
            ))}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:10}}>
            {colors.map(color => (
              <button key={color} onClick={() => setItem({...item, color})} style={{width:24,height:24,borderRadius:6,border:item.color===color?`2px solid #fff`:"none",background:color,cursor:"pointer"}}/>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={onCancel} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
            <button onClick={onSave} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.success,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>{saveLabel}</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  TRANSACTIONS VIEW
    // ═══════════════════════════════════════════
    function TransactionsView({ pageTx, txPage, setTxPage, txPages }) {
      const { theme, inputStyle, supabase, fetchData, categories, tags, getCatIcon, getCatColor, getTagIcon, getTagColor } = useTheme();
      const [editingTx, setEditingTx] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [deletingTx, setDeletingTx] = useState(null);
      const [toast, setToast] = useState(null);

      const openEdit = (tx) => { setEditForm({ ...tx, tagsArray: (tx.tags||"").split(",").filter(Boolean) }); setEditingTx(tx); };

      const handleUpdate = async () => {
        const { error } = await supabase.from("cost_management_expenses")
          .update({ amount: Number(editForm.amount), date: editForm.date, category: editForm.category, shop: editForm.shop, notes: editForm.notes, expense_type: editForm.expense_type, tags: (editForm.tagsArray||[]).join(",") })
          .eq("id", editForm.id);
        if (error) { setToast({ type: "error", msg: error.message }); }
        else { setToast({ type: "success", msg: "Updated" }); setEditingTx(null); fetchData(); }
        setTimeout(() => setToast(null), 3000);
      };

      const handleDelete = async () => {
        const { error } = await supabase.from("cost_management_expenses").delete().eq("id", deletingTx.id);
        if (error) { setToast({ type: "error", msg: error.message }); }
        else { setToast({ type: "success", msg: "Deleted" }); setDeletingTx(null); fetchData(); }
        setTimeout(() => setToast(null), 3000);
      };

      return (
        <div style={{background:theme.cardBg,border:`1px solid ${theme.cardBorder}`,borderRadius:12,overflow:"hidden"}}>
          {toast && (
            <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:500,background:toast.type==="success"?theme.success:theme.danger,color:"#fff"}}>
              {toast.type==="success"?"✅":"❌"} {toast.msg}
            </div>
          )}

          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${theme.cardBorder}`}}>
                  {["","Date","Shop","Cat","Tags","Amount",""].map((h,i) => (
                    <th key={i} style={{padding:"10px 8px",textAlign:"left",color:theme.textMuted,fontWeight:600,fontSize:9,textTransform:"uppercase"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {pageTx.map(tx => (
                  <tr key={tx.id} style={{borderBottom:`1px solid ${theme.cardBorder}`}}>
                    <td style={{padding:"8px 6px",width:20}}>{EXPENSE_TYPES[tx.expense_type]?.icon}</td>
                    <td style={{padding:"8px 6px",color:theme.textMuted,whiteSpace:"nowrap"}}>{tx.date}</td>
                    <td style={{padding:"8px 6px",color:theme.text,fontWeight:500,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>{tx.shop}</td>
                    <td style={{padding:"8px 6px"}}><span style={{fontSize:14}}>{getCatIcon(tx.category)}</span></td>
                    <td style={{padding:"8px 6px"}}>
                      {(tx.tags||"").split(",").filter(Boolean).slice(0,2).map(t => (
                        <span key={t} style={{fontSize:10,marginRight:2}}>{getTagIcon(t)}</span>
                      ))}
                    </td>
                    <td style={{padding:"8px 6px",color:"#fff",fontWeight:600}}>{fmt(tx.amount)}</td>
                    <td style={{padding:"8px 6px"}}>
                      <button onClick={() => openEdit(tx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11}}>✏️</button>
                      <button onClick={() => setDeletingTx(tx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11}}>🗑️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:8,padding:"12px"}}>
            <button onClick={() => setTxPage(p => Math.max(0,p-1))} disabled={txPage===0} style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:txPage===0?"default":"pointer",background:txPage===0?theme.cardBg:theme.inputBg,color:theme.textMuted,fontSize:11}}>←</button>
            <span style={{fontSize:11,color:theme.textDim}}>{txPage+1}/{txPages||1}</span>
            <button onClick={() => setTxPage(p => Math.min(txPages-1,p+1))} disabled={txPage>=txPages-1} style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:txPage>=txPages-1?"default":"pointer",background:txPage>=txPages-1?theme.cardBg:theme.inputBg,color:theme.textMuted,fontSize:11}}>→</button>
          </div>

          {/* Edit Modal */}
          {editingTx && (
            <Modal onClose={() => setEditingTx(null)}>
              <h4 style={{color:"#fff",fontSize:14,margin:"0 0 12px 0"}}>Edit Entry</h4>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <input type="date" value={editForm.date} onChange={e => setEditForm({...editForm, date: e.target.value})} style={{...inputStyle,fontSize:11,colorScheme:"dark"}}/>
                <input type="number" value={editForm.amount} onChange={e => setEditForm({...editForm, amount: e.target.value})} style={{...inputStyle,fontSize:11}}/>
              </div>
              <select value={editForm.category} onChange={e => setEditForm({...editForm, category: e.target.value})} style={{...inputStyle,marginBottom:8,fontSize:11,cursor:"pointer"}}>
                {categories.map(c => <option key={c.name} value={c.name}>{c.icon} {c.name}</option>)}
              </select>
              <input type="text" value={editForm.shop} onChange={e => setEditForm({...editForm, shop: e.target.value})} style={{...inputStyle,marginBottom:8,fontSize:11}}/>
              <select value={editForm.expense_type||"normal"} onChange={e => setEditForm({...editForm, expense_type: e.target.value})} style={{...inputStyle,marginBottom:8,fontSize:11,cursor:"pointer"}}>
                <option value="normal">Normal</option>
                <option value="fixed">📌 Fixed</option>
                <option value="outlier">⚡ Outlier</option>
              </select>
              <div style={{marginBottom:8}}>
                <label style={{fontSize:10,color:theme.textMuted,marginBottom:4,display:"block"}}>TAGS</label>
                <TagSelector selectedTags={editForm.tagsArray||[]} onChange={t => setEditForm({...editForm, tagsArray: t})} />
              </div>
              <input type="text" value={editForm.notes||""} onChange={e => setEditForm({...editForm, notes: e.target.value})} placeholder="Notes" style={{...inputStyle,marginBottom:10,fontSize:11}}/>
              <div style={{display:"flex",gap:6}}>
                <button onClick={() => setEditingTx(null)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
                <button onClick={handleUpdate} style={{flex:1,padding:"8px",borderRadius:6,border:"none",background:theme.primary,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:11}}>Save</button>
              </div>
            </Modal>
          )}

          {/* Delete Modal */}
          {deletingTx && (
            <Modal onClose={() => setDeletingTx(null)}>
              <h4 style={{color:theme.danger,fontSize:14,margin:"0 0 8px 0"}}>Delete?</h4>
              <div style={{background:theme.inputBg,borderRadius:6,padding:10,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{color:theme.text,fontSize:12}}>{getCatIcon(deletingTx.category)} {deletingTx.shop}</span>
                  <span style={{color:"#fff",fontWeight:600,fontSize:12}}>{fmt(deletingTx.amount)}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={() => setDeletingTx(null)} style={{flex:1,padding:"8px",borderRadius:6,border:`1px solid ${theme.cardBorder}`,background:"transparent",color:theme.textMuted,cursor:"pointer",fontSize:11}}>Cancel</button>
